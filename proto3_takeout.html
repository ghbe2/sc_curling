<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テイクアウト手触り検証 PROTO3</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c22;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0;
    padding: 8px 10px;
    color: #e8e4dc;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  /* デバッグ用ボタンは脇(右上)へ寄せて、下半分の操作エリアを空ける */
  #scenarioBar {
    position: fixed; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  .btn {
    background: #34343e; color: #e8e4dc;
    border: 1px solid #4c4c58; border-radius: 6px;
    padding: 5px 8px; font-size: 10px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: #4a3838; border-color: #6a4c4c; }
  #resetBtn:active { background: #5c4646; }
  #chainToast {
    position: fixed; left: 50%; top: 26%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #ffd67a;
    font-family: system-ui, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #hint {
    position: fixed; bottom: 4%; left: 0; right: 0;
    text-align: center;
    color: rgba(232, 228, 220, 0.45);
    font-family: system-ui, sans-serif;
    font-size: 12px;
    pointer-events: none;
    line-height: 1.7;
  }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO3</span>テイクアウト検証</span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span id="scenarioNameText"></span>
</div>
<div id="chainToast"></div>
<div id="scenarioBar">
  <button class="btn" id="sc1">①</button>
  <button class="btn" id="sc2">②</button>
  <button class="btn" id="sc3">③</button>
  <button class="btn" id="sc4">④</button>
  <button class="btn" id="resetBtn">RE</button>
</div>
<div id="hint">下半分で操作:指を動かして狙う → 後ろへ引いて溜める<br>引きを0に戻せば狙い直し / 放す瞬間の横フリックで回転</div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO3:画面レイアウト(盤=上半分/発射UI=下半分)と
 * 「狙う→引いて固定→放す」の弓引き入力方式に変更。物理はPROTO2から不変。
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位(継続)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  FRICTION: 0.985,       // 1フレームごとの速度減衰率
  CURVE_STRENGTH: 0.003, // カーブ量→横加速度の変換係数(速度比例式。PROTO2から継続)
  CURVE_MAX_ANGLE: 1.0,  // 1投あたりの最大累積回頭角(rad)。完全旋回の構造的禁止(PROTO2から継続)
  RESTITUTION: 0.95,     // ピース間反発係数(ほぼ完全弾性。PROTO2から継続)
  PIECE_RADIUS: 24,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- 弓引き入力(PROTO3で全面変更) --- */
  MIN_DRAW_DIST: 20,     // 引き(draw)がこの距離(px)未満のままリリースしたら投げない(誤操作防止。旧MIN_PUSH_DISTを置き換え)
  AIM_DEADZONE: 24,      // アンカー(タッチ開始点)からこの半径内では狙いを更新しない(通過時のガクつき・180°反転を防ぐ)
  AIM_RETRACT_FREEZE: 1.5, // 1イベントあたりこのpx以上アンカーへ近づいたら「引き戻し中」とみなし狙いを凍結する。
                            // 狙い→引きへ移る途中、指がアンカーの真上を正確に通らなくても狙いが暴れないための閾値
  DRAW_TO_SPEED_SCALE: 0.05, // 引き距離(px)→初速(px/frame)の変換係数。200px引き切りでMAX_THROW_SPEED(10)。
                              // (旧PUSH_TO_SPEED_SCALEと同じ値・同じ考え方。引く向きが逆になっただけ)
  FLICK_WINDOW_MS: 120,  // リリース直前、回転(カーブ)判定に使う時間窓(PROTO2から継続)
  FLICK_CURVE_SCALE: 60, // 横移動量(px)→curve値への変換係数(PROTO2から継続。実機で要調整)
  FLICK_CURVE_SIGN: 1,   // フリック方向とカーブ方向の対応(+1/-1)。弓を引いた状態で尾側を弾くと
                          // 直感が逆に感じる可能性があるため、符号だけ入れ替えられるようにした。実機で要確認

  /* --- 継続する追加値 --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止
  MAX_THROW_SPEED: 10.0, // 初速の上限(px/frame)
  PLACE_MARGIN: 0.72,    // シナリオ配置がBOARD_RADIUSの何割以内に収まるか
};

/* =========================================================================
 * ここからプロトタイプ本体
 * ========================================================================= */

const game = {
  pieces: [],          // { x, y, vx, vy, rot, role, state, curve, curveTurned }
  scenario: 1,
  launcherReady: true,
  aim: null,           // 弓引きジェスチャーの状態。nullなら未入力
  chainCountThisThrow: 0,
  toastTimer: 0,
};

// 論理座標(盤中心が原点)。ランチャーは盤の下縁内側に固定
function launcherPos() {
  return { x: 0, y: CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 2.4 };
}

function createPiece(x, y, role) {
  return {
    x, y, vx: 0, vy: 0, rot: 0,
    role,              // 'player' | 'target' | 'wall'
    state: "onboard",  // onboard / exiting / removed
    fallT: 0,
    curve: 0,
    curveTurned: 0,
  };
}

/* ---------- シナリオ配置(PROTO2から不変) ---------- */
function placeNonOverlapping(count, avoid) {
  const out = [];
  const R = CONFIG.BOARD_RADIUS * CONFIG.PLACE_MARGIN;
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 80 && !placed; attempt++) {
      const r = Math.sqrt(Math.random()) * R;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      let ok = true;
      for (const o of out) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 2 + 6) { ok = false; break; }
      }
      for (const o of avoid) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 3) { ok = false; break; }
      }
      if (ok) { out.push({ x, y }); placed = true; }
    }
    if (!placed) out.push({ x: 0, y: -R * (i + 1) / (count + 1) });
  }
  return out;
}

const SCENARIO_NAMES = { 1: "① 単体ターゲット", 2: "② 密集ターゲット", 3: "③ 壁越え", 4: "④ フリー配置" };

function buildScenario(n) {
  game.pieces = [];
  const launch = launcherPos();
  if (n === 1) {
    game.pieces.push(createPiece(0, -20, "target"));
  } else if (n === 2) {
    // ±26pxの正方配置(隣接間距離52px=直径48pxよりわずかに広いだけの密集)
    const cx = 0, cy = -140;
    const offs = [[-26, -26], [26, -26], [-26, 26], [26, 26]];
    for (const [ox, oy] of offs) game.pieces.push(createPiece(cx + ox, cy + oy, "target"));
  } else if (n === 3) {
    const target = { x: 0, y: -150 };
    const wall = { x: (launch.x + target.x) / 2, y: (launch.y + target.y) / 2 };
    game.pieces.push(createPiece(target.x, target.y, "target"));
    game.pieces.push(createPiece(wall.x, wall.y, "wall"));
  } else if (n === 4) {
    const count = 5 + Math.floor(Math.random() * 4);
    const spots = placeNonOverlapping(count, [launch]);
    for (const s of spots) game.pieces.push(createPiece(s.x, s.y, "target"));
  }
  game.scenario = n;
  game.launcherReady = true;
  updateHUD();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* ---------- 弓引き入力(PROTO3で全面変更) ----------
 * タッチ開始点 P0 をアンカーとした状態機械:
 *   aim  : 指がアンカーの前側にある間、狙い(aimDir)が指方向へリアルタイム追従する。
 *          アンカーへ引き戻し中(AIM_RETRACT_FREEZE)とデッドゾーン内では狙いを凍結。
 *   drawn: 指がアンカーの後ろ側(狙いと逆方向)へ出たら狙いを固定し、
 *          後ろへ引いた距離(drawDist)がそのままパワーの溜めになる。
 *          引きを0に戻す(前側へ戻す)と aim に復帰し、狙いを変えられる。
 * リリース時:drawn かつ drawDist>=MIN_DRAW_DIST なら投擲。
 *   パワー = 放した時点のdrawDist、回転 = リリース直前FLICK_WINDOW_MSの横フリック量。
 * ------------------------------------------------- */
function startAim(pointerId, px0, py0) {
  game.aim = {
    pointerId,
    p0x: px0, p0y: py0,
    fx: px0, fy: py0,          // 現在の指位置
    aimDirX: 0, aimDirY: -1,   // 初期狙いは真上(盤方向)。指を動かせば即追従する
    state: "aim",              // 'aim' | 'drawn'
    drawDist: 0,
    prevDist: 0,               // 引き戻し検出用(前回イベントのアンカー距離)
    buffer: [{ x: px0, y: py0, t: performance.now() }], // 回転フリック判定用バッファ
  };
}

function updateAim(px, py) {
  const a = game.aim;
  if (!a) return;
  a.fx = px; a.fy = py;

  const now = performance.now();
  a.buffer.push({ x: px, y: py, t: now });
  while (a.buffer.length > 2 && now - a.buffer[0].t > CONFIG.FLICK_WINDOW_MS) a.buffer.shift();

  const dx = px - a.p0x, dy = py - a.p0y;
  const dist = Math.hypot(dx, dy);

  if (a.state === "drawn") {
    const proj = dx * a.aimDirX + dy * a.aimDirY;
    if (proj >= 0) {
      // 引きを0に戻した → 固定解除、狙い直し可能に
      a.state = "aim";
      a.drawDist = 0;
    } else {
      a.drawDist = -proj;
    }
  }
  if (a.state === "aim") {
    const proj = dx * a.aimDirX + dy * a.aimDirY;
    if (dist > CONFIG.AIM_DEADZONE && proj < 0) {
      // アンカーの後ろ側へ引いた → 狙い固定、溜め開始
      a.state = "drawn";
      a.drawDist = -proj;
    } else if (dist > CONFIG.AIM_DEADZONE && dist >= a.prevDist - CONFIG.AIM_RETRACT_FREEZE) {
      // 前側で指を動かしている(引き戻し中でない) → 狙いを追従更新
      a.aimDirX = dx / dist;
      a.aimDirY = dy / dist;
    }
    // デッドゾーン内・引き戻し中は狙い凍結(通過時に狙いが暴れないように)
  }
  a.prevDist = dist;
}

function finalizeAim(aim, px, py) {
  const now = performance.now();
  aim.buffer.push({ x: px, y: py, t: now });
  while (aim.buffer.length > 2 && now - aim.buffer[0].t > CONFIG.FLICK_WINDOW_MS) aim.buffer.shift();

  if (aim.state !== "drawn" || aim.drawDist < CONFIG.MIN_DRAW_DIST) return null; // 引きが浅い=誤操作

  // 回転:リリース直前の短い区間の、狙いに垂直な方向の移動量だけを見る
  const first = aim.buffer[0], last = aim.buffer[aim.buffer.length - 1];
  const perpX = -aim.aimDirY, perpY = aim.aimDirX;
  const lateral = (last.x - first.x) * perpX + (last.y - first.y) * perpY;
  const curve = clamp(CONFIG.FLICK_CURVE_SIGN * lateral / CONFIG.FLICK_CURVE_SCALE, -1, 1);

  // パワー:放した時点の引き距離から算出
  const speed = clamp(aim.drawDist * CONFIG.DRAW_TO_SPEED_SCALE, 0, CONFIG.MAX_THROW_SPEED);

  return { dirX: aim.aimDirX, dirY: aim.aimDirY, curve, speed };
}

function throwPiece(params) {
  if (!game.launcherReady) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player");
  p.vx = params.dirX * params.speed;
  p.vy = params.dirY * params.speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.launcherReady = false;
  game.chainCountThisThrow = 0;
}

/* ---------- 物理更新(PROTO2から不変) ---------- */
function physicsStep() {
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const speed = Math.hypot(p.vx, p.vy);
    if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

    // カーブ:速度に比例した横加速度(1フレームあたりの回頭角が一定)+累積回頭角の上限
    if (p.curve && Math.abs(p.curveTurned) < CONFIG.CURVE_MAX_ANGLE) {
      const px = -p.vy / speed, py = p.vx / speed;
      const curveAccel = CONFIG.CURVE_STRENGTH * p.curve * speed;
      p.vx += px * curveAccel;
      p.vy += py * curveAccel;
      p.curveTurned += CONFIG.CURVE_STRENGTH * p.curve;
    }

    p.vx *= CONFIG.FRICTION;
    p.vy *= CONFIG.FRICTION;

    const ns = Math.hypot(p.vx, p.vy);
    if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

    p.x += p.vx;
    p.y += p.vy;

    if (ns > 0.01) {
      const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
      p.rot += (ns / CONFIG.PIECE_RADIUS) * (sign || 1);
    }
  }

  // ピース間の弾性衝突(円同士、質量均一)
  const arr = game.pieces;
  for (let i = 0; i < arr.length; i++) {
    const a = arr[i];
    if (a.state !== "onboard") continue;
    for (let j = i + 1; j < arr.length; j++) {
      const b = arr[j];
      if (b.state !== "onboard") continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = CONFIG.PIECE_RADIUS * 2;
      if (dist >= minDist || dist === 0) continue;

      const nx = dx / dist, ny = dy / dist;
      const overlap = minDist - dist;
      a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

      const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (rvn < 0) {
        const imp = -(1 + CONFIG.RESTITUTION) * rvn / 2;
        a.vx -= imp * nx; a.vy -= imp * ny;
        b.vx += imp * nx; b.vy += imp * ny;
      }
    }
  }

  // 盤外判定:縁を越える速度があれば場外消滅、なければ縁で停止
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const r = Math.hypot(p.x, p.y);
    const limit = CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 0.3;
    if (r <= limit) continue;
    const nx = p.x / r, ny = p.y / r;
    const vr = p.vx * nx + p.vy * ny;
    if (vr >= CONFIG.RIM_EXIT_SPEED) {
      p.state = "exiting";
      p.fallT = 0;
      if (p.role === "target") game.chainCountThisThrow++;
      continue;
    }
    if (vr > 0) { p.vx -= vr * nx; p.vy -= vr * ny; }
    p.x = nx * limit; p.y = ny * limit;
  }

  // 退場アニメーション
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // ランチャー再有効化:盤上の全ピースが静止したら次を投げられる
  if (!game.launcherReady) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) {
      game.launcherReady = true;
      if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    }
  }

  updateHUD();
}

function showChainToast(n) {
  const el = document.getElementById("chainToast");
  el.textContent = n + "個 同時テイクアウト!";
  el.classList.add("show");
  game.toastTimer = 1.4;
}

/* ---------- メインループ(固定タイムステップ) ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  render();
  requestAnimationFrame(frame);
}

/* ---------- 描画(PROTO3:盤=上半分、下半分=発射UI) ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function controlTop() { return window.innerHeight * 0.5; } // 下半分=操作エリアの境界

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // 盤は画面の上半分に収める(上部のHUD/ボタン分を差し引いた帯の中央)
  const topBar = 40;
  const availH = h * 0.5 - topBar - 8;
  const Rs = Math.min(w * 0.46, availH * 0.5);
  view.scale = Rs / CONFIG.BOARD_RADIUS;
  view.cx = w / 2;
  view.cy = topBar + availH / 2 + 4;
}
window.addEventListener("resize", onResize);

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}

const ROLE_COLOR = { player: "#6fa8ff", target: "#ff9a52", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 操作エリア(下半分)の薄い区分け
  ctx.fillStyle = "rgba(255,255,255,0.025)";
  ctx.fillRect(0, controlTop(), w, h - controlTop());
  ctx.strokeStyle = "rgba(255,255,255,0.07)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, controlTop());
  ctx.lineTo(w, controlTop());
  ctx.stroke();

  // 盤
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "#3a3a44";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "#26262e";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.015, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fill();
  ctx.restore();

  // ランチャー(弓を引いている間は石が少し後ろへ下がる演出)
  const launchBase = toScreen(launcherPos().x, launcherPos().y);
  const a = game.aim;
  let stoneX = launchBase.x, stoneY = launchBase.y;
  if (a && a.state === "drawn") {
    const off = Math.min(a.drawDist, 80) * 0.3;
    stoneX -= a.aimDirX * off;
    stoneY -= a.aimDirY * off;
  }
  ctx.beginPath();
  ctx.arc(launchBase.x, launchBase.y, CONFIG.PIECE_RADIUS * view.scale * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(111,168,255,0.7)" : "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();
  if (game.launcherReady) {
    drawPiece(stoneX, stoneY, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // 弓引きUI(下半分)
  if (a) {
    // 狙いライン:ランチャーから盤を横切る長いガイド。aim中は白、drawn(固定)中は色を変えて明示
    const locked = a.state === "drawn";
    const guideLen = R * 2.3;
    ctx.beginPath();
    ctx.moveTo(launchBase.x, launchBase.y);
    ctx.lineTo(launchBase.x + a.aimDirX * guideLen, launchBase.y + a.aimDirY * guideLen);
    ctx.strokeStyle = locked ? "rgba(255,196,90,0.75)" : "rgba(255,255,255,0.3)";
    ctx.lineWidth = locked ? 3 : 2;
    ctx.stroke();

    // アンカー(タッチ開始点)とデッドゾーン
    ctx.beginPath();
    ctx.arc(a.p0x, a.p0y, CONFIG.AIM_DEADZONE, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // アンカー→指の線
    ctx.beginPath();
    ctx.moveTo(a.p0x, a.p0y);
    ctx.lineTo(a.fx, a.fy);
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 溜めゲージ:drawn中、アンカーから後方へ引いた分だけ伸び太くなる
    if (locked) {
      const powerFrac = clamp(a.drawDist * CONFIG.DRAW_TO_SPEED_SCALE / CONFIG.MAX_THROW_SPEED, 0, 1);
      const gLen = Math.min(a.drawDist, CONFIG.MAX_THROW_SPEED / CONFIG.DRAW_TO_SPEED_SCALE);
      ctx.beginPath();
      ctx.moveTo(a.p0x, a.p0y);
      ctx.lineTo(a.p0x - a.aimDirX * gLen, a.p0y - a.aimDirY * gLen);
      ctx.strokeStyle = `rgba(255,196,90,${0.5 + 0.5 * powerFrac})`;
      ctx.lineWidth = 4 + powerFrac * 10;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    // 指位置マーカー
    ctx.beginPath();
    ctx.arc(a.fx, a.fy, 10, 0, Math.PI * 2);
    ctx.fillStyle = locked ? "rgba(255,196,90,0.5)" : "rgba(111,168,255,0.5)";
    ctx.fill();
  }

  // ピース
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = CONFIG.PIECE_RADIUS * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, ROLE_COLOR[p.role], p.rot, alpha);
  }
}

// プレースホルダ描画:単色円+半円塗り分け+1本線
function drawPiece(x, y, r, color, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, r);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard").length;
  const s = onboard + "|" + game.scenario;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("countText").textContent = onboard;
  document.getElementById("scenarioNameText").textContent = SCENARIO_NAMES[game.scenario];
}

/* ---------- 入力(下半分の操作エリアのみ受け付け) ---------- */
window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar")) return;
  if (game.aim !== null || !game.launcherReady) return;
  if (e.clientY < controlTop()) return; // 上半分(盤側)のタッチは無視
  e.preventDefault();
  startAim(e.pointerId, e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  updateAim(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  const aim = game.aim;
  game.aim = null;
  const params = finalizeAim(aim, e.clientX, e.clientY);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => { game.aim = null; });

/* ---------- シナリオ・リセットボタン ---------- */
function bindScenarioButtons() {
  const map = { sc1: 1, sc2: 2, sc3: 3, sc4: 4 };
  for (const id in map) {
    document.getElementById(id).addEventListener("pointerdown", (e) => {
      e.stopPropagation(); e.preventDefault();
      buildScenario(map[id]);
      highlightScenarioButton();
    });
  }
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildScenario(game.scenario);
  });
}
function highlightScenarioButton() {
  for (const id of ["sc1", "sc2", "sc3", "sc4"]) document.getElementById(id).classList.remove("active");
  document.getElementById("sc" + game.scenario).classList.add("active");
}

/* ---------- 起動 ---------- */
onResize();
bindScenarioButtons();
buildScenario(1);
highlightScenarioButton();
requestAnimationFrame(frame);
</script>
