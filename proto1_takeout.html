<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テイクアウト手触り検証 PROTO1</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c22;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 12px;
    color: #e8e4dc;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    display: flex; align-items: center; gap: 12px;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  #scenarioBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    background: #34343e; color: #e8e4dc;
    border: 1px solid #4c4c58; border-radius: 8px;
    padding: 9px 12px; font-size: 12px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: #4a3838; border-color: #6a4c4c; }
  #resetBtn:active { background: #5c4646; }
  #chainToast {
    position: fixed; left: 50%; top: 30%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #ffd67a;
    font-family: system-ui, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO1</span>テイクアウト検証</span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span id="scenarioNameText"></span>
</div>
<div id="chainToast"></div>
<div id="scenarioBar">
  <button class="btn" id="sc1">① 単体</button>
  <button class="btn" id="sc2">② 密集</button>
  <button class="btn" id="sc3">③ 壁越え</button>
  <button class="btn" id="sc4">④ フリー</button>
  <button class="btn" id="resetBtn">リセット</button>
</div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO1_INSTRUCTIONS.md 指定値をそのまま採用。
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位で扱う(FRICTIONが「1フレームごとの
 * 減衰率」と明記されているため、dtでスケーリングせずこの単位系に統一する)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  FRICTION: 0.985,       // 1フレームごとの速度減衰率
  CURVE_STRENGTH: 0.15,  // カーブ量→横加速度の変換係数(px/frame² 相当)
  RESTITUTION: 0.6,      // ピース間反発係数
  MIN_SWIPE_DIST: 20,    // これ未満のドラッグは投げない(px、開始→終了の直線距離)
  THROW_POWER_SCALE: 1.0,// ドラッグ速度→初速の変換係数
  PIECE_RADIUS: 24,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- 指示書のCONFIG一覧にない追加値(メカニクス上必須なため導入、理由を明記) --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止。
                          // 「勢いがあれば場外、遅ければ縁で止まる」の分岐に必要な閾値だが指示書のCONFIG例になかったため追加。
                          // 初期値1.1では、単体ターゲット中央への全力直撃(命中直後5.0px/frame)ですら
                          // FRICTION=0.985の減衰で縁到達時には0.7px/frameまで落ち、閾値未満で止まってしまい
                          // コアの「弾き飛ばす」体験が成立しなかった(シミュレーションで確認)。0.5へ引き下げ。
  CURVE_SAMPLE_SPAN: 0.35, // 曲率検出:直線距離に対してこの比率だけ膨らんだ軌跡を curve=1.0 とみなす正規化係数
  MAX_THROW_SPEED: 10.0,  // 初速の上限(px/frame)。FRICTION=0.985での制動距離は速度/(1-0.985)≈盤直径相当になるよう調整済み(実測:普通の速さのフリックはほぼこの上限に張り付くため、7→10に引き上げて強さの差が出るようにした)
  MIN_THROW_SPEED: 1.4,  // 初速の下限(px/frame)。閾値ギリギリのドラッグでも手応えのある速度を保証
  PLACE_MARGIN: 0.72,    // シナリオ配置がBOARD_RADIUSの何割以内に収まるか
};

/* =========================================================================
 * ここからプロトタイプ本体
 * ========================================================================= */

const PHASE = { PLAY: "PLAY" }; // 単一フェーズのみ(スコア・ゲームオーバーなし)

const game = {
  pieces: [],          // { x, y, vx, vy, rot, role, state }
  scenario: 1,
  launcherReady: true, // 直前に投げたピースが停止/退場したら次を投げられる
  dragPts: null,       // ドラッグ中の軌跡サンプル
  chainCountThisThrow: 0,
  toastTimer: 0,
};

// 論理座標(盤中心が原点)。ランチャーは盤の下寄り内側に固定
function launcherPos() {
  return { x: 0, y: CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 2.4 };
}

function createPiece(x, y, role) {
  return {
    x, y, vx: 0, vy: 0, rot: 0,
    role,              // 'player' | 'target' | 'wall'
    state: "onboard",  // onboard / exiting / removed
    fallT: 0,
    justHit: false,    // このフレームで衝突→退場したか(連鎖カウント用)
  };
}

/* ---------- シナリオ配置 ---------- */
function placeNonOverlapping(count, avoid) {
  const out = [];
  const R = CONFIG.BOARD_RADIUS * CONFIG.PLACE_MARGIN;
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 80 && !placed; attempt++) {
      const r = Math.sqrt(Math.random()) * R;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      let ok = true;
      for (const o of out) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 2 + 6) { ok = false; break; }
      }
      for (const o of avoid) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 3) { ok = false; break; }
      }
      if (ok) { out.push({ x, y }); placed = true; }
    }
    if (!placed) out.push({ x: 0, y: -R * (i + 1) / (count + 1) });
  }
  return out;
}

const SCENARIO_NAMES = { 1: "① 単体ターゲット", 2: "② 密集ターゲット", 3: "③ 壁越え", 4: "④ フリー配置" };

function buildScenario(n) {
  game.pieces = [];
  const launch = launcherPos();
  if (n === 1) {
    // 単体ターゲット:盤中央付近に1個
    game.pieces.push(createPiece(0, -20, "target"));
  } else if (n === 2) {
    // 密集ターゲット:上寄りに4個を近接配置(連鎖テイクアウトの検証用)
    // ±26pxの正方配置(隣接間距離52px=直径48pxよりわずかに広いだけ)で、
    // 初期配置時点でピース同士が重ならないギリギリの密集度にしてある
    // (±14/±30の非対称配置だと縦の対だけ44px<48pxで初期重なりが発生していたため修正)
    const cx = 0, cy = -140;
    const offs = [[-26, -26], [26, -26], [-26, 26], [26, 26]];
    for (const [ox, oy] of offs) game.pieces.push(createPiece(cx + ox, cy + oy, "target"));
  } else if (n === 3) {
    // 壁越え:ランチャーとターゲットを結ぶ直線上に壁ピースを1個
    const target = { x: 0, y: -150 };
    const wall = { x: (launch.x + target.x) / 2, y: (launch.y + target.y) / 2 };
    game.pieces.push(createPiece(target.x, target.y, "target"));
    game.pieces.push(createPiece(wall.x, wall.y, "wall"));
  } else if (n === 4) {
    // フリー配置:5〜8個をランダム配置(リセットのたび再配置)
    const count = 5 + Math.floor(Math.random() * 4);
    const spots = placeNonOverlapping(count, [launch]);
    for (const s of spots) game.pieces.push(createPiece(s.x, s.y, "target"));
  }
  game.scenario = n;
  game.launcherReady = true;
  updateHUD();
}

/* ---------- 投擲パラメータの算出(ドラッグ軌跡→方向・カーブ・威力) ---------- */
function computeThrow(points) {
  const start = points[0], end = points[points.length - 1];
  const straightDist = Math.hypot(end.x - start.x, end.y - start.y);
  if (straightDist < CONFIG.MIN_SWIPE_DIST) return null;

  let pathLen = 0;
  for (let i = 1; i < points.length; i++) {
    pathLen += Math.hypot(points[i].x - points[i - 1].x, points[i].y - points[i - 1].y);
  }
  const duration = Math.max(16, end.t - start.t); // ms、0除算回避

  const dirX = (end.x - start.x) / straightDist;
  const dirY = (end.y - start.y) / straightDist;

  // 曲率:開始→終了の直線に対する軌跡の最大垂直ズレ(符号付き)を直線距離で正規化
  let maxDev = 0;
  for (const p of points) {
    const vx = p.x - start.x, vy = p.y - start.y;
    const cross = dirX * vy - dirY * vx; // 直線からの符号付き垂直距離
    if (Math.abs(cross) > Math.abs(maxDev)) maxDev = cross;
  }
  const curve = clamp(maxDev / (straightDist * CONFIG.CURVE_SAMPLE_SPAN), -1, 1);

  // 威力:軌跡の平均速度(px/ms)を px/frame 相当へ変換(1000ms/60frame ≈ 16.67)
  const avgSpeed = (pathLen / duration) * 16.67 * CONFIG.THROW_POWER_SCALE;
  const speed = clamp(avgSpeed, CONFIG.MIN_THROW_SPEED, CONFIG.MAX_THROW_SPEED);

  return { dirX, dirY, curve, speed };
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function throwPiece(params) {
  if (!game.launcherReady) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player");
  p.vx = params.dirX * params.speed;
  p.vy = params.dirY * params.speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.launcherReady = false;
  game.chainCountThisThrow = 0;
}

/* ---------- 物理更新(1フレーム=1ステップ、CONFIGはこの単位系) ---------- */
function physicsStep() {
  // 移動・カーブ・摩擦
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const speed = Math.hypot(p.vx, p.vy);
    if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

    // カーブ:進行方向に対して常に一定の横加速度(進行方向を90°回した単位ベクトル)
    if (p.curve) {
      const px = -p.vy / speed, py = p.vx / speed; // 進行方向を反時計回りに90°回した単位ベクトル
      p.vx += px * CONFIG.CURVE_STRENGTH * p.curve;
      p.vy += py * CONFIG.CURVE_STRENGTH * p.curve;
    }

    p.vx *= CONFIG.FRICTION;
    p.vy *= CONFIG.FRICTION;

    const ns = Math.hypot(p.vx, p.vy);
    if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

    p.x += p.vx;
    p.y += p.vy;

    // 転がり回転(見た目用)
    if (ns > 0.01) {
      const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
      p.rot += (ns / CONFIG.PIECE_RADIUS) * (sign || 1);
    }
  }

  // ピース間の弾性衝突(円同士、質量均一)
  const arr = game.pieces;
  for (let i = 0; i < arr.length; i++) {
    const a = arr[i];
    if (a.state !== "onboard") continue;
    for (let j = i + 1; j < arr.length; j++) {
      const b = arr[j];
      if (b.state !== "onboard") continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = CONFIG.PIECE_RADIUS * 2;
      if (dist >= minDist || dist === 0) continue;

      const nx = dx / dist, ny = dy / dist;
      // 重なり解消(質量均一なので50/50)
      const overlap = minDist - dist;
      a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

      // 弾性衝突(質量均一→法線成分を交換)
      const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (rvn < 0) {
        const imp = -(1 + CONFIG.RESTITUTION) * rvn / 2;
        a.vx -= imp * nx; a.vy -= imp * ny;
        b.vx += imp * nx; b.vy += imp * ny;
      }
    }
  }

  // 盤外判定:縁を越える速度があれば場外消滅、なければ縁で停止
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const r = Math.hypot(p.x, p.y);
    const limit = CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 0.3;
    if (r <= limit) continue;
    const nx = p.x / r, ny = p.y / r;
    const vr = p.vx * nx + p.vy * ny; // 外向き速度成分
    if (vr >= CONFIG.RIM_EXIT_SPEED) {
      p.state = "exiting";
      p.fallT = 0;
      if (p.role === "target") game.chainCountThisThrow++;
      continue;
    }
    // 縁で停止(内側へクランプし、外向き速度を消す)
    if (vr > 0) { p.vx -= vr * nx; p.vy -= vr * ny; }
    p.x = nx * limit; p.y = ny * limit;
  }

  // 退場アニメーション(縮小+フェード)の進行、完了したら配列から除去
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // ランチャー再有効化判定:盤上の全ピースが静止(または場外退場)したら次を投げられる。
  // 「プレイヤーのピースが盤上に存在しないこと」で判定すると、投げたピースが場外に出ず
  // 停止して盤上に残るケース(縁まで届かなかった/そもそも軽く当てただけ)で
  // 永久にfalseのままになり次を投げられなくなるバグがあったため、
  // 速度ゼロ(静止)も「もう動いていない」とみなす判定に修正した。
  // これにより、玉突きの連鎖が完全に収まってから次を投げられ、連鎖数の集計も正確になる。
  if (!game.launcherReady) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) {
      game.launcherReady = true;
      if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    }
  }

  updateHUD();
}

function showChainToast(n) {
  const el = document.getElementById("chainToast");
  el.textContent = n + "個 同時テイクアウト!";
  el.classList.add("show");
  game.toastTimer = 1.4;
}

/* ---------- メインループ(固定タイムステップ、CONFIGは1ステップ=1フレームの単位系) ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  render();
  requestAnimationFrame(frame);
}

/* ---------- 描画 ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  view.scale = Math.min(w * 0.92, h * 0.72) / (CONFIG.BOARD_RADIUS * 2);
  view.cx = w / 2;
  view.cy = h * 0.46;
}
window.addEventListener("resize", onResize);

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}
function toLogical(sx, sy) {
  return { x: (sx - view.cx) / view.scale, y: (sy - view.cy) / view.scale };
}

const ROLE_COLOR = { player: "#6fa8ff", target: "#ff9a52", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 盤(完全に真上視点、傾き演出なし)
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "#3a3a44";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "#26262e";
  ctx.fill();
  // 中心マーク
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.015, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fill();
  ctx.restore();

  // ランチャー位置マーカー
  const launch = toScreen(launcherPos().x, launcherPos().y);
  ctx.beginPath();
  ctx.arc(launch.x, launch.y, CONFIG.PIECE_RADIUS * view.scale * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(111,168,255,0.7)" : "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // 未投擲時、次のピースをランチャーに表示
  if (game.launcherReady) {
    drawPiece(launch.x, launch.y, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // ドラッグ軌跡のプレビュー
  if (game.dragPts && game.dragPts.length > 1) {
    ctx.beginPath();
    ctx.moveTo(game.dragPts[0].x, game.dragPts[0].y);
    for (const p of game.dragPts) ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = "rgba(111,168,255,0.55)";
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // ピース(画面奥行きはないため単純に配列順)
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = CONFIG.PIECE_RADIUS * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, ROLE_COLOR[p.role], p.rot, alpha);
  }
}

// プレースホルダ描画:単色円+半円塗り分け+1本線(回転が視認できる程度。パーツ描画はしない)
function drawPiece(x, y, r, color, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, r);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard").length;
  const s = onboard + "|" + game.scenario;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("countText").textContent = onboard;
  document.getElementById("scenarioNameText").textContent = SCENARIO_NAMES[game.scenario];
}

/* ---------- 入力(ドラッグ→リリースで投擲) ---------- */
let activePointerId = null;

window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar")) return;
  if (activePointerId !== null || !game.launcherReady) return;
  activePointerId = e.pointerId;
  game.dragPts = [{ x: e.clientX, y: e.clientY, t: performance.now() }];
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (activePointerId !== e.pointerId || !game.dragPts) return;
  game.dragPts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (activePointerId !== e.pointerId) return;
  activePointerId = null;
  const pts = game.dragPts;
  game.dragPts = null;
  if (!pts || pts.length < 2) return;
  pts.push({ x: e.clientX, y: e.clientY, t: performance.now() });
  const params = computeThrow(pts);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => { activePointerId = null; game.dragPts = null; });

/* ---------- シナリオ・リセットボタン ---------- */
function bindScenarioButtons() {
  const map = { sc1: 1, sc2: 2, sc3: 3, sc4: 4 };
  for (const id in map) {
    document.getElementById(id).addEventListener("pointerdown", (e) => {
      e.stopPropagation(); e.preventDefault();
      buildScenario(map[id]);
      highlightScenarioButton();
    });
  }
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildScenario(game.scenario); // 現在のシナリオを再配置
  });
}
function highlightScenarioButton() {
  for (const id of ["sc1", "sc2", "sc3", "sc4"]) document.getElementById(id).classList.remove("active");
  document.getElementById("sc" + game.scenario).classList.add("active");
}

/* ---------- 起動 ---------- */
onResize();
bindScenarioButtons();
buildScenario(1);
highlightScenarioButton();
requestAnimationFrame(frame);
</script>
</body>
</html>
