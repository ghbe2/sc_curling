<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テイクアウト手触り検証 PROTO4</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c22;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0;
    padding: 8px 10px;
    color: #e8e4dc;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  /* デバッグ用ボタンは右上の脇に退避 */
  #scenarioBar {
    position: fixed; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  .btn {
    background: #34343e; color: #e8e4dc;
    border: 1px solid #4c4c58; border-radius: 6px;
    padding: 5px 8px; font-size: 10px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: #4a3838; border-color: #6a4c4c; }
  #resetBtn:active { background: #5c4646; }
  #chainToast {
    position: fixed; left: 50%; top: 26%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #ffd67a;
    font-family: system-ui, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #hint {
    position: fixed; bottom: 1.5%; left: 0; right: 0;
    text-align: center;
    color: rgba(232, 228, 220, 0.4);
    font-family: system-ui, sans-serif;
    font-size: 11px;
    pointer-events: none;
    line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO4</span>テイクアウト検証</span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span id="scenarioNameText"></span>
</div>
<div id="chainToast"></div>
<div id="scenarioBar">
  <button class="btn" id="sc1">①</button>
  <button class="btn" id="sc2">②</button>
  <button class="btn" id="sc3">③</button>
  <button class="btn" id="sc4">④</button>
  <button class="btn" id="resetBtn">RE</button>
</div>
<div id="hint">指を動かして狙う → 後ろへ引いて溜める → 放す(前へ振り抜いてもOK)<br>放す瞬間の横フリックで回転。引きを0に戻して0.5秒待つと狙い直し</div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO4:
 *  ・盤=画面上部いっぱい、投げる石=画面最下部。盤の外から滑り込ませる
 *  ・パワー10倍(DRAW_TO_SPEED_SCALE 0.05→0.5)+高速でもすり抜けないサブステップ物理
 *  ・0ポイント通過時の狙い暴れ対策(前へ抜けても0.5秒は狙い・溜めを固定保持)
 *  ・カーブ増強+軌跡トレイルでフリックの効きを可視化
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位(継続)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  FRICTION: 0.985,       // 1フレームごとの速度減衰率
  CURVE_STRENGTH: 0.02,  // カーブ量→回頭の変換係数(1フレームあたりの回頭角=これ×curve)。
                          // 0.003→0.02:パワー10倍で滑走フレーム数が1/10近くまで減り、時間比例の
                          // 回頭ではほぼ直進になってしまうため増強。遅い投げはCURVE_MAX_ANGLEの上限が効く
  CURVE_MAX_ANGLE: 1.0,  // 1投あたりの最大累積回頭角(rad)。完全旋回の構造的禁止
  RESTITUTION: 0.95,     // ピース間反発係数(ほぼ完全弾性)
  PIECE_RADIUS: 24,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- 弓引き入力 --- */
  MIN_DRAW_DIST: 20,     // 引きがこの距離(px)未満のままなら投げない(誤操作防止)
  AIM_DEADZONE: 24,      // アンカー付近で狙いを更新しない半径(通過時のガクつき防止)
  AIM_RETRACT_FREEZE: 1.5, // 1イベントあたりこのpx以上アンカーへ近づいたら狙いを凍結(引き戻し検出)
  AIM_UNLOCK_DELAY_MS: 500, // 引きを0に戻してから狙い直しが解禁されるまでの猶予(ms)。
                             // 引き→前へ振り抜いて放す投げ動作の途中で0を跨いだ瞬間に
                             // 左右移動が狙いに化けてしまう問題への対処。猶予中は狙いも溜め(発射パワー)も
                             // 直前の値で固定され、そのまま放せばそのパワーで発射される
  DRAW_TO_SPEED_SCALE: 0.5, // 引き距離(px)→初速(px/frame)。0.05→0.5(パワー10倍の指示)
  MAX_THROW_SPEED: 60,   // 初速の上限(px/frame)。120px引き切りで到達。盤直径の約1/10/フレームの弾速
  FLICK_WINDOW_MS: 120,  // リリース直前、回転(カーブ)判定に使う時間窓
  FLICK_CURVE_SCALE: 60, // 横移動量(px)→curve値への変換係数(実機で要調整)
  FLICK_CURVE_SIGN: 1,   // フリック方向とカーブ方向の対応(+1/-1)。逆に感じたら-1へ

  /* --- 表示 --- */
  SHOW_TRAIL: true,      // 投げた石の軌跡トレイル表示(カーブの効きを目視確認するための検証用)

  /* --- その他 --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止
  PLACE_MARGIN: 0.72,    // シナリオ配置がBOARD_RADIUSの何割以内に収まるか
};

/* =========================================================================
 * ここからプロトタイプ本体
 * ========================================================================= */

const game = {
  pieces: [],
  scenario: 1,
  launcherReady: true,
  aim: null,
  chainCountThisThrow: 0,
  toastTimer: 0,
};

// ランチャー(投げる石の待機位置):画面最下部に固定し、そこから盤の外を滑って盤へ入る。
// 論理座標は画面位置から逆算する(盤中心が原点)
function launcherPos() {
  return { x: 0, y: (window.innerHeight * 0.92 - view.cy) / view.scale };
}

function createPiece(x, y, role) {
  return {
    x, y, vx: 0, vy: 0, rot: 0,
    role,              // 'player' | 'target' | 'wall'
    state: "onboard",  // onboard / exiting / removed
    fallT: 0,
    curve: 0,
    curveTurned: 0,
    entered: Math.hypot(x, y) < CONFIG.BOARD_RADIUS, // 盤の中で生まれたか(盤外スタートの石は進入するまで縁判定なし)
    trail: [],         // 軌跡トレイル(検証表示用)
  };
}

/* ---------- シナリオ配置(不変) ---------- */
function placeNonOverlapping(count, avoid) {
  const out = [];
  const R = CONFIG.BOARD_RADIUS * CONFIG.PLACE_MARGIN;
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 80 && !placed; attempt++) {
      const r = Math.sqrt(Math.random()) * R;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      let ok = true;
      for (const o of out) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 2 + 6) { ok = false; break; }
      }
      for (const o of avoid) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 3) { ok = false; break; }
      }
      if (ok) { out.push({ x, y }); placed = true; }
    }
    if (!placed) out.push({ x: 0, y: -R * (i + 1) / (count + 1) });
  }
  return out;
}

const SCENARIO_NAMES = { 1: "① 単体ターゲット", 2: "② 密集ターゲット", 3: "③ 壁越え", 4: "④ フリー配置" };

function buildScenario(n) {
  game.pieces = [];
  if (n === 1) {
    game.pieces.push(createPiece(0, -20, "target"));
  } else if (n === 2) {
    const cx = 0, cy = -140;
    const offs = [[-26, -26], [26, -26], [-26, 26], [26, 26]];
    for (const [ox, oy] of offs) game.pieces.push(createPiece(cx + ox, cy + oy, "target"));
  } else if (n === 3) {
    // 壁越え:盤の下縁寄りに壁、その先にターゲット(進入コース上に壁が立つ)
    game.pieces.push(createPiece(0, -150, "target"));
    game.pieces.push(createPiece(0, 80, "wall"));
  } else if (n === 4) {
    const count = 5 + Math.floor(Math.random() * 4);
    const spots = placeNonOverlapping(count, []);
    for (const s of spots) game.pieces.push(createPiece(s.x, s.y, "target"));
  }
  game.scenario = n;
  game.launcherReady = true;
  updateHUD();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* ---------- 弓引き入力 ----------
 *  aim  : 指の方向へ狙いがリアルタイム追従(デッドゾーン・引き戻し中は凍結)
 *  drawn: アンカーの後ろへ引くと狙い固定+引き距離が溜め。
 *         前へ0を越えても AIM_UNLOCK_DELAY_MS の猶予中は狙い・溜めとも固定のまま
 *         (=引き→前へ振り抜いて放す投げ動作がそのまま通る)。
 *         猶予を過ぎて前側に留まったら aim に復帰して狙い直し。
 * ------------------------------- */
function startAim(pointerId, px0, py0) {
  game.aim = {
    pointerId,
    p0x: px0, p0y: py0,
    fx: px0, fy: py0,
    aimDirX: 0, aimDirY: -1,
    state: "aim",
    drawDist: 0,
    lastDraw: 0,        // 発射に使う溜め(後ろ側にいる間は追従、前へ抜けた猶予中は凍結値)
    frontSince: null,   // 前側(引き0)へ抜けた時刻。猶予判定用
    prevDist: 0,
    buffer: [{ x: px0, y: py0, t: performance.now() }],
  };
}

function updateAim(px, py) {
  const a = game.aim;
  if (!a) return;
  a.fx = px; a.fy = py;

  const now = performance.now();
  a.buffer.push({ x: px, y: py, t: now });
  while (a.buffer.length > 2 && now - a.buffer[0].t > CONFIG.FLICK_WINDOW_MS) a.buffer.shift();

  const dx = px - a.p0x, dy = py - a.p0y;
  const dist = Math.hypot(dx, dy);

  if (a.state === "drawn") {
    const proj = dx * a.aimDirX + dy * a.aimDirY;
    if (proj < 0) {
      // 後ろ側:溜めを追従更新、猶予タイマー解除
      a.drawDist = -proj;
      a.lastDraw = a.drawDist;
      a.frontSince = null;
    } else {
      // 前へ抜けた:即解除しない。猶予中は狙いも溜め(lastDraw)も固定のまま維持し、
      // このまま放せば lastDraw のパワーで発射される(振り抜き投げ対応)
      if (a.frontSince === null) a.frontSince = now;
      if (now - a.frontSince >= CONFIG.AIM_UNLOCK_DELAY_MS) {
        a.state = "aim";
        a.drawDist = 0;
        a.lastDraw = 0;
        a.frontSince = null;
      }
    }
  }
  if (a.state === "aim") {
    const proj = dx * a.aimDirX + dy * a.aimDirY;
    if (dist > CONFIG.AIM_DEADZONE && proj < 0) {
      a.state = "drawn";
      a.drawDist = -proj;
      a.lastDraw = a.drawDist;
      a.frontSince = null;
    } else if (dist > CONFIG.AIM_DEADZONE && dist >= a.prevDist - CONFIG.AIM_RETRACT_FREEZE) {
      a.aimDirX = dx / dist;
      a.aimDirY = dy / dist;
    }
  }
  a.prevDist = dist;
}

function finalizeAim(aim, px, py) {
  const now = performance.now();
  aim.buffer.push({ x: px, y: py, t: now });
  while (aim.buffer.length > 2 && now - aim.buffer[0].t > CONFIG.FLICK_WINDOW_MS) aim.buffer.shift();

  if (aim.state !== "drawn" || aim.lastDraw < CONFIG.MIN_DRAW_DIST) return null;

  const first = aim.buffer[0], last = aim.buffer[aim.buffer.length - 1];
  const perpX = -aim.aimDirY, perpY = aim.aimDirX;
  const lateral = (last.x - first.x) * perpX + (last.y - first.y) * perpY;
  const curve = clamp(CONFIG.FLICK_CURVE_SIGN * lateral / CONFIG.FLICK_CURVE_SCALE, -1, 1);

  const speed = clamp(aim.lastDraw * CONFIG.DRAW_TO_SPEED_SCALE, 0, CONFIG.MAX_THROW_SPEED);

  return { dirX: aim.aimDirX, dirY: aim.aimDirY, curve, speed };
}

function throwPiece(params) {
  if (!game.launcherReady) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player");
  p.vx = params.dirX * params.speed;
  p.vy = params.dirY * params.speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.launcherReady = false;
  game.chainCountThisThrow = 0;
}

/* ---------- 物理更新 ----------
 * パワー10倍化に伴い、最高速度に応じて1フレームを最大8サブステップに分割して積分する。
 * (速度60px/frame=ピース直径を1フレームで跳び越える速度でも、衝突をすり抜けない)
 * ------------------------------ */
function physicsStep() {
  let maxSpd = 0;
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const s = Math.hypot(p.vx, p.vy);
    if (s > maxSpd) maxSpd = s;
  }
  // 1サブステップの移動量がピース半径の6割以下になるよう分割
  const sub = clamp(Math.ceil(maxSpd / (CONFIG.PIECE_RADIUS * 0.6)), 1, 8);
  const k = 1 / sub;
  const fricK = Math.pow(CONFIG.FRICTION, k);

  for (let s = 0; s < sub; s++) {
    // 移動・カーブ・摩擦
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

      if (p.curve && Math.abs(p.curveTurned) < CONFIG.CURVE_MAX_ANGLE) {
        const px = -p.vy / speed, py = p.vx / speed;
        const curveAccel = CONFIG.CURVE_STRENGTH * p.curve * speed * k;
        p.vx += px * curveAccel;
        p.vy += py * curveAccel;
        p.curveTurned += CONFIG.CURVE_STRENGTH * p.curve * k;
      }

      p.vx *= fricK;
      p.vy *= fricK;

      const ns = Math.hypot(p.vx, p.vy);
      if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

      p.x += p.vx * k;
      p.y += p.vy * k;

      if (ns > 0.01) {
        const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
        p.rot += (ns * k / CONFIG.PIECE_RADIUS) * (sign || 1);
      }
    }

    // ピース間の弾性衝突(円同士、質量均一)
    const arr = game.pieces;
    for (let i = 0; i < arr.length; i++) {
      const a = arr[i];
      if (a.state !== "onboard") continue;
      for (let j = i + 1; j < arr.length; j++) {
        const b = arr[j];
        if (b.state !== "onboard") continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = CONFIG.PIECE_RADIUS * 2;
        if (dist >= minDist || dist === 0) continue;

        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

        const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
        if (rvn < 0) {
          const imp = -(1 + CONFIG.RESTITUTION) * rvn / 2;
          a.vx -= imp * nx; a.vy -= imp * ny;
          b.vx += imp * nx; b.vy += imp * ny;
        }
      }
    }

    // 盤外・進入判定
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const r = Math.hypot(p.x, p.y);
      const limit = CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 0.3;

      if (!p.entered) {
        // 盤外スタートの石:盤に入るまで縁判定なし(下から滑り込ませる)
        if (r < limit) {
          p.entered = true;
        } else {
          // 盤に届かず停止した投げ石は消す(助走路に転がったままにしない)
          if (p.vx === 0 && p.vy === 0) { p.state = "exiting"; p.fallT = 0; }
          continue;
        }
      }

      if (r <= limit) continue;
      const nx = p.x / r, ny = p.y / r;
      const vr = p.vx * nx + p.vy * ny;
      if (vr >= CONFIG.RIM_EXIT_SPEED) {
        p.state = "exiting";
        p.fallT = 0;
        if (p.role === "target") game.chainCountThisThrow++;
        continue;
      }
      if (vr > 0) { p.vx -= vr * nx; p.vy -= vr * ny; }
      p.x = nx * limit; p.y = ny * limit;
    }
  }

  // 軌跡トレイル(フレーム単位で記録)
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.role === "player" && p.state === "onboard" && (p.vx !== 0 || p.vy !== 0)) {
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 45) p.trail.shift();
      }
    }
  }

  // 退場アニメーション
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // ランチャー再有効化
  if (!game.launcherReady) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) {
      game.launcherReady = true;
      if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    }
  }

  updateHUD();
}

function showChainToast(n) {
  const el = document.getElementById("chainToast");
  el.textContent = n + "個 同時テイクアウト!";
  el.classList.add("show");
  game.toastTimer = 1.4;
}

/* ---------- メインループ ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  render();
  requestAnimationFrame(frame);
}

/* ---------- 描画(盤=上部いっぱい、石=画面最下部) ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // 盤は画面上部に大きく。下部は石の助走路+待機位置
  const topBar = 40;
  const Rs = Math.min(w * 0.46, h * 0.30);
  view.scale = Rs / CONFIG.BOARD_RADIUS;
  view.cx = w / 2;
  view.cy = topBar + Rs + 6;
}
window.addEventListener("resize", onResize);

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}

const ROLE_COLOR = { player: "#6fa8ff", target: "#ff9a52", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 盤
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "#3a3a44";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "#26262e";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.015, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fill();
  ctx.restore();

  // ランチャー(画面最下部の石)
  const launchBase = toScreen(launcherPos().x, launcherPos().y);
  const a = game.aim;
  let stoneX = launchBase.x, stoneY = launchBase.y;
  if (a && a.state === "drawn") {
    const off = Math.min(a.lastDraw, 80) * 0.3;
    stoneX -= a.aimDirX * off;
    stoneY -= a.aimDirY * off;
  }
  ctx.beginPath();
  ctx.arc(launchBase.x, launchBase.y, CONFIG.PIECE_RADIUS * view.scale * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(111,168,255,0.7)" : "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();
  if (game.launcherReady) {
    drawPiece(stoneX, stoneY, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // 弓引きUI
  if (a) {
    const locked = a.state === "drawn";
    const guideLen = h * 1.1;
    ctx.beginPath();
    ctx.moveTo(launchBase.x, launchBase.y);
    ctx.lineTo(launchBase.x + a.aimDirX * guideLen, launchBase.y + a.aimDirY * guideLen);
    ctx.strokeStyle = locked ? "rgba(255,196,90,0.75)" : "rgba(255,255,255,0.3)";
    ctx.lineWidth = locked ? 3 : 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(a.p0x, a.p0y, CONFIG.AIM_DEADZONE, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(a.p0x, a.p0y);
    ctx.lineTo(a.fx, a.fy);
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    if (locked) {
      const powerFrac = clamp(a.lastDraw * CONFIG.DRAW_TO_SPEED_SCALE / CONFIG.MAX_THROW_SPEED, 0, 1);
      const gLen = Math.min(a.lastDraw, CONFIG.MAX_THROW_SPEED / CONFIG.DRAW_TO_SPEED_SCALE);
      ctx.beginPath();
      ctx.moveTo(a.p0x, a.p0y);
      ctx.lineTo(a.p0x - a.aimDirX * gLen, a.p0y - a.aimDirY * gLen);
      ctx.strokeStyle = `rgba(255,196,90,${0.5 + 0.5 * powerFrac})`;
      ctx.lineWidth = 4 + powerFrac * 10;
      ctx.lineCap = "round";
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(a.fx, a.fy, 10, 0, Math.PI * 2);
    ctx.fillStyle = locked ? "rgba(255,196,90,0.5)" : "rgba(111,168,255,0.5)";
    ctx.fill();
  }

  // 軌跡トレイル(カーブの効きを可視化)
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.trail && p.trail.length > 1) {
        ctx.beginPath();
        const t0 = toScreen(p.trail[0].x, p.trail[0].y);
        ctx.moveTo(t0.x, t0.y);
        for (const q of p.trail) {
          const s = toScreen(q.x, q.y);
          ctx.lineTo(s.x, s.y);
        }
        ctx.strokeStyle = "rgba(111,168,255,0.3)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // ピース
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = CONFIG.PIECE_RADIUS * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, ROLE_COLOR[p.role], p.rot, alpha);
  }
}

function drawPiece(x, y, r, color, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, r);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard" && p.entered).length;
  const s = onboard + "|" + game.scenario;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("countText").textContent = onboard;
  document.getElementById("scenarioNameText").textContent = SCENARIO_NAMES[game.scenario];
}

/* ---------- 入力 ---------- */
window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar")) return;
  if (game.aim !== null || !game.launcherReady) return;
  e.preventDefault();
  startAim(e.pointerId, e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  updateAim(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  const aim = game.aim;
  game.aim = null;
  const params = finalizeAim(aim, e.clientX, e.clientY);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => { game.aim = null; });

/* ---------- シナリオ・リセットボタン ---------- */
function bindScenarioButtons() {
  const map = { sc1: 1, sc2: 2, sc3: 3, sc4: 4 };
  for (const id in map) {
    document.getElementById(id).addEventListener("pointerdown", (e) => {
      e.stopPropagation(); e.preventDefault();
      buildScenario(map[id]);
      highlightScenarioButton();
    });
  }
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildScenario(game.scenario);
  });
}
function highlightScenarioButton() {
  for (const id of ["sc1", "sc2", "sc3", "sc4"]) document.getElementById(id).classList.remove("active");
  document.getElementById("sc" + game.scenario).classList.add("active");
}

/* ---------- 起動 ---------- */
onResize();
bindScenarioButtons();
buildScenario(1);
highlightScenarioButton();
requestAnimationFrame(frame);
</script>
</body>
