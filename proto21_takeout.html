<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テイクアウト手触り検証 PROTO21</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c22;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0;
    padding: 8px 10px;
    color: #e8e4dc;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    display: flex; align-items: center; gap: 10px;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  #scenarioBar {
    position: fixed; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  .btn {
    background: #34343e; color: #e8e4dc;
    border: 1px solid #4c4c58; border-radius: 6px;
    padding: 5px 8px; font-size: 10px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: #4a3838; border-color: #6a4c4c; }
  #resetBtn:active { background: #5c4646; }
  #chainToast {
    position: fixed; left: 50%; top: 26%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #ffd67a;
    font-family: system-ui, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #hint {
    position: fixed; bottom: 1.5%; left: 0; right: 0;
    text-align: center;
    color: rgba(232, 228, 220, 0.4);
    font-family: system-ui, sans-serif;
    font-size: 11px;
    pointer-events: none;
    line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO21</span>テイクアウト検証</span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span id="scenarioNameText"></span>
</div>
<div id="chainToast"></div>
<div id="scenarioBar">
  <button class="btn" id="sc1">①</button>
  <button class="btn" id="sc2">②</button>
  <button class="btn" id="sc3">③</button>
  <button class="btn" id="sc4">④</button>
  <button class="btn" id="resetBtn">RE</button>
</div>
<div id="hint">引く(左右で狙い)→ 前に押し出す(短い=強い/長い=ゆっくり)→ 離す<br>狙いの中心線から横にズレた分だけ回転。左回転=左カーブ。引いたまま放しても投げない</div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO21:回転物理の実カーリング化+重量感演出
 *  ・回転が多いほど摩擦が減り(よく滑る)、曲がらない。回転が少ないほど曲がる
 *  ・トップスピード付近はほぼ曲がらない(従来どおり速度依存)
 *  ・衝突時、回転は相手に逆向きに伝わる(トップスピードでも回転方向に意味がある)
 *  ・画面上の滑走はスロー化(TIME_SCALE)。パワー・軌道は不変=重量感の表現
 *  ・衝突演出:強さに応じた画面揺れ+瞬間ズーム
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位(継続)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  HOUSE_RADIUS: 130,     // 新設(PROTO21、デバッグ表示用):カーリングの「ハウス」外周(青)の半径。
                          // 実カーリングの比率(12/8/4/1フィート)に合わせて内側の白・赤・ボタンを
                          // HOUSE_RADIUS×2/3, ×1/3, ×1/12で描画する。物理には一切影響しない見た目のみの値
  GRID_SPACING: 40,      // 新設(PROTO21、デバッグ表示用):盤面に重ねる格子ガイドの間隔(px)。
                          // 「どこを狙うとどこに着地するか」を数値で共有しやすくするための目安線
  FRICTION: 0.985,       // 1フレームごとの基本速度減衰率(回転なしの石)
  /* --- 衝突の並進物理(PROTO21で入射角ベースのモデルへ全面置き換え) ---
   * 旧来のRESTITUTION(反発係数)方式は「正面衝突での配分」しか調整できず、
   * 下げるほど撃った側(ショットした石)の残り速度が逆に増えてしまう構造的な限界があった
   * (等質量の正面衝突では常に 撃った側+当てられた側の速度 = 元の速度 になるため)。
   * 「正面衝突なら撃った側は完全停止・当てられた側が全速で直進、かすめるほど逆転する」
   * というビリヤードの実際の物理(90度ルール)に合わせ、入射角(0〜90度)で
   * エネルギー移行率を直接決める方式に変更した。詳細はcollision処理コード内コメント参照
   * --- */
  INCIDENCE_TRANSFER_POWER: 2.0, // 新設(PROTO21):正規化した入射角(0〜1)をこの乗数で底上げしてから
                          // sin/cosへ渡す。1.0だと素の入射角(かすめるほど撃った側の残存が
                          // 87〜99%と大きすぎ、連続衝突が重なると本来まず起きない「手前へ戻る」
                          // 挙動が出やすかった)。2.0にすると、同じ実際の入射角でも「より正面寄り」
                          // として扱われ、中間角度(30〜60度)でTへの移行量が大幅に増える
                          // (例:入射角30度の撃った側残存 52%→19%、58度で87%→65%)。
                          // 境界(0度で完全停止/100%移行、90度で無反応)は指数によらず変わらない。
                          // 90度に近いほぼ真横のかすりは物理的に「ほぼ無反応」が正しいため、
                          // そこだけは指数を上げても撃った側の残存を大きくは減らせない
  PIECE_RADIUS: 24,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- 回転(カーブ)物理:PROTO21で「回転量に比例してカーブする」方式へ変更 ---
   * 回転(curve, -1〜1)は、狙いの中心線から指がどれだけ横にズレているかで決まる「回転量」。
   * 以前は実カーリング同様「回転が多いほど直進・回転が少ないほど曲がる」で作っていたが、
   * 実機で試すと直感に反し「回転をかけてもカーブに効いてる感がない」との指摘を受け、
   * 素直な比例関係(回転が弱いほど微カーブ、強いほど大きくカーブ)に変更した。
   *  ・回頭 = CURVE_STRENGTH × curve × 速度効き(直進化の抑制項は廃止、curveに単純比例)
   *  ・摩擦は回転量によらず一定(FRICTIONのみ。PROTO21でSPIN_GLIDEを廃止、下記参照)
   * --- */
  CURVE_STRENGTH: 0.01625, // 回頭の基準値(rad/frame、速度0付近での上限)。0.0125→0.01625(×1.3):
                          // 「高回転ドローの曲がりをもう少し強く」との指摘に対応。curve×この値の
                          // 単純比例式なので、CURVE_MINも同時に1/1.3へ下げることで最小回転側の
                          // 曲がり量(約38px)は据え置きつつ、最大回転(curve=1.0)側だけを
                          // 約161px→約209pxへ強化した
  CURVE_VREF: 8,         // 回頭の速度依存の基準(px/frame)。効き = (VREF/(VREF+速度))^CURVE_SLOW_POWER
  CURVE_SLOW_POWER: 2.4, // 速度効きの非線形さ。新設:「減速してくる後半ほどきつく曲がる」を強調するため、
                          // 速度依存の効きを単純な反比例(指数1)から2.4乗に変更。速いうちはより強く
                          // 直進を保ち、終盤に近づくほど曲がりが加速度的にきつくなる(検証:全体の
                          // 曲がり角のうち約8割が滑走後半で発生するようになった。旧実装は5割程度)
  // SPIN_GLIDE(回転による摩擦低減)はPROTO21で廃止。ユーザーが送ってくれた手描きの軌道イメージ
  // (最低パワー・最大回転は盤の縁付近で止まる/最低パワーでも回転が弱いほど奥まで進む)と、
  // このゲームの摩擦低減の組み合わせが正反対の関係になっていた:回転が強いほど滑って伸びる
  // 効果があると、同じ最低パワーでも強い回転の方が奥まで進んでしまい、「強く曲げるほど
  // 弧を描く分だけ手前で止まる(=直進より奥まで届かない)」という自然な見た目にならなかった。
  // 摩擦を回転量によらず一定にすると、同じ滑走距離(弧の長さ)を横方向にどれだけ使うかで
  // 曲がり方向の到達点が決まるようになり、手描きイメージの関係性と一致した
  CURVE_MAX_ANGLE: 1.4,  // 1投あたりの最大累積回頭角(rad)。完全旋回の構造的な防止弁
  CURVE_MIN: 0.1154,     // 投球時の回転の最小値(無回転の排除。実カーリングの無回転ランダム挙動は不採用)。
                          // 0.15→0.1154:CURVE_STRENGTHを1.3倍にした分だけ下げ、curve×CURVE_STRENGTHの
                          // 積(=最小回転時の曲がり量)を据え置いた。この値のとき「微カーブ」になる

  /* --- ストーンの見た目の自転(スピン表示):PROTO21で「実時間あたりの回転速度」方式に変更 ---
   * 旧実装は「中パワーでリングに届くまでの基準フレーム数」に対して何回転させるかを
   * 指定していたが、実際は弱回転ほど盤上をほぼ真っすぐ長く漂って滑走時間が非常に長くなり
   * (実測:同条件で弱回転25秒 vs 強回転10秒)、レート自体は正しく4倍でも滑走時間の差で
   * 打ち消し合い、見た目の総回転数の差が1.7倍程度まで薄まってしまっていた。
   * そこで滑走時間に依存しない「実1秒あたりの回転数(rps)」を直接指定する方式に変更。
   * どの投球についても、見ている間のスピン速度そのものが常に約4倍の差になる
   * --- */
  SPIN_VISUAL_MIN_RPS: 0.3,  // CURVE_MIN(最も曲がる)時の自転速度(実1秒あたりの回転数)
  SPIN_VISUAL_MAX_RPS: 1.2,  // curve=1.0(ほぼ直進)時の自転速度(同、ちょうど4倍)

  /* --- 衝突時の回転伝達(逆回転が移る) --- */
  SPIN_TRANSFER: 0.6,    // 衝突相手から受け取る逆回転の割合。自分の回転×この値が「逆向き」で相手に付く
  SPIN_HIT_DECAY: 0.3,   // 衝突時に自分の回転が失われる割合
  SPIN_TRANSFER_MIN_IMPACT: 2, // 回転伝達が起きる最小衝突速度(px/frame)。静止接触での回転汚染を防ぐ

  /* --- 投球操作(引く→押し出す→離す) --- */
  MIN_DRAW_DIST: 20,     // 引きがこの距離(px)未満なら投げない
  AIM_DEADZONE: 16,      // アンカーからこの距離までは引き扱いにしない(誤操作防止)
  AIM_SMOOTH_RANGE: 40,  // 新設:アンカー近く(AIM_DEADZONE直後)ほど狙い方向の更新を弱め、
                          // 距離がこの分だけ離れると通常どおり即座に追従するようにする「信頼度」の幅。
                          // 引き→押し出しの折り返しで指がアンカー付近をかすめると、狙い方向が
                          // 一瞬だけ大きく暴れる問題への対処(距離が短いほど角度が不安定なため)
  MAX_AIM_ANGLE: 1.22,   // 狙いの向きを「真上」からこの角度(rad、約70°)以内に制限する。新設:
                          // 引く方向次第で盤と逆向き(後ろ向き)にも投げられてしまっていたのを防ぐ。
                          // 真上から左右70°=ほぼ水平近くまでは許容しつつ、後方(盤と逆側)は禁止する
  PUSH_START_THRESH: 12, // アンカー(ボールの元の位置)からこのpx分「前」へ出たら「押し出し」開始とみなす
                          // (狙い・基礎パワー固定)。PROTO21で基準を「最深点からの戻り量」から
                          // 「アンカーからの前方距離」に変更し、一度ボールの元の位置まで戻さないと
                          // パワー調整(押し出し)が始まらないようにした
  REDRAW_THRESH: 45,     // 押し出し中にアンカーよりこのpx分後ろへ戻ったら「引き」に戻る(狙い直し可能)。
                          // 10→45:強いフリック動作は指が斜めに大きく動く際、狙い軸方向にも
                          // 数十px戻ることがあり、10だと「引き直し」と誤認され押し出しが
                          // キャンセルされてしまっていた
  MIN_PUSH_DIST: 15,     // 押し出しがこの距離未満のままのリリースは投げない(=引いて放しただけでは飛ばない)
  PUSH_MAX_POWER_RANGE: 20, // 新設:アンカーからこのpx分までは押し出し係数を1.0(全力)のまま維持する
                          // 「猶予」区間。最大パワーを出せる範囲が実質1点(pushDist=0)しかなく
                          // 操作しづらいとの指摘があったため、序盤に平坦なゾーンを設けて緩和した。
                          // 40→20(PROTO21):後述のPUSH_SOFT_RANGE短縮とあわせ、パワー調整の
                          // 可動域全体をコンパクトにする
  PUSH_SOFT_RANGE: 140,  // 押し出し距離がこの長さでパワー係数が最小になる(px)。320→140(PROTO21):
                          // 「最低パワーにするまでの移動距離が長い。コンパクトな動きで調整したい」
                          // との指摘に対応し、全力〜最弱までの可動域を280px→120pxへ大幅短縮
  PUSH_MIN_COEF: 0.08,   // 最長押し出し時のパワー係数。0.4→0.08:0.4だと、狙いを大きく引いてから
                          // 最大まで押し出した「最弱のつもり」の投球でも speed が20前後まで残り、
                          // MIN_THROW_SPEEDの下限保護が働かないまま盤の奥まで届いてしまっていた。
                          // 0.08まで下げると引きの深さによらず最大押し出し時はMIN_THROW_SPEED付近まで
                          // 落ち、「最弱に投げたらサークルに届かない」を引きの強さに関係なく保証できる
  DRAW_TO_SPEED_SCALE: 0.5, // 引き距離(px)→基礎初速(px/frame)。0.25→0.5:ランチャーが画面最下部にあるため
                          // 下に引けるスペースが実機では60〜80px程度しかなく、0.25では基礎パワーが
                          // 上限の半分にも届かなかった。60〜80pxの引きで上限に達するよう再調整
  MAX_THROW_SPEED: 46,   // 基礎初速の上限(px/frame)。40→46:「最大パワーの石をもう少し速く」との
                          // 指示で+15%。摩擦で盤中央到達時に約半分まで減速するため、
                          // 中央での衝突速度25前後=重い一撃が出るよう引き上げ(80px引き切りで到達)
  MIN_THROW_SPEED: 13.0,  // 発射される最低速度(px/frame)。10.3→12.8(PROTO19)→13.0(PROTO21)。
                          // PROTO18では「円」を盤全体(BOARD_RADIUS=320)の縁だと解釈していたが、
                          // PROTO19で追加したハウス表示(HOUSE_RADIUS=130)を見て「円=ハウス」を
                          // 指していたと判明し12.8へ。さらにPROTO21でSPIN_GLIDEを廃止した際、
                          // 摩擦が変わったため13.0へ再調整。CURVE_MIN側はr≈131.7でハウスの外周に
                          // 着地し、回転が強いほど「弧を描く分だけ手前で止まる」ようになったため、
                          // 最大回転側はr≈304(盤の縁付近、盤内に留まる)・横ズレ約216pxとなる
  CURVE_DIST_SCALE: 75,  // 狙いの中心線からの横ズレ(px)→curve値への変換係数。curve=横ズレ/この値をクランプ。
                          // 60→75:カーブを決めるスワイプの感度を少し落として、狙いを定める際の
                          // 誤操作(意図せず強い回転が乗ってしまう)を減らす
                          // PROTO21で時間窓(旧FLICK_WINDOW_MS)を廃止し、時間に関係なく「いま指が
                          // 中心線からどれだけ離れているか」の位置だけを見る方式に変更した。
                          // 理由:リリース直前120msだけを見る方式だと、早めに横へ大きくズレても
                          // リリースの瞬間に中心へ戻す/止まる動きをすると直近の移動量が小さくなり
                          // 回転が弱く判定されてしまい、「中心から離れるほど回転が強い」という
                          // 意図から外れていた。フリックでもゆっくりしたスワイプでも、離れた分だけ
                          // 回転がかかるようにする
  FLICK_CURVE_SIGN: 1,   // 横ズレの向きと回転方向の対応(+1/-1)。逆に感じたら-1へ

  /* --- 投球UI:パワー(色)とカーブ範囲(扇)の可視化 --- */
  POWER_COLOR_STRONG: [230, 40, 30],   // 短い押し出し=強いショットの色(赤)
  POWER_COLOR_WEAK: [255, 214, 200],   // 長い押し出し=弱いショットの色(淡いパステル)
  FAN_MAX_ANGLE: 0.46,   // 回転が最大(1.0)のときの扇の半開き角(rad、約26°)。大きく曲がる可能性を広く見せる
  FAN_MIN_ANGLE: 0.05,   // 回転が最小(CURVE_MIN)のときの扇の半開き角(rad、約3°)。ほぼ直線に近い狭さ

  /* --- 表示・演出 --- */
  SHOW_TRAIL: true,      // 軌跡トレイル表示(カーブの目視確認用)
  TIME_SCALE: 0.2625,    // シミュレーション再生速度。1.0=等速。0.525→0.2625:「下げる前の50%のスピード」
                          // という指示どおり、直前の値からさらに半分に。画面上の滑走だけを遅くする
                          // (物理の軌道・衝突・パワーは完全に不変)。カーリングらしく行方を見守る間を作る
  TAIL_FASTFORWARD_DELAY_SEC: 2.5, // 新設(PROTO21):投球から実時間でこの秒数が経ってもまだ
                          // 石が止まっていない場合、演出用の早送りを開始する。「回転が止まるまで
                          // くるくる待つのがスマホゲーとして冗長」との指摘に対応。カーリングらしい
                          // 「見守る間」自体は序盤(TIME_SCALEのゆっくりした滑走)で表現できている
                          // ので、終盤のダラダラした残りだけを短縮する
  TAIL_FASTFORWARD_RAMP_SEC: 1.0, // 早送り開始から、最大倍率に達するまでのランプ時間(秒)。
                          // 急に速度が変わると不自然なので、1秒かけて滑らかに加速する
  TAIL_FASTFORWARD_MAX_MULT: 10, // 早送りの最大倍率(TIME_SCALEに掛ける)。物理(軌道・衝突・
                          // パワー)には触れず、見た目の再生速度だけを一時的に速める
  SHAKE_SCALE: 0.35,     // 衝突速度→画面揺れ量の変換(px per px/frame)
  SHAKE_MAX: 12,         // 画面揺れの最大(px)
  SHAKE_DECAY: 0.86,     // 揺れの減衰(描画フレームごと)
  ZOOM_SCALE: 0.0022,    // 衝突速度→瞬間ズーム量の変換
  ZOOM_MAX: 0.06,        // 瞬間ズームの最大(+6%)
  ZOOM_DECAY: 0.90,      // ズームの減衰(描画フレームごと)
  FX_MIN_IMPACT: 4,      // 演出が発動する最小衝突速度(px/frame)。小さな接触では揺らさない

  /* --- その他 --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止
  PLACE_MARGIN: 0.72,
};

/* =========================================================================
 * ここからプロトタイプ本体
 * ========================================================================= */

const game = {
  pieces: [],
  scenario: 1,
  launcherReady: true,
  aim: null,
  chainCountThisThrow: 0,
  toastTimer: 0,
  shakeMag: 0,   // 画面揺れの現在量(px)
  zoomPulse: 0,  // 瞬間ズームの現在量(スケール加算値)
  shotElapsedFrames: 0, // 新設(PROTO21):直近の投球からのphysicsStep呼び出し回数(実フレーム数)。
                        // 早送り開始タイミングの判定に使う。投球のたびthrowPiece()でリセットする
};

// ランチャー(投げる石の待機位置):画面最下部。盤の外から滑り込む
function launcherPos() {
  return { x: 0, y: (window.innerHeight * 0.92 - view.cy) / view.scale };
}

function createPiece(x, y, role) {
  return {
    x, y, vx: 0, vy: 0, rot: 0,
    role,
    state: "onboard",
    fallT: 0,
    curve: 0,
    curveTurned: 0,
    entered: Math.hypot(x, y) < CONFIG.BOARD_RADIUS,
    trail: [],
  };
}

/* ---------- シナリオ配置(不変) ---------- */
function placeNonOverlapping(count, avoid) {
  const out = [];
  const R = CONFIG.BOARD_RADIUS * CONFIG.PLACE_MARGIN;
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 80 && !placed; attempt++) {
      const r = Math.sqrt(Math.random()) * R;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      let ok = true;
      for (const o of out) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 2 + 6) { ok = false; break; }
      }
      for (const o of avoid) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 3) { ok = false; break; }
      }
      if (ok) { out.push({ x, y }); placed = true; }
    }
    if (!placed) out.push({ x: 0, y: -R * (i + 1) / (count + 1) });
  }
  return out;
}

const SCENARIO_NAMES = { 1: "① 単体ターゲット", 2: "② 密集ターゲット", 3: "③ 壁越え", 4: "④ フリー配置" };

function buildScenario(n) {
  game.pieces = [];
  if (n === 1) {
    game.pieces.push(createPiece(0, -20, "target"));
  } else if (n === 2) {
    const cx = 0, cy = -140;
    const offs = [[-26, -26], [26, -26], [-26, 26], [26, 26]];
    for (const [ox, oy] of offs) game.pieces.push(createPiece(cx + ox, cy + oy, "target"));
  } else if (n === 3) {
    game.pieces.push(createPiece(0, -150, "target"));
    game.pieces.push(createPiece(0, 80, "wall"));
  } else if (n === 4) {
    const count = 5 + Math.floor(Math.random() * 4);
    const spots = placeNonOverlapping(count, []);
    for (const s of spots) game.pieces.push(createPiece(s.x, s.y, "target"));
  }
  game.scenario = n;
  game.launcherReady = true;
  updateHUD();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// 区分線形補間(xsは昇順の校正点)。ユーザー提供の入射角チャート/表の数値を
// そのまま校正点として再現するために使う(PROTO21、衝突時の回転伝達)
function lerpTable(xs, ys, x) {
  if (x <= xs[0]) return ys[0];
  const n = xs.length;
  if (x >= xs[n - 1]) return ys[n - 1];
  for (let i = 0; i < n - 1; i++) {
    if (x <= xs[i + 1]) {
      const t = (x - xs[i]) / (xs[i + 1] - xs[i]);
      return ys[i] + (ys[i + 1] - ys[i]) * t;
    }
  }
  return ys[n - 1];
}

// 入射角(度)→自身の回転の残り割合・相手への回転伝達割合。
// ユーザー提供の「入射角 vs 回転エネルギー」チャートの数値をそのまま校正点にした
// (0度=正面:伝達0%・残り90%、30度:伝達20%・残り60%、45度:伝達50%(最大)・残り30%、
//  75度:伝達40%・残り5%、90度=かすり:双方ほぼ無反応と仮定して0%に収束させる)。
// 摩擦・ペブル等の減衰要因の物理的な内訳は再現せず、数値の傾向だけを再現する
const SPIN_ANGLE_DEG = [0, 30, 45, 75, 90];
const SPIN_SELF_RETAIN = [0.90, 0.60, 0.30, 0.05, 0.0];
const SPIN_TRANSFER_TO_OTHER = [0.00, 0.20, 0.50, 0.40, 0.0];
function spinSelfRetain(thetaRad) { return lerpTable(SPIN_ANGLE_DEG, SPIN_SELF_RETAIN, thetaRad * 180 / Math.PI); }
function spinTransferToOther(thetaRad) { return lerpTable(SPIN_ANGLE_DEG, SPIN_TRANSFER_TO_OTHER, thetaRad * 180 / Math.PI); }

/* ---------- 投球操作(引く→押し出す→離す) ----------
 *  draw : アンカー(ボールの元の位置)から引く。引きの逆方向が狙い(スリングショット式)
 *         なので、引いたまま指を左右へ動かせば狙いを調整できる。引き距離=基礎パワー。
 *  push : 指をアンカーまで戻し、さらにPUSH_START_THRESH以上「前(ボールの元の位置より前)」
 *         へ出すと押し出し開始。狙いと基礎パワー(引きの深さ)は固定。押し出し距離
 *         (アンカーからの前方距離)で係数が決まり、短い押し出し=ほぼ全力、
 *         長い押し出し=ゆっくり(PUSH_MIN_COEFまで低下、ただしPUSH_MAX_POWER_RANGE分は
 *         全力を維持する猶予がある)。REDRAW_THRESH分アンカーより後ろへ戻せば
 *         drawへ戻って狙い直せる。
 *  離す : pushでMIN_PUSH_DIST以上押し出していれば発射。
 *         drawのまま放しても発射されない(引いて放すだけでは飛ばない)。
 *         回転は「いま指が狙いの中心線からどれだけ横にズレているか」の位置だけで決まる
 *         (時間窓なし。詳細はCURVE_DIST_SCALEのコメント参照)。CURVE_MINで無回転を排除。
 * --------------------------------------------------- */
function startAim(pointerId, px0, py0) {
  game.aim = {
    pointerId,
    p0x: px0, p0y: py0,
    fx: px0, fy: py0,
    state: "draw",
    aimDirX: 0, aimDirY: -1,
    drawDist: 0,       // 現在の引き距離
    peakDraw: 0,       // 最深の引き距離(基礎パワーの元)
    pushDist: 0,       // 押し出し距離(瞬間値。フリックの後方ぶれで一時的に縮むことがある)
    peakPush: 0,       // 押し出しの最大到達値(パワー計算・投擲判定はこちらを使う)
  };
}

// 狙いの向きを「真上」からMAX_AIM_ANGLE以内に制限する(盤と逆向き=後ろ向きの投球を禁止)
function clampAimDirection(dirX, dirY) {
  const upAngle = -Math.PI / 2;
  let diff = Math.atan2(dirY, dirX) - upAngle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const finalAngle = upAngle + clamp(diff, -CONFIG.MAX_AIM_ANGLE, CONFIG.MAX_AIM_ANGLE);
  return [Math.cos(finalAngle), Math.sin(finalAngle)];
}

function updateAim(px, py) {
  const a = game.aim;
  if (!a) return;
  a.fx = px; a.fy = py;

  const dx = px - a.p0x, dy = py - a.p0y;
  const dist = Math.hypot(dx, dy);

  if (a.state === "draw") {
    if (a.peakDraw <= CONFIG.AIM_DEADZONE) {
      // まだ狙いが確立していない:デッドゾーンを出たら引き開始
      if (dist > CONFIG.AIM_DEADZONE) {
        [a.aimDirX, a.aimDirY] = clampAimDirection(-dx / dist, -dy / dist);
        a.drawDist = dist;
        a.peakDraw = dist;
      }
    } else {
      // 狙い確立後は「アンカー(ボールの元の位置)からの後方成分」で引き/押しを判定する。
      // 押し出し(パワー調整)は、指がアンカーより前へ出てから始まる。
      // 以前は「最深点からの戻り量」を基準にしていたため、深く引いたのに戻りが浅いと
      // すぐ押し出し扱いになり誤操作しやすかった。ボールの元の位置基準にすることで、
      // 「一度アンカーまで戻してから押し出す」という直感的な動きに合わせた
      const backProj = -(dx * a.aimDirX + dy * a.aimDirY); // 後ろ側が正、アンカーで0
      if (-backProj > CONFIG.PUSH_START_THRESH) {
        a.state = "push";
        a.pushDist = Math.max(0, -backProj);
        a.peakPush = a.pushDist;
      } else if (dist > CONFIG.AIM_DEADZONE && backProj > 0 && dist > a.peakDraw) {
        // 後ろ側でさらに深く引いている(=最深記録を更新中)間だけ狙い(左右調整)を更新する。
        // PROTO21:「引きながらしか左右に動けない」よう変更。指がわずかでも前へ戻り始めた
        // (dist <= peakDraw になった)瞬間、狙い方向を完全にロックする。以前は後ろ側にいる
        // 限り常に狙いを更新していたため、押し出しへ折り返す直前の微妙な前後動きでも
        // 狙いがぶれる余地が残っていた。
        // なお更新時もアンカー付近(距離が小さいほど角度が不安定)では即座に反映せず、
        // AIM_SMOOTH_RANGEの幅で徐々に追従させる(confidence)
        const [rawX, rawY] = clampAimDirection(-dx / dist, -dy / dist);
        const confidence = clamp((dist - CONFIG.AIM_DEADZONE) / CONFIG.AIM_SMOOTH_RANGE, 0, 1);
        let ndx = a.aimDirX + (rawX - a.aimDirX) * confidence;
        let ndy = a.aimDirY + (rawY - a.aimDirY) * confidence;
        const nlen = Math.hypot(ndx, ndy) || 1;
        a.aimDirX = ndx / nlen; a.aimDirY = ndy / nlen;
        a.drawDist = dist;
        a.peakDraw = dist;
      } else if (dist > CONFIG.AIM_DEADZONE && backProj > 0) {
        // 後ろ側にはいるが最深記録は更新していない(前へ戻り始めている):
        // 狙い方向はロックしたまま、引き距離の表示用の値だけ追従させる
        a.drawDist = dist;
      }
    }
  } else { // push
    // 押し出し距離 = アンカーからの前方距離(狙いは固定済み)
    const backProj = -(dx * a.aimDirX + dy * a.aimDirY); // アンカー後方成分、アンカーで0
    if (backProj > CONFIG.REDRAW_THRESH) {
      // アンカーより後ろへ戻った → 引きに戻る(狙い直し可能)
      a.state = "draw";
      a.peakDraw = dist;
      a.drawDist = dist;
    } else {
      a.pushDist = Math.max(0, -backProj);
      // 最大到達値を記録(パワー確定・投擲判定に使う)。フリックで指が一瞬後方へ
      // ぶれてpushDistが縮んでも、ここまで押していた実績は消えない
      if (a.pushDist > a.peakPush) a.peakPush = a.pushDist;
    }
  }
}

// 押し出し距離→パワー係数(短いほど強く、長いほどゆっくり)
function pushCoef(pushDist) {
  // PUSH_MAX_POWER_RANGE分は全力(1.0)を維持する猶予ゾーン。それ以降はPUSH_SOFT_RANGEまで
  // 直線的にPUSH_MIN_COEFまで下がる。最大パワーが出せる範囲を広げ、操作の余裕を作る
  if (pushDist <= CONFIG.PUSH_MAX_POWER_RANGE) return 1;
  const t = clamp((pushDist - CONFIG.PUSH_MAX_POWER_RANGE) / (CONFIG.PUSH_SOFT_RANGE - CONFIG.PUSH_MAX_POWER_RANGE), 0, 1);
  return 1 - (1 - CONFIG.PUSH_MIN_COEF) * t;
}

// パワーの強さ(pushCoef: 1=短い押し出し=強い 〜 PUSH_MIN_COEF=長い押し出し=弱い)を
// 赤(強)→淡色(弱)へ線形補間する。押し出し操作中のショット強さの可視化に使う
function powerColor(coef) {
  const t = clamp((coef - CONFIG.PUSH_MIN_COEF) / (1 - CONFIG.PUSH_MIN_COEF), 0, 1);
  const lerp = (a, b) => Math.round(a + (b - a) * t);
  return {
    r: lerp(CONFIG.POWER_COLOR_WEAK[0], CONFIG.POWER_COLOR_STRONG[0]),
    g: lerp(CONFIG.POWER_COLOR_WEAK[1], CONFIG.POWER_COLOR_STRONG[1]),
    b: lerp(CONFIG.POWER_COLOR_WEAK[2], CONFIG.POWER_COLOR_STRONG[2]),
  };
}

// 狙いの中心線(アンカーp0を通りaimDir方向へ伸びる直線)から、指の現在位置までの
// 符号付き垂直距離をcurve値(-1〜1)へ変換する。時間窓を使わない位置ベースの計算なので、
// フリックのような素早い動きでもゆっくりしたスワイプでも、中心線からの距離が同じなら同じ値になる
function lateralCurveAt(aim, px, py) {
  const dx = px - aim.p0x, dy = py - aim.p0y;
  const perpX = -aim.aimDirY, perpY = aim.aimDirX;
  const lateral = dx * perpX + dy * perpY;
  return clamp(CONFIG.FLICK_CURVE_SIGN * lateral / CONFIG.CURVE_DIST_SCALE, -1, 1);
}

// 押し出し中の「いま放したら乗るであろう回転量」の概算(0〜1、符号なし)。
// リリースを伴わない予測表示のためCURVE_MIN未満でも下限にクランプするだけに留める
function estimateLiveCurveMag(aim) {
  const raw = Math.abs(lateralCurveAt(aim, aim.fx, aim.fy));
  return Math.max(CONFIG.CURVE_MIN, raw);
}

// 回転量→扇の半開き角(rad)。PROTO21で回転とカーブが比例する方式になったため、
// 回転が弱いほど狭く(=ほぼ直進、曲がる幅が小さい)、強いほど広く(=大きく曲がる可能性)に反転した
function fanHalfAngle(curveMag) {
  const t = clamp((curveMag - CONFIG.CURVE_MIN) / (1 - CONFIG.CURVE_MIN), 0, 1);
  return CONFIG.FAN_MIN_ANGLE + (CONFIG.FAN_MAX_ANGLE - CONFIG.FAN_MIN_ANGLE) * t;
}

function finalizeAim(aim, px, py) {
  // 押し出しが浅い/そもそも押し出していない/引きが浅い → 投げない。
  // 投擲が成立するかどうかの判定だけはpeakPush(最大到達値)を使う。瞬間値pushDistだと
  // フリックの後方ぶれで一時的に0近くまで縮み、強いフリックを伴う投球ほど誤って
  // 不発になるバグがあったため。ただしパワーの「値」自体はpushDist(現在値)を使う
  // (下のコメント参照。PROTO21で変更)
  if (aim.state !== "push") return null;
  if (aim.peakPush < CONFIG.MIN_PUSH_DIST) return null;
  if (aim.peakDraw < CONFIG.MIN_DRAW_DIST) return null;

  // 回転:リリース時点で狙いの中心線からどれだけ横にズレているかで決まる(時間窓なし)。
  // 無回転は排除(最低CURVE_MINを保証)
  let curve = lateralCurveAt(aim, px, py);
  if (Math.abs(curve) < CONFIG.CURVE_MIN) {
    const sign = curve !== 0 ? Math.sign(curve) : (Math.random() < 0.5 ? -1 : 1);
    curve = sign * CONFIG.CURVE_MIN;
  }

  // パワー:基礎(引き)×押し出し係数(pushDist=現在値基準)。下限MIN_THROW_SPEEDを保証。
  // PROTO21で peakPush(最大到達値)基準から pushDist(現在値)基準へ変更。
  // 「一度パワーを下げると指を戻してもパワーが上がらない」との指摘のとおり、
  // peakPush基準だと押し出し量は記録された最大値までしか戻せず、パワー調整が
  // 一方通行(弱める一方)になっていた。前後にスワイプするだけでパワーを
  // 自由に上げ下げしてから離せるよう、リリース時点の実際の押し出し位置を使う
  const base = clamp(aim.peakDraw * CONFIG.DRAW_TO_SPEED_SCALE, 0, CONFIG.MAX_THROW_SPEED);
  const speed = clamp(base * pushCoef(aim.pushDist), CONFIG.MIN_THROW_SPEED, CONFIG.MAX_THROW_SPEED);

  return { dirX: aim.aimDirX, dirY: aim.aimDirY, curve, speed };
}

function throwPiece(params) {
  if (!game.launcherReady) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player");
  p.vx = params.dirX * params.speed;
  p.vy = params.dirY * params.speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.launcherReady = false;
  game.chainCountThisThrow = 0;
  game.shotElapsedFrames = 0; // 早送りタイマーを新しい投球のためにリセット
}

/* ---------- 物理更新(サブステップ分割、すり抜け防止) ---------- */
function physicsStep() {
  let maxSpd = 0;
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const s = Math.hypot(p.vx, p.vy);
    if (s > maxSpd) maxSpd = s;
  }
  // 早送り(PROTO21):投球から実時間でTAIL_FASTFORWARD_DELAY_SECを超えてもまだ止まっていない場合、
  // TAIL_FASTFORWARD_RAMP_SECかけて最大TAIL_FASTFORWARD_MAX_MULT倍まで滑らかに再生速度を上げる。
  // 物理(軌道・衝突・パワー)には一切触れず、kの倍率だけを変える見た目の演出
  game.shotElapsedFrames++;
  const elapsedSec = game.shotElapsedFrames / 60;
  const ffT = clamp((elapsedSec - CONFIG.TAIL_FASTFORWARD_DELAY_SEC) / CONFIG.TAIL_FASTFORWARD_RAMP_SEC, 0, 1);
  const fastForwardMult = 1 + (CONFIG.TAIL_FASTFORWARD_MAX_MULT - 1) * ffT;

  // sub:1回のphysicsStep呼び出しを何分割するか(すり抜け・カーブ積分誤差の防止)。
  // 通常分(fastForwardMult=1のときと同じ刻み幅)に、早送り倍率をそのまま掛けて
  // サブステップ数を増やす。1サブステップあたりの時間幅(k)は早送り倍率に依存せず
  // 常に同じになるため、早送り中も曲がり方の積分精度が変わらない(=物理は変えず、
  // 1回のphysicsStep呼び出しでこなす「量」だけを増やして早送りする)。
  // 早送りなし(倍率×1)でも常にTIME_SCALEを掛けてしまうと、TIME_SCALE<1の分だけ
  // 通常時の刻み幅も従来より粗くなってしまうため、TIME_SCALEはkの方にだけ掛ける
  const subBase = Math.ceil(maxSpd / (CONFIG.PIECE_RADIUS * 0.6));
  const sub = clamp(Math.ceil(subBase * fastForwardMult), 1, 80);

  // k = このpysicsStep呼び出しで進める「シミュレーション上の時間の割合」。
  // TIME_SCALEをここに掛けることで、physicsStep自体は毎実フレーム(60Hz)呼び続けながら
  // 1回あたりの進み幅だけを縮める。これにより描画される位置が実フレームごとに滑らかに
  // 更新され続ける(旧実装はaccumulator側をTIME_SCALEで縮めてphysicsStepの呼び出し頻度
  // 自体を落としていたため、更新の合間で位置が止まって見える「カクカク」が発生していた)
  const k = (1 / sub) * CONFIG.TIME_SCALE * fastForwardMult; // 摩擦は回転量でピースごとに変わるため、ループ内で個別に計算する

  for (let s = 0; s < sub; s++) {
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

      // 回頭:速いほど弱く(終盤に曲がる)、回転量にそのまま比例して曲がる(弱回転=微カーブ、強回転=大カーブ)
      const slow = Math.pow(CONFIG.CURVE_VREF / (CONFIG.CURVE_VREF + speed), CONFIG.CURVE_SLOW_POWER);
      if (p.curve && Math.abs(p.curveTurned) < CONFIG.CURVE_MAX_ANGLE) {
        const dTheta = CONFIG.CURVE_STRENGTH * p.curve * slow * k;
        const c = Math.cos(dTheta), sn = Math.sin(dTheta);
        const nvx = p.vx * c - p.vy * sn;
        const nvy = p.vx * sn + p.vy * c;
        p.vx = nvx; p.vy = nvy;
        p.curveTurned += dTheta;
      }

      // 摩擦:PROTO21で回転量による低減を廃止し、常にFRICTIONのみ(CONFIG冒頭コメント参照)
      const fricEff = Math.pow(CONFIG.FRICTION, k);
      p.vx *= fricEff;
      p.vy *= fricEff;

      const ns = Math.hypot(p.vx, p.vy);
      if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

      p.x += p.vx * k;
      p.y += p.vy * k;

      // 見た目の回転:回転付きの石は spinRatePerFrame(実1秒あたりの回転数)で自転する。
      // これはTIME_SCALEを含む「シミュレーション時間」ではなく実時間基準の一定レートなので、
      // kではなくsub(1回のphysicsStep呼び出し=実1/60秒をいくつのサブステップに分けたか)で割り、
      // 呼び出し全体としてちょうど1/60秒ぶんの回転になるようにする。
      // 衝突で p.curve が変化(逆回転伝達)すればレートも毎フレーム追従する。それ以外は転がり
      if (p.curve) {
        // 早送り中は見た目の自転も同じ倍率で速める(でないと移動だけ速くて自転が
        // 遅く見える、演出としての不整合が生じる)
        p.rot += spinRatePerFrame(Math.abs(p.curve)) * Math.sign(p.curve) * fastForwardMult / sub;
      } else if (ns > 0.01) {
        const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
        p.rot += (ns * k / CONFIG.PIECE_RADIUS) * (sign || 1);
      }
    }

    // ピース間の弾性衝突
    const arr = game.pieces;
    for (let i = 0; i < arr.length; i++) {
      const a = arr[i];
      if (a.state !== "onboard") continue;
      for (let j = i + 1; j < arr.length; j++) {
        const b = arr[j];
        if (b.state !== "onboard") continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        const minDist = CONFIG.PIECE_RADIUS * 2;
        if (dist >= minDist || dist === 0) continue;

        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

        const rvx0 = b.vx - a.vx, rvy0 = b.vy - a.vy;
        const relSpeed = Math.hypot(rvx0, rvy0);
        const rvn = rvx0 * nx + rvy0 * ny;
        if (rvn < 0) {
          // 入射角ベースの並進衝突モデル:速い側を「投げた石S」、遅い側を「あてられた石T」とし、
          // SのTに対する相対速度と接触法線(S→T)のなす角(入射角θ、0〜90度)で速度配分を決める。
          // Tは「Sの入射方向へまっすぐ」、Sは残りを「接触法線と直角の方向」へ(ビリヤードの
          // 90度ルール)。どちらが物理的なS/Tかは速度の大小で決め、配列順(a/b)には依存しない。
          // PROTO21:「実際のカーリングでは、複数の石を経由するような強烈な一撃でない限り、
          // 投げた石が手前側へ戻ってくることはまずない」との指摘。sin/cosそのままだと中間〜
          // 大きめの入射角(60〜80度)でもSに90%前後の速度が残ってしまい、連続ヒットが重なると
          // 数回の衝突だけで手前へ戻る挙動が起きやすすぎた。INCIDENCE_TRANSFER_POWERで
          // 正規化した入射角を底上げ(実際の角度より「より正面寄り」として扱う)し、0度/90度の
          // 境界条件は保ったまま、中間角度でのTへの移行量を全体的に増やしてSの残存を減らした
          const speedA = Math.hypot(a.vx, a.vy), speedB = Math.hypot(b.vx, b.vy);
          const strikerIsA = speedA >= speedB;
          const S = strikerIsA ? a : b, T = strikerIsA ? b : a;
          const nSTx = strikerIsA ? nx : -nx, nSTy = strikerIsA ? ny : -ny; // S→Tの法線
          const impact = -rvn; // 衝突の強さ(相対接近速度)

          if (relSpeed > 0.001) {
            const relVx = S.vx - T.vx, relVy = S.vy - T.vy;
            const along = relVx * nSTx + relVy * nSTy; // 法線方向成分(Sの接近速度)
            const cosThetaRaw = clamp(along / relSpeed, 0, 1);
            const theta = Math.acos(cosThetaRaw); // 実際の入射角(0〜π/2)
            const tNorm = Math.pow(theta / (Math.PI / 2), CONFIG.INCIDENCE_TRANSFER_POWER);
            const thetaEff = tNorm * (Math.PI / 2); // 底上げした実効入射角
            const cosTheta = Math.cos(thetaEff), sinTheta = Math.sin(thetaEff);

            const dirIx = relVx / relSpeed, dirIy = relVy / relSpeed; // Sの入射方向
            let tx = relVx - along * nSTx, ty = relVy - along * nSTy; // 接線成分(未正規化)
            const tLen = Math.hypot(tx, ty);
            if (tLen > 1e-6) { tx /= tLen; ty /= tLen; } else { tx = 0; ty = 0; }

            const sSpeed = relSpeed * sinTheta; // Sの新しい相対速度(接線方向)
            const tSpeed = relSpeed * cosTheta; // Tの新しい相対速度(入射方向)
            const Told_x = T.vx, Told_y = T.vy;
            S.vx = Told_x + tx * sSpeed; S.vy = Told_y + ty * sSpeed;
            T.vx = Told_x + dirIx * tSpeed; T.vy = Told_y + dirIy * tSpeed;

            // 回転の逆伝達(PROTO21):ユーザー提供の「入射角 vs 回転エネルギー」チャートの数値を
            // そのまま校正点に採用。以前は入射角に関係なく常にSPIN_HIT_DECAY/SPIN_TRANSFER固定
            // だったが、「ヒット後に回転を引き継ぎ過ぎる」との指摘のとおり、特に浅い入射角
            // (かすめる当たり)でも常に同じ量の逆回転が伝わっており、チャートの「かすめるほど
            // 伝達は弱まる(90度付近で0)」という傾向と食い違っていた。ここでのS/T(速度の
            // 大小)は上の並進モデルと同じ役割分担で、「自身」=S、「相手」=Tに対応する
            if (impact > CONFIG.SPIN_TRANSFER_MIN_IMPACT) {
              const selfRetain = spinSelfRetain(theta), transfer = spinTransferToOther(theta);
              const sCurve = S.curve, tCurve = T.curve;
              S.curve = clamp(sCurve * selfRetain - tCurve * transfer, -1, 1);
              T.curve = clamp(tCurve * selfRetain - sCurve * transfer, -1, 1);
              // 伝達で回頭上限を食い潰さないよう、衝突を機に累積回頭をリセット
              S.curveTurned = 0;
              T.curveTurned = 0;
            }
          }

          // 衝突演出:強さに応じた画面揺れ+瞬間ズーム
          if (impact > CONFIG.FX_MIN_IMPACT) {
            game.shakeMag = Math.min(CONFIG.SHAKE_MAX, game.shakeMag + impact * CONFIG.SHAKE_SCALE);
            game.zoomPulse = Math.min(CONFIG.ZOOM_MAX, game.zoomPulse + impact * CONFIG.ZOOM_SCALE);
          }
        }
      }
    }

    // 盤外・進入判定
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const r = Math.hypot(p.x, p.y);
      const limit = CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 0.3;

      if (!p.entered) {
        if (r < limit) {
          p.entered = true;
        } else {
          if (p.vx === 0 && p.vy === 0) { p.state = "exiting"; p.fallT = 0; }
          continue;
        }
      }

      if (r <= limit) continue;
      const nx = p.x / r, ny = p.y / r;
      const vr = p.vx * nx + p.vy * ny;
      if (vr >= CONFIG.RIM_EXIT_SPEED) {
        p.state = "exiting";
        p.fallT = 0;
        if (p.role === "target") game.chainCountThisThrow++;
        continue;
      }
      if (vr > 0) {
        // PROTO21:従来は法線成分だけを打ち消し、接線成分(縁に沿った滑り)は残していた。
        // 縁ぎりぎりで止まりかけている弱い投球はここに長く留まりやすく、接線成分が残ったまま
        // カーブによる回頭も継続するため、縁を舐めるように不規則にグルグル回ってから
        // 予測しづらい位置に落ち着く挙動になっていた(「最低パワーは縁ぎりぎりで止まる」を
        // 狙って調整するとまさにこの領域を使うことになり、シミュレーションが安定しなかった)。
        // 縁への到達速度がRIM_EXIT_SPEED未満(=外へ抜けるほどの勢いがない)なら、
        // 接線成分ごと完全に止めて「縁で静止」を素直な挙動にする
        p.vx = 0; p.vy = 0;
      }
      p.x = nx * limit; p.y = ny * limit;
    }
  }

  // 軌跡トレイル
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.role === "player" && p.state === "onboard" && (p.vx !== 0 || p.vy !== 0)) {
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 45) p.trail.shift();
      }
    }
  }

  // 退場アニメーション
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // ランチャー再有効化
  if (!game.launcherReady) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) {
      game.launcherReady = true;
      if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    }
  }

  updateHUD();
}

function showChainToast(n) {
  const el = document.getElementById("chainToast");
  el.textContent = n + "個 同時テイクアウト!";
  el.classList.add("show");
  game.toastTimer = 1.4;
}

/* ---------- メインループ ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  // physicsStepの呼び出し自体は実時間どおり60Hzのまま進める(なめらかさのため)。
  // TIME_SCALEはphysicsStep内部の1回あたりの進み幅(k)に掛けてあり、そちらで
  // 「シミュレーション時間だけをスローに流す」を実現している(物理の軌道・結果は完全に不変)
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  // 衝突演出の減衰(実時間=描画フレーム基準。スローの影響を受けない)
  game.shakeMag *= CONFIG.SHAKE_DECAY;
  if (game.shakeMag < 0.1) game.shakeMag = 0;
  game.zoomPulse *= CONFIG.ZOOM_DECAY;
  if (game.zoomPulse < 0.001) game.zoomPulse = 0;
  render();
  requestAnimationFrame(frame);
}

/* ---------- 描画 ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const topBar = 40;
  const Rs = Math.min(w * 0.46, h * 0.30);
  view.scale = Rs / CONFIG.BOARD_RADIUS;
  view.cx = w / 2;
  view.cy = topBar + Rs + 6;
}
window.addEventListener("resize", onResize);

// 回転量(0〜1、符号なし)→見た目の自転角速度(rad、physicsStep呼び出し1回=実時間1/60秒あたり)。
// 滑走時間(投球ごとにバラつく)に依存させず、実1秒あたりの回転数(rps)を直接指定する。
// これにより、弱回転の投球がどれだけ長く滑ろうと、見ている間のスピン速度自体は常に
// 弱⇄強で正しく約4倍の差になる(旧実装は基準フレーム数に対する回転数指定だったため、
// 弱回転ほど滑走時間が長くなる効果と打ち消し合い、体感の差が薄まっていた)
function spinRatePerFrame(curveMag) {
  const t = clamp((curveMag - CONFIG.CURVE_MIN) / (1 - CONFIG.CURVE_MIN), 0, 1);
  const rps = CONFIG.SPIN_VISUAL_MIN_RPS + (CONFIG.SPIN_VISUAL_MAX_RPS - CONFIG.SPIN_VISUAL_MIN_RPS) * t;
  return (rps * Math.PI * 2) / 60;
}

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}

const ROLE_COLOR = { player: "#6fa8ff", target: "#ff9a52", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 衝突演出:瞬間ズーム(盤中心基準)+画面揺れ
  ctx.save();
  if (game.zoomPulse > 0) {
    const z = 1 + game.zoomPulse;
    ctx.translate(view.cx, view.cy);
    ctx.scale(z, z);
    ctx.translate(-view.cx, -view.cy);
  }
  if (game.shakeMag > 0) {
    ctx.translate((Math.random() * 2 - 1) * game.shakeMag, (Math.random() * 2 - 1) * game.shakeMag);
  }

  // 盤
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "#3a3a44";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "#26262e";
  ctx.fill();

  // ハウス(カーリングの的、デバッグ表示用):外周(青)→白→赤→ボタン(白)
  const hR = CONFIG.HOUSE_RADIUS * view.scale;
  const houseRings = [
    { r: hR, color: "#3a6bc9" },        // 12フィート相当(外周・青)
    { r: hR * (2 / 3), color: "#d8d8d8" }, // 8フィート相当(白)
    { r: hR * (1 / 3), color: "#c0392b" }, // 4フィート相当(赤)
    { r: hR * (1 / 12), color: "#d8d8d8" }, // ボタン(白)
  ];
  for (const ring of houseRings) {
    ctx.beginPath();
    ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
    ctx.fillStyle = ring.color;
    ctx.fill();
  }

  // 格子ガイド(デバッグ表示用):狙い位置↔着地位置を数値で共有しやすくするための目安線。
  // 盤の円でクリップしてから、盤中心(0,0)基準の等間隔グリッドを引く
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.clip();
  const gs = CONFIG.GRID_SPACING * view.scale;
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= R * 1.05; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, -R * 1.05); ctx.lineTo(x, R * 1.05); ctx.stroke();
    if (x > 0) { ctx.beginPath(); ctx.moveTo(-x, -R * 1.05); ctx.lineTo(-x, R * 1.05); ctx.stroke(); }
  }
  for (let y = 0; y <= R * 1.05; y += gs) {
    ctx.beginPath(); ctx.moveTo(-R * 1.05, y); ctx.lineTo(R * 1.05, y); ctx.stroke();
    if (y > 0) { ctx.beginPath(); ctx.moveTo(-R * 1.05, -y); ctx.lineTo(R * 1.05, -y); ctx.stroke(); }
  }
  // 中心を通る太めの十字線(原点の目印)
  ctx.strokeStyle = "rgba(255,255,255,0.28)";
  ctx.beginPath(); ctx.moveTo(0, -R * 1.05); ctx.lineTo(0, R * 1.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-R * 1.05, 0); ctx.lineTo(R * 1.05, 0); ctx.stroke();
  ctx.restore();

  ctx.restore();

  // ランチャー(引き・押し出しに応じて石が前後する)
  const launchBase = toScreen(launcherPos().x, launcherPos().y);
  const a = game.aim;
  let stoneX = launchBase.x, stoneY = launchBase.y;
  if (a && a.state === "draw" && a.drawDist > CONFIG.AIM_DEADZONE) {
    const off = Math.min(a.drawDist, 80) * 0.3;
    stoneX -= a.aimDirX * off;
    stoneY -= a.aimDirY * off;
  } else if (a && a.state === "push") {
    const back = Math.min(a.peakDraw, 80) * 0.3;
    const fwd = Math.min(a.pushDist, 120) * 0.3;
    stoneX -= a.aimDirX * (back - fwd);
    stoneY -= a.aimDirY * (back - fwd);
  }
  ctx.beginPath();
  ctx.arc(launchBase.x, launchBase.y, CONFIG.PIECE_RADIUS * view.scale * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(111,168,255,0.7)" : "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();
  if (game.launcherReady) {
    drawPiece(stoneX, stoneY, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // 投球UI
  if (a) {
    const pushing = a.state === "push";
    const guideLen = h * 1.1;

    if (pushing) {
      // 押し出し中:狙いラインの代わりに「パワー(色)×カーブ範囲(扇の広さ)」の
      // 予測ビジュアルを描く。押すほど短くなる=強いほど赤、長く押すほど色が薄まる。
      // 扇は無回転(CURVE_MIN)ではほぼ閉じており、中心線から横に離れるほど
      // 扇が広がる=「回転が強いほど大きく曲がる」の比例関係を視覚化する
      const coef = pushCoef(a.pushDist); // 実際の投擲パワー判定と同じ基準(pushDist=現在値)で表示を揃える
      const color = powerColor(coef);
      const curveMag = estimateLiveCurveMag(a);
      const half = fanHalfAngle(curveMag);
      const ang = Math.atan2(a.aimDirY, a.aimDirX);

      const lx = launchBase.x, ly = launchBase.y;
      const leftX = lx + Math.cos(ang - half) * guideLen, leftY = ly + Math.sin(ang - half) * guideLen;
      const rightX = lx + Math.cos(ang + half) * guideLen, rightY = ly + Math.sin(ang + half) * guideLen;

      // あくまで補助情報として、石やリングより目立たない薄さに抑える
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(leftX, leftY);
      ctx.lineTo(rightX, rightY);
      ctx.closePath();
      ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},0.07)`;
      ctx.fill();
      ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.3)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 中心の狙い線(押し出し中も進行方向が分かる程度の細さ)
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + a.aimDirX * guideLen, ly + a.aimDirY * guideLen);
      ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},0.45)`;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      // 引き中:狙いに追従する単純な白線(従来どおり)
      ctx.beginPath();
      ctx.moveTo(launchBase.x, launchBase.y);
      ctx.lineTo(launchBase.x + a.aimDirX * guideLen, launchBase.y + a.aimDirY * guideLen);
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // アンカーとデッドゾーン
    ctx.beginPath();
    ctx.arc(a.p0x, a.p0y, CONFIG.AIM_DEADZONE, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.18)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // アンカー→指の線
    ctx.beginPath();
    ctx.moveTo(a.p0x, a.p0y);
    ctx.lineTo(a.fx, a.fy);
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 指位置マーカー
    ctx.beginPath();
    ctx.arc(a.fx, a.fy, 10, 0, Math.PI * 2);
    ctx.fillStyle = pushing ? "rgba(255,196,90,0.5)" : "rgba(111,168,255,0.5)";
    ctx.fill();
  }

  // 軌跡トレイル
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.trail && p.trail.length > 1) {
        ctx.beginPath();
        const t0 = toScreen(p.trail[0].x, p.trail[0].y);
        ctx.moveTo(t0.x, t0.y);
        for (const q of p.trail) {
          const s = toScreen(q.x, q.y);
          ctx.lineTo(s.x, s.y);
        }
        ctx.strokeStyle = "rgba(111,168,255,0.3)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // ピース
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = CONFIG.PIECE_RADIUS * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, ROLE_COLOR[p.role], p.rot, alpha);
  }

  ctx.restore(); // 衝突演出の変換を解除
}

function drawPiece(x, y, r, color, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, r);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard" && p.entered).length;
  const s = onboard + "|" + game.scenario;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("countText").textContent = onboard;
  document.getElementById("scenarioNameText").textContent = SCENARIO_NAMES[game.scenario];
}

/* ---------- 入力 ---------- */
window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar")) return;
  if (game.aim !== null || !game.launcherReady) return;
  e.preventDefault();
  startAim(e.pointerId, e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  updateAim(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  const aim = game.aim;
  game.aim = null;
  const params = finalizeAim(aim, e.clientX, e.clientY);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => { game.aim = null; });

/* ---------- シナリオ・リセットボタン ---------- */
function bindScenarioButtons() {
  const map = { sc1: 1, sc2: 2, sc3: 3, sc4: 4 };
  for (const id in map) {
    document.getElementById(id).addEventListener("pointerdown", (e) => {
      e.stopPropagation(); e.preventDefault();
      buildScenario(map[id]);
      highlightScenarioButton();
    });
  }
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildScenario(game.scenario);
  });
}
function highlightScenarioButton() {
  for (const id of ["sc1", "sc2", "sc3", "sc4"]) document.getElementById(id).classList.remove("active");
  document.getElementById("sc" + game.scenario).classList.add("active");
}

/* ---------- 起動 ---------- */
onResize();
bindScenarioButtons();
buildScenario(1);
highlightScenarioButton();
requestAnimationFrame(frame);
</script>
