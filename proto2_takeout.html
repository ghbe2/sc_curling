<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>テイクアウト手触り検証 PROTO2</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1c1c22;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 10px 12px;
    color: #e8e4dc;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    display: flex; align-items: center; gap: 12px;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  #scenarioBar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 10px calc(10px + env(safe-area-inset-bottom, 0px));
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    background: #34343e; color: #e8e4dc;
    border: 1px solid #4c4c58; border-radius: 8px;
    padding: 9px 12px; font-size: 12px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: #4a3838; border-color: #6a4c4c; }
  #resetBtn:active { background: #5c4646; }
  #chainToast {
    position: fixed; left: 50%; top: 30%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #ffd67a;
    font-family: system-ui, sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO2</span>テイクアウト検証</span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span id="scenarioNameText"></span>
</div>
<div id="chainToast"></div>
<div id="scenarioBar">
  <button class="btn" id="sc1">① 単体</button>
  <button class="btn" id="sc2">② 密集</button>
  <button class="btn" id="sc3">③ 壁越え</button>
  <button class="btn" id="sc4">④ フリー</button>
  <button class="btn" id="resetBtn">リセット</button>
</div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO2_INSTRUCTIONS.md の指示で変更した3点(カーブ物理式・反発係数・
 * 投擲の入力方式)を反映。それ以外(盤・シナリオ・見た目)はPROTO1から不変。
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位(PROTO1から継続)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  FRICTION: 0.985,       // 1フレームごとの速度減衰率
  CURVE_STRENGTH: 0.003, // カーブ量→横加速度の変換係数。速度比例式に変更したため単位が変わった(旧0.15とは無関係)。
                          // 実機調整前提の初期値(指示書指定どおり0.003から開始)。
  CURVE_MAX_ANGLE: 1.0,  // 1投あたりの最大累積回頭角(rad、約57度)。カーブが速度に比例する式でも
                          // 万一の完全旋回(spiral)を構造的に禁止する安全弁。ピースごとのcurveTurnedで積算管理する。
  RESTITUTION: 0.95,     // ピース間反発係数。0.6(そこそこ柔らかいゴム相当)では正面衝突でも運動量が
                          // 完全に移らず「軽い」印象だったため、御影石に近いほぼ完全弾性へ引き上げ。
                          // 1.0ぴったりにしないのは、浮動小数点誤差の蓄積で長い連鎖中にエネルギーが
                          // 増幅する可能性があるため(指示書の注意点どおり)。密集シナリオで異常増幅が
                          // 見られる場合は要報告(このプロトでは0.95より下げるかは未判断、報告のみに留める)。
  MIN_PUSH_DIST: 20,     // 溜め中にこの距離(px)以上押し出さないと投げない(誤操作防止。旧MIN_SWIPE_DISTを置き換え)
  FLICK_WINDOW_MS: 120,  // リリース直前、回転(カーブ)判定に使う時間窓
  FLICK_CURVE_SCALE: 60, // 横移動量(px、FLICK_WINDOW_MS内)→curve値への変換係数。curve=横移動量/この値をクランプ。
                          // 「指を離す直前0.12秒間に横へ素早く弾く」動作が60px程度で最大カーブになる想定の初期値。
                          // 指示書がFLICK_WINDOW_MSと共通の値を明示していないため独自に設定。実機で要調整。
  PIECE_RADIUS: 24,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- PROTO1から継続する追加値(指示書のCONFIG一覧にないが必須なため導入) --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止(PROTO1で実測調整した値)
  MAX_THROW_SPEED: 10.0, // 初速の上限(px/frame)。溜め入力方式に変わっても暴発防止の安全上限として維持
  PLACE_MARGIN: 0.72,    // シナリオ配置がBOARD_RADIUSの何割以内に収まるか

  /* --- PROTO2で新規追加(溜め距離→初速の変換。指示書に式の指定がないため独自に設定) --- */
  PUSH_TO_SPEED_SCALE: 0.05, // 溜め距離(px)→初速(px/frame)の変換係数。押し出し200px程度でMAX_THROW_SPEED(10)に
                              // 達する想定(スマホ画面で無理なく引ける距離感を基準にした初期値)。実機で要調整。
};

/* =========================================================================
 * ここからプロトタイプ本体
 * ========================================================================= */

const PHASE = { PLAY: "PLAY" }; // 単一フェーズのみ(スコア・ゲームオーバーなし)

const game = {
  pieces: [],          // { x, y, vx, vy, rot, role, state, curve, curveTurned }
  scenario: 1,
  launcherReady: true, // 直前に投げたピースが停止/退場したら次を投げられる
  aim: null,           // 狙い中(pointerdown〜pointerup)の状態。nullなら未入力
  chainCountThisThrow: 0,
  toastTimer: 0,
};

// 論理座標(盤中心が原点)。ランチャーは盤の下寄り内側に固定
function launcherPos() {
  return { x: 0, y: CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 2.4 };
}

function createPiece(x, y, role) {
  return {
    x, y, vx: 0, vy: 0, rot: 0,
    role,              // 'player' | 'target' | 'wall'
    state: "onboard",  // onboard / exiting / removed
    fallT: 0,
    curve: 0,          // このピースにかかるカーブ量(-1〜1)。プレイヤー投擲ピースのみ非ゼロ
    curveTurned: 0,    // カーブによる累積回頭角(rad)。CURVE_MAX_ANGLEに達したらカーブ打ち切り
  };
}

/* ---------- シナリオ配置 ---------- */
function placeNonOverlapping(count, avoid) {
  const out = [];
  const R = CONFIG.BOARD_RADIUS * CONFIG.PLACE_MARGIN;
  for (let i = 0; i < count; i++) {
    let placed = false;
    for (let attempt = 0; attempt < 80 && !placed; attempt++) {
      const r = Math.sqrt(Math.random()) * R;
      const a = Math.random() * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      let ok = true;
      for (const o of out) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 2 + 6) { ok = false; break; }
      }
      for (const o of avoid) {
        if (Math.hypot(o.x - x, o.y - y) < CONFIG.PIECE_RADIUS * 3) { ok = false; break; }
      }
      if (ok) { out.push({ x, y }); placed = true; }
    }
    if (!placed) out.push({ x: 0, y: -R * (i + 1) / (count + 1) });
  }
  return out;
}

const SCENARIO_NAMES = { 1: "① 単体ターゲット", 2: "② 密集ターゲット", 3: "③ 壁越え", 4: "④ フリー配置" };

function buildScenario(n) {
  game.pieces = [];
  const launch = launcherPos();
  if (n === 1) {
    // 単体ターゲット:盤中央付近に1個
    game.pieces.push(createPiece(0, -20, "target"));
  } else if (n === 2) {
    // 密集ターゲット:上寄りに4個を近接配置(連鎖テイクアウトの検証用)
    // ±26pxの正方配置(隣接間距離52px=直径48pxよりわずかに広いだけ)で、
    // 初期配置時点でピース同士が重ならないギリギリの密集度にしてある
    const cx = 0, cy = -140;
    const offs = [[-26, -26], [26, -26], [-26, 26], [26, 26]];
    for (const [ox, oy] of offs) game.pieces.push(createPiece(cx + ox, cy + oy, "target"));
  } else if (n === 3) {
    // 壁越え:ランチャーとターゲットを結ぶ直線上に壁ピースを1個
    const target = { x: 0, y: -150 };
    const wall = { x: (launch.x + target.x) / 2, y: (launch.y + target.y) / 2 };
    game.pieces.push(createPiece(target.x, target.y, "target"));
    game.pieces.push(createPiece(wall.x, wall.y, "wall"));
  } else if (n === 4) {
    // フリー配置:5〜8個をランダム配置(リセットのたび再配置)
    const count = 5 + Math.floor(Math.random() * 4);
    const spots = placeNonOverlapping(count, [launch]);
    for (const s of spots) game.pieces.push(createPiece(s.x, s.y, "target"));
  }
  game.scenario = n;
  game.launcherReady = true;
  updateHUD();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

/* ---------- 投擲パラメータの算出(狙う→溜める→放す、の3段階。PROTO2で全面置き換え) ---------- */
// 狙い開始(pointerdown):aimDirをこのジェスチャー中固定する
function startAim(pointerId, px0, py0) {
  const launch = toScreen(launcherPos().x, launcherPos().y);
  const dx = px0 - launch.x, dy = py0 - launch.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) return; // ランチャー直上をタップした等、方向が定まらない場合は狙い開始しない
  game.aim = {
    pointerId,
    p0x: px0, p0y: py0,
    aimDirX: dx / dist, aimDirY: dy / dist,
    pushDist: 0,
    buffer: [{ x: px0, y: py0, t: performance.now() }], // FLICK_WINDOW_MS分のリリース直前軌跡バッファ
  };
}

// 溜め中(pointermove):押し出し距離を更新し、カーブ判定用バッファを更新する
function updateAim(px, py) {
  const aim = game.aim;
  if (!aim) return;
  const dx = px - aim.p0x, dy = py - aim.p0y;
  const proj = dx * aim.aimDirX + dy * aim.aimDirY; // aimDirへの射影(逆方向・横方向の動きは無視)
  aim.pushDist = Math.max(0, proj);

  const now = performance.now();
  aim.buffer.push({ x: px, y: py, t: now });
  while (aim.buffer.length > 2 && now - aim.buffer[0].t > CONFIG.FLICK_WINDOW_MS) aim.buffer.shift();
}

// リリース(pointerup):直近FLICK_WINDOW_MS分の横移動からカーブを、pushDistから威力を算出
function finalizeAim(aim, px, py) {
  const now = performance.now();
  aim.buffer.push({ x: px, y: py, t: now });
  while (aim.buffer.length > 2 && now - aim.buffer[0].t > CONFIG.FLICK_WINDOW_MS) aim.buffer.shift();

  if (aim.pushDist < CONFIG.MIN_PUSH_DIST) return null; // 溜めが足りず誤操作とみなす

  // カーブ:aimDirに垂直な方向への、リリース直前の短い区間だけの移動量
  const first = aim.buffer[0], last = aim.buffer[aim.buffer.length - 1];
  const perpX = -aim.aimDirY, perpY = aim.aimDirX; // aimDirを反時計回りに90°回した垂直単位ベクトル
  const lateral = (last.x - first.x) * perpX + (last.y - first.y) * perpY;
  const curve = clamp(lateral / CONFIG.FLICK_CURVE_SCALE, -1, 1);

  // 威力:リリース時の指の速さは使わず、溜めていたpushDistから算出
  const speed = clamp(aim.pushDist * CONFIG.PUSH_TO_SPEED_SCALE, 0, CONFIG.MAX_THROW_SPEED);

  return { dirX: aim.aimDirX, dirY: aim.aimDirY, curve, speed };
}

function throwPiece(params) {
  if (!game.launcherReady) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player");
  p.vx = params.dirX * params.speed;
  p.vy = params.dirY * params.speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.launcherReady = false;
  game.chainCountThisThrow = 0;
}

/* ---------- 物理更新(1フレーム=1ステップ、CONFIGはこの単位系) ---------- */
function physicsStep() {
  // 移動・カーブ・摩擦
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const speed = Math.hypot(p.vx, p.vy);
    if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

    // カーブ:進行方向に対して「現在の速度に比例した」横加速度をかける(PROTO2で修正)。
    // 旧式(常に一定の大きさ)だと摩擦で前進速度が落ちるほど1フレームあたりの回頭角が
    // 急激にきつくなり、終盤その場でグルグル回る(=盤の中心に吸い込まれて見える)挙動になっていた。
    // 速度比例にすると dTheta = curveAccel/speed = CURVE_STRENGTH*curve でほぼ一定になり、破綻しない。
    // さらに、CURVE_MAX_ANGLE分カーブし終えたピースはそれ以上曲げない(完全旋回の構造的な禁止)。
    if (p.curve && Math.abs(p.curveTurned) < CONFIG.CURVE_MAX_ANGLE) {
      const px = -p.vy / speed, py = p.vx / speed; // 進行方向を反時計回りに90°回した単位ベクトル
      const curveAccel = CONFIG.CURVE_STRENGTH * p.curve * speed;
      p.vx += px * curveAccel;
      p.vy += py * curveAccel;
      p.curveTurned += CONFIG.CURVE_STRENGTH * p.curve;
    }

    p.vx *= CONFIG.FRICTION;
    p.vy *= CONFIG.FRICTION;

    const ns = Math.hypot(p.vx, p.vy);
    if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

    p.x += p.vx;
    p.y += p.vy;

    // 転がり回転(見た目用)
    if (ns > 0.01) {
      const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
      p.rot += (ns / CONFIG.PIECE_RADIUS) * (sign || 1);
    }
  }

  // ピース間の弾性衝突(円同士、質量均一)
  const arr = game.pieces;
  for (let i = 0; i < arr.length; i++) {
    const a = arr[i];
    if (a.state !== "onboard") continue;
    for (let j = i + 1; j < arr.length; j++) {
      const b = arr[j];
      if (b.state !== "onboard") continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = CONFIG.PIECE_RADIUS * 2;
      if (dist >= minDist || dist === 0) continue;

      const nx = dx / dist, ny = dy / dist;
      // 重なり解消(質量均一なので50/50)
      const overlap = minDist - dist;
      a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
      b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

      // 弾性衝突(質量均一→法線成分を交換)
      const rvn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
      if (rvn < 0) {
        const imp = -(1 + CONFIG.RESTITUTION) * rvn / 2;
        a.vx -= imp * nx; a.vy -= imp * ny;
        b.vx += imp * nx; b.vy += imp * ny;
      }
    }
  }

  // 盤外判定:縁を越える速度があれば場外消滅、なければ縁で停止
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const r = Math.hypot(p.x, p.y);
    const limit = CONFIG.BOARD_RADIUS - CONFIG.PIECE_RADIUS * 0.3;
    if (r <= limit) continue;
    const nx = p.x / r, ny = p.y / r;
    const vr = p.vx * nx + p.vy * ny; // 外向き速度成分
    if (vr >= CONFIG.RIM_EXIT_SPEED) {
      p.state = "exiting";
      p.fallT = 0;
      if (p.role === "target") game.chainCountThisThrow++;
      continue;
    }
    // 縁で停止(内側へクランプし、外向き速度を消す)
    if (vr > 0) { p.vx -= vr * nx; p.vy -= vr * ny; }
    p.x = nx * limit; p.y = ny * limit;
  }

  // 退場アニメーション(縮小+フェード)の進行、完了したら配列から除去
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // ランチャー再有効化判定:盤上の全ピースが静止(または場外退場)したら次を投げられる
  if (!game.launcherReady) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) {
      game.launcherReady = true;
      if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    }
  }

  updateHUD();
}

function showChainToast(n) {
  const el = document.getElementById("chainToast");
  el.textContent = n + "個 同時テイクアウト!";
  el.classList.add("show");
  game.toastTimer = 1.4;
}

/* ---------- メインループ(固定タイムステップ、CONFIGは1ステップ=1フレームの単位系) ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  render();
  requestAnimationFrame(frame);
}

/* ---------- 描画 ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  view.scale = Math.min(w * 0.92, h * 0.72) / (CONFIG.BOARD_RADIUS * 2);
  view.cx = w / 2;
  view.cy = h * 0.46;
}
window.addEventListener("resize", onResize);

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}
function toLogical(sx, sy) {
  return { x: (sx - view.cx) / view.scale, y: (sy - view.cy) / view.scale };
}

const ROLE_COLOR = { player: "#6fa8ff", target: "#ff9a52", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 盤(完全に真上視点、傾き演出なし)
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "#3a3a44";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "#26262e";
  ctx.fill();
  // 中心マーク
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.015, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fill();
  ctx.restore();

  // ランチャー位置マーカー
  const launch = toScreen(launcherPos().x, launcherPos().y);
  ctx.beginPath();
  ctx.arc(launch.x, launch.y, CONFIG.PIECE_RADIUS * view.scale * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(111,168,255,0.7)" : "rgba(255,255,255,0.15)";
  ctx.lineWidth = 2;
  ctx.stroke();

  // 未投擲時、次のピースをランチャーに表示
  if (game.launcherReady && !game.aim) {
    drawPiece(launch.x, launch.y, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // 狙い中の表示:aimDir方向の狙いライン+pushDistに応じて伸び太くなる溜めゲージ
  if (game.aim) {
    const guideLen = CONFIG.BOARD_RADIUS * view.scale * 1.6;
    const gx = launch.x + game.aim.aimDirX * guideLen;
    const gy = launch.y + game.aim.aimDirY * guideLen;
    ctx.beginPath();
    ctx.moveTo(launch.x, launch.y);
    ctx.lineTo(gx, gy);
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 2;
    ctx.stroke();

    const powerFrac = clamp(game.aim.pushDist * CONFIG.PUSH_TO_SPEED_SCALE / CONFIG.MAX_THROW_SPEED, 0, 1);
    const gaugeLen = Math.min(game.aim.pushDist, CONFIG.MAX_THROW_SPEED / CONFIG.PUSH_TO_SPEED_SCALE) * view.scale;
    const ex = launch.x + game.aim.aimDirX * gaugeLen;
    const ey = launch.y + game.aim.aimDirY * gaugeLen;
    ctx.beginPath();
    ctx.moveTo(launch.x, launch.y);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `rgba(111,168,255,${0.5 + 0.5 * powerFrac})`;
    ctx.lineWidth = 3 + powerFrac * 9;
    ctx.lineCap = "round";
    ctx.stroke();

    drawPiece(launch.x, launch.y, CONFIG.PIECE_RADIUS * view.scale, ROLE_COLOR.player, 0, 1);
  }

  // ピース(画面奥行きはないため単純に配列順)
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = CONFIG.PIECE_RADIUS * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, ROLE_COLOR[p.role], p.rot, alpha);
  }
}

// プレースホルダ描画:単色円+半円塗り分け+1本線(回転が視認できる程度。パーツ描画はしない)
function drawPiece(x, y, r, color, rot, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  ctx.rotate(rot);
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
  ctx.closePath();
  ctx.fillStyle = "rgba(0,0,0,0.20)";
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, -r);
  ctx.lineTo(0, r);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard").length;
  const s = onboard + "|" + game.scenario;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("countText").textContent = onboard;
  document.getElementById("scenarioNameText").textContent = SCENARIO_NAMES[game.scenario];
}

/* ---------- 入力(狙う→溜める→放す、の3段階。PROTO2で全面置き換え) ---------- */
window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar")) return;
  if (game.aim !== null || !game.launcherReady) return;
  e.preventDefault();
  startAim(e.pointerId, e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  updateAim(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  const aim = game.aim;
  game.aim = null;
  const params = finalizeAim(aim, e.clientX, e.clientY);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => { game.aim = null; });

/* ---------- シナリオ・リセットボタン ---------- */
function bindScenarioButtons() {
  const map = { sc1: 1, sc2: 2, sc3: 3, sc4: 4 };
  for (const id in map) {
    document.getElementById(id).addEventListener("pointerdown", (e) => {
      e.stopPropagation(); e.preventDefault();
      buildScenario(map[id]);
      highlightScenarioButton();
    });
  }
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildScenario(game.scenario); // 現在のシナリオを再配置
  });
}
function highlightScenarioButton() {
  for (const id of ["sc1", "sc2", "sc3", "sc4"]) document.getElementById(id).classList.remove("active");
  document.getElementById("sc" + game.scenario).classList.add("active");
}

/* ---------- 起動 ---------- */
onResize();
bindScenarioButtons();
buildScenario(1);
highlightScenarioButton();
requestAnimationFrame(frame);
</script>
