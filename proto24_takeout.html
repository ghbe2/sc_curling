<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>しゅがけカーリング サバイバル PROTO24</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
  html, body {
    margin: 0; padding: 0;
    background-color: #fce4ec;
    background-image:
      linear-gradient(90deg, rgba(255,255,255,0.42) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,0.42) 1px, transparent 1px);
    background-size: 20px 20px;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas { display: block; }
  #hud {
    position: fixed; top: 0; left: 0;
    padding: 8px 10px;
    color: #2b1f24;
    font-family: 'DotGothic16', system-ui, sans-serif;
    font-size: 12px;
    display: none;
    pointer-events: none;
  }
  #hud .label { opacity: 0.6; font-size: 10px; margin-right: 2px; }
  #scenarioBar {
    position: fixed; top: 6px; right: 6px;
    display: flex; gap: 4px;
  }
  .btn {
    background: rgba(255,255,255,0.96); color: #e91e63;
    border: 2px solid #f48fb1; border-radius: 10px;
    padding: 5px 8px; font-size: 10px;
    font-family: inherit;
    pointer-events: auto;
  }
  .btn.active { background: #52526a; border-color: #7878a0; }
  .btn:active { background: #46465a; }
  #resetBtn { background: rgba(255,255,255,0.96); border-color: #f48fb1; }
  #resetBtn:active { background: #5c4646; }
  #handBar {
    position: fixed; right: 6px; top: calc(100% - 300px); bottom: auto;
    transform: none;
    display: grid; grid-template-columns: 74px; gap: 6px;
    z-index: 3;
    transition: opacity 0.18s, transform 0.18s;
  }
  #handBar.hidden { opacity: 0; pointer-events: none; transform: translateX(18px); }
  .handCard {
    min-height: 48px; padding: 5px 3px;
    border: 2px solid #f48fb1; border-radius: 10px;
    color: #2b1f24; background: rgba(255,255,255,0.96);
    font-family: system-ui, sans-serif; font-size: 11px; line-height: 1.2;
    touch-action: manipulation;
  }
  .handCard .icon { display: block; font-size: 17px; margin-bottom: 2px; }
  .handCard .trait { display: block; font-size: 8px; opacity: 0.62; margin-top: 2px; }
  .handCard.selected {
    border-color: #e91e63; background: #fff0f5;
    box-shadow: 0 0 0 2px rgba(233,30,99,0.2), 0 5px 16px rgba(80,30,50,0.16);
  }
  #chainToast {
    position: fixed; left: 50%; top: 26%;
    transform: translate(-50%, -50%) scale(0.8);
    color: #e91e63;
    font-family: 'DotGothic16', system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(34px, 9vw, 54px);
    line-height: 1.05;
    text-align: center;
    white-space: nowrap;
    z-index: 10;
    text-shadow: 3px 0 rgba(255,64,129,0.45), -3px 0 rgba(0,210,220,0.38), 0 4px 12px rgba(80,30,50,0.28);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  #chainToast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #chainToast .toastScore { margin-top: 10px; font-size: clamp(18px, 5vw, 28px); color: #4a2133; text-align: center; }
  #dangerAlert {
    position: fixed; top: 52px; left: 50%; z-index: 8;
    transform: translateX(-50%); min-width: 220px;
    padding: 8px 18px; border-radius: 12px;
    font-family: 'DotGothic16', system-ui, sans-serif;
    font-weight: 900; text-align: center; pointer-events: none;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
  }
  #dangerAlert.show { opacity: 1; transform: translateX(-50%) scale(1); }
  #dangerAlert.house { color: #6b3b00; background: rgba(255,244,196,0.94); border: 2px solid #e3a72f; }
  #dangerAlert.pinch {
    color: white; background: rgba(196,0,48,0.94); border: 3px solid white;
    font-size: 24px; letter-spacing: 2px;
    animation: pinchPulse 0.6s ease-in-out infinite alternate;
    box-shadow: 0 0 0 5px rgba(196,0,48,0.25), 0 0 30px rgba(196,0,48,0.7);
  }
  #dangerAlert .dangerSub { display: block; margin-top: 3px; font-size: 10px; letter-spacing: 0; }
  @keyframes pinchPulse { from { transform: translateX(-50%) scale(0.96); } to { transform: translateX(-50%) scale(1.05); } }
  #hint {
    display: none;
  }
  #gameOver {
    position: fixed; inset: 0; z-index: 5;
    display: none; align-items: center; justify-content: center;
    background: rgba(18,14,20,0.72); color: #fff4e2;
    font-family: system-ui, sans-serif; text-align: center;
  }
  #gameOver.show { display: flex; }
  #gameOverPanel {
    padding: 24px 28px; border: 1px solid rgba(255,150,120,0.5);
    border-radius: 16px; background: rgba(50,31,38,0.95);
  }
  #gameOverTitle { font-size: 25px; font-weight: 800; margin-bottom: 8px; }
  #gameOverText { font-size: 13px; opacity: 0.8; margin-bottom: 16px; }
  #sideInfo {
    position: fixed; left: 8px; top: 8px; z-index: 2;
    transition: opacity 0.12s, transform 0.12s;
  }
  #sideInfo.hidden { opacity: 0; pointer-events: none; transform: translateX(-12px); }
  #scorePanel {
    display: grid; grid-template-columns: repeat(2, auto); gap: 3px 12px;
    padding: 7px 9px; border-radius: 8px;
    color: #2b1f24; background: rgba(255,255,255,0.96);
    border: 2px solid #f48fb1;
    box-shadow: 0 5px 16px rgba(80,30,50,0.14);
    font: 10px/1.35 'DotGothic16', system-ui, sans-serif;
    pointer-events: none;
  }
  #scorePanel .scoreValue { color: #e91e63; font-weight: 700; margin-left: 4px; }
  #scoreTotalRow { grid-column: 1 / -1; padding-top: 2px; border-top: 1px solid rgba(255,255,255,0.1); }
  #fastForwardBtn {
    position: fixed; left: 50%; right: auto; top: calc(92% - 86px); bottom: auto; z-index: 3;
    transform: translateX(-50%); width: 88px; height: 48px; padding: 6px 3px;
    color: #e91e63; background: rgba(255,255,255,0.97);
    border-color: #f48fb1; font-size: 12px; font-weight: 700;
    touch-action: none;
  }
  #fastForwardBtn.holding { color: #1c2730; background: #87dcf5; border-color: #c4f2ff; }
  #fastForwardBtn.hidden { opacity: 0; pointer-events: none; }
  #throwTutorial {
    position: fixed; left: 7px; top: calc(100% - 300px); bottom: auto; z-index: 2;
    width: 104px; padding: 9px 8px; box-sizing: border-box;
    border: 2px solid #f48fb1; border-radius: 12px;
    background: rgba(255,255,255,0.92); color: #4a2133;
    font: 10px/1.35 'DotGothic16', system-ui, sans-serif;
    pointer-events: none; transition: opacity 0.15s, width 0.15s;
  }
  #throwTutorial.hidden { opacity: 0; }
  #tutorialToggle { position: absolute; right: 0; top: auto; bottom: -23px; border: 0; border-radius: 8px; padding: 3px 7px; color: #e91e63; background: #fff0f5; box-shadow: 0 2px 7px rgba(80,30,50,0.14); font: 9px 'DotGothic16', sans-serif; pointer-events: auto; }
  #throwTutorial.minimized { width: 76px; padding: 8px; }
  #throwTutorial.minimized .tutorialBody { display: none; }
  #throwTutorial.minimized #tutorialToggle { position: static; width: 100%; }
  .tutorialStep { margin-bottom: 9px; opacity: 0.46; }
  .tutorialStep.active { opacity: 1; color: #e91e63; }
  .tutorialTitle { display: block; margin-bottom: 3px; font-size: 11px; }
  .tutorialGesture { position: relative; height: 38px; font-size: 21px; line-height: 1; text-align: center; margin: 2px 0; }
  .gestureFinger { position: absolute; left: 50%; top: 5px; transform: translateX(-50%); }
  #tutorialAim.pull .gestureFinger { animation: pullFinger 1.05s ease-in-out infinite; }
  #tutorialAim.adjust .gestureFinger { animation: adjustFinger 1.2s ease-in-out infinite; }
  #tutorialPower.active .gestureFinger { animation: throwFinger 1.15s ease-in-out infinite; }
  .gestureArrow { position: absolute; left: 0; right: 0; top: 0; color: #ff4081; font-size: 17px; }
  @keyframes pullFinger { from { transform: translate(-50%, -8px); } to { transform: translate(-50%, 14px); } }
  @keyframes adjustFinger { 0%,100% { transform: translate(-50%, 9px); } 35% { transform: translate(-82%, 9px); } 70% { transform: translate(-18%, 9px); } }
  @keyframes throwFinger { from { transform: translate(-50%, 15px); } to { transform: translate(-50%, -8px); } }
  .tutorialMeter { height: 7px; overflow: hidden; border-radius: 9px; background: #f4dce5; }
  .tutorialFill { height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg,#81d4fa,#ff4081); transition: width 0.05s; }
  #spinMeter { position: relative; overflow: visible; }
  #spinMeter::after { content: ''; position: absolute; left: 50%; top: -2px; width: 2px; height: 11px; background: #4a2133; transform: translateX(-1px); }
  #spinFill { position: absolute; left: 50%; width: 0; background: #ff4081; transition: width 0.05s, left 0.05s; }
  #spinReadout { text-align: center; margin-top: 3px; min-height: 14px; }
  @media (max-width: 390px) {
    #throwTutorial { width: 92px; padding: 7px 6px; font-size: 9px; }
  }
</style>
</head>
<body>
<canvas id="board"></canvas>
<div id="hud">
  <span><span class="label">PROTO24</span>サバイバル開発</span>
  <span><span class="label">TURN</span><span id="turnText">1</span></span>
  <span><span class="label">WAVE</span><span id="waveText">1</span></span>
  <span><span class="label">盤上</span><span id="countText">0</span></span>
  <span><span class="label">敵</span><span id="enemyCountText">7</span></span>
  <span id="phaseText"></span>
</div>
<div id="chainToast"></div>
<div id="dangerAlert" aria-live="polite"></div>
<div id="scenarioBar">
  <button class="btn" id="soundBtn" aria-pressed="true">🔊</button>
  <button class="btn" id="resetBtn">RE</button>
</div>
<div id="handBar" aria-label="キャラストーン手札"></div>
<div id="sideInfo">
  <div id="scorePanel">
    <span id="scoreTotalRow">SCORE<span class="scoreValue" id="totalScoreText">0</span></span>
  </div>
</div>
<button class="btn" id="fastForwardBtn">はやく♡</button>
<div id="throwTutorial">
  <button id="tutorialToggle" type="button" aria-expanded="true">− とじる</button>
  <div class="tutorialBody">
  <div class="tutorialStep" id="tutorialAim"><b class="tutorialTitle">① ねらう</b><div class="tutorialGesture"><span class="gestureArrow" id="aimGestureArrow">↓</span><span class="gestureFinger">👆</span></div><b id="aimInstruction">下へ引く</b><br><span id="aimSub">ねらいモードにする</span></div>
  <div class="tutorialStep" id="tutorialPower"><b class="tutorialTitle" id="powerTitle">② なげる</b><div class="tutorialGesture"><span class="gestureArrow">↑</span><span class="gestureFinger">👆</span></div><b id="powerInstruction">上へ押して離す</b><div class="tutorialMeter"><div class="tutorialFill" id="powerFill"></div></div><div id="powerReadout">―</div></div>
  <div class="tutorialStep" id="tutorialSpin"><b class="tutorialTitle">かいてん</b><div class="tutorialMeter" id="spinMeter"><div class="tutorialFill" id="spinFill"></div></div><div id="spinReadout">←　まっすぐ　→</div></div>
  </div>
</div>
<div id="hint">① 引いて左右を決める → 離して照準ロック<br>② 前へ押して離すとショット ／ もう一度引くと狙い直し</div>
<div id="gameOver"><div id="gameOverPanel"><div id="gameOverTitle">GAME OVER</div><div id="gameOverText"></div><button class="btn" id="retryBtn">もう一度</button></div></div>

<script>
"use strict";

/* =========================================================================
 * CONFIG — PROTO23:回転物理の実カーリング化+重量感演出
 *  ・回転が多いほど摩擦が減り(よく滑る)、曲がらない。回転が少ないほど曲がる
 *  ・トップスピード付近はほぼ曲がらない(従来どおり速度依存)
 *  ・衝突時、回転は相手に逆向きに伝わる(トップスピードでも回転方向に意味がある)
 *  ・画面上の滑走はスロー化(TIME_SCALE)。パワー・軌道は不変=重量感の表現
 *  ・衝突演出:強さに応じた画面揺れ+瞬間ズーム
 * 速度は「1フレーム(1/60秒)あたりの移動量」単位(継続)。
 * ========================================================================= */
const CONFIG = {
  BOARD_RADIUS: 320,
  OUT_RADIUS: 520,       // 旧盤面の外では消さず、画面外へ大きく飛んだときだけ退場
  HOUSE_RADIUS: 195,     // 画面上で狙いやすいよう従来の1.5倍。各リング比率は維持。
                          // 実カーリングの比率(12/8/4/1フィート)に合わせて内側の白・赤・ボタンを
                          // HOUSE_RADIUS×2/3, ×1/3, ×1/12で描画する。物理には一切影響しない見た目のみの値
  GRID_SPACING: 40,      // 新設(PROTO23、デバッグ表示用):盤面に重ねる格子ガイドの間隔(px)。
                          // 「どこを狙うとどこに着地するか」を数値で共有しやすくするための目安線
  ENEMY_SPAWN_RADIUS: 290, // 拡大後もスマホ画面内に収まる外周配置
  ENEMY_ADVANCE_DISTANCE: 32, // 1ターンに中心へ進む基準距離(px)
  ENEMY_PRESSURE_MULT: 1.35, // 最も中心に近い敵だけ少し先行させ、敵同士が輪状に詰まるのを防ぐ
  HIROIBEO_ATTRACTION: 0.42, // 中心58%を残しつつ、最寄りのヒロイベオへ進路を曲げる
  SCORE_WAVE_CLEAR: 2000,
  SCORE_NOTE_CYCLE: 800,
  LOSE_RADIUS: 34,       // 敵が停止すると敗北になる中心範囲
  SCORE_TURN: 100,       // 1生存ターンあたりの得点
  SCORE_TAKEOUT: 250,    // 敵を1体テイクアウトしたときの得点
  SCORE_BOARD_MAX: 100,  // 自石1個が中心にある場合の盤面支配点
  FRICTION: 0.985,       // 高速域の基本速度減衰率
  ROLLING_RESISTANCE: 0.03, // 毎フレーム一定量を引き、低速ほど相対的に強く減速させる
  /* --- 衝突の並進物理(PROTO23で入射角ベースのモデルへ全面置き換え) ---
   * 旧来のRESTITUTION(反発係数)方式は「正面衝突での配分」しか調整できず、
   * 下げるほど撃った側(ショットした石)の残り速度が逆に増えてしまう構造的な限界があった
   * (等質量の正面衝突では常に 撃った側+当てられた側の速度 = 元の速度 になるため)。
   * 「正面衝突なら撃った側は完全停止・当てられた側が全速で直進、かすめるほど逆転する」
   * というビリヤードの実際の物理(90度ルール)に合わせ、入射角(0〜90度)で
   * エネルギー移行率を直接決める方式に変更した。詳細はcollision処理コード内コメント参照
   * --- */
  INCIDENCE_TRANSFER_POWER: 2.0, // 新設(PROTO23):正規化した入射角(0〜1)をこの乗数で底上げしてから
                          // sin/cosへ渡す。1.0だと素の入射角(かすめるほど撃った側の残存が
                          // 87〜99%と大きすぎ、連続衝突が重なると本来まず起きない「手前へ戻る」
                          // 挙動が出やすかった)。2.0にすると、同じ実際の入射角でも「より正面寄り」
                          // として扱われ、中間角度(30〜60度)でTへの移行量が大幅に増える
                          // (例:入射角30度の撃った側残存 52%→19%、58度で87%→65%)。
                          // 境界(0度で完全停止/100%移行、90度で無反応)は指数によらず変わらない。
                          // 90度に近いほぼ真横のかすりは物理的に「ほぼ無反応」が正しいため、
                          // そこだけは指数を上げても撃った側の残存を大きくは減らせない
  LOW_SPEED_COLLISION_REF: 9,
  LOW_SPEED_COLLISION_MIN: 0.30,
  PIECE_RADIUS: 36,
  SETTLE_SPEED: 0.05,    // これ未満の速度になったら停止扱い(px/frame)

  /* --- 回転(カーブ)物理:PROTO23で「回転量に比例してカーブする」方式へ変更 ---
   * 回転(curve, -1〜1)は、狙いの中心線から指がどれだけ横にズレているかで決まる「回転量」。
   * 以前は実カーリング同様「回転が多いほど直進・回転が少ないほど曲がる」で作っていたが、
   * 実機で試すと直感に反し「回転をかけてもカーブに効いてる感がない」との指摘を受け、
   * 素直な比例関係(回転が弱いほど微カーブ、強いほど大きくカーブ)に変更した。
   *  ・回頭 = CURVE_STRENGTH × curve × 速度効き(直進化の抑制項は廃止、curveに単純比例)
   *  ・摩擦は回転量によらず一定(FRICTIONのみ。PROTO23でSPIN_GLIDEを廃止、下記参照)
   * --- */
  CURVE_STRENGTH: 0.042, // PROTO24:カーブ差を明確に体感する実験として0.014→0.042(3倍)。
                          // ミナリ/アウネは個体倍率でここから大きく差を付ける
  CURVE_VREF: 8,         // 回頭の速度依存の基準(px/frame)。効き = (VREF/(VREF+速度))^CURVE_SLOW_POWER
  CURVE_SLOW_POWER: 2.4, // 速度効きの非線形さ。新設:「減速してくる後半ほどきつく曲がる」を強調するため、
                          // 速度依存の効きを単純な反比例(指数1)から2.4乗に変更。速いうちはより強く
                          // 直進を保ち、終盤に近づくほど曲がりが加速度的にきつくなる(検証:全体の
                          // 曲がり角のうち約8割が滑走後半で発生するようになった。旧実装は5割程度)
  // SPIN_GLIDE(回転による摩擦低減)はPROTO23で廃止。ユーザーが送ってくれた手描きの軌道イメージ
  // (最低パワー・最大回転は盤の縁付近で止まる/最低パワーでも回転が弱いほど奥まで進む)と、
  // このゲームの摩擦低減の組み合わせが正反対の関係になっていた:回転が強いほど滑って伸びる
  // 効果があると、同じ最低パワーでも強い回転の方が奥まで進んでしまい、「強く曲げるほど
  // 弧を描く分だけ手前で止まる(=直進より奥まで届かない)」という自然な見た目にならなかった。
  // 摩擦を回転量によらず一定にすると、同じ滑走距離(弧の長さ)を横方向にどれだけ使うかで
  // 曲がり方向の到達点が決まるようになり、手描きイメージの関係性と一致した
  CURVE_MAX_ANGLE: 1.4,  // 1投あたりの最大累積回頭角(rad)。完全旋回の構造的な防止弁
  CURVE_MIN: 0.337,      // PROTO24:見た目上の無回転ショットの停止時横移動を約1マス(40px)増加。
                          // その後の全体強化でも、最小回転量の入力基準としてこの値は維持

  /* --- ストーンの見た目の自転(スピン表示):PROTO23で「実時間あたりの回転速度」方式に変更 ---
   * 旧実装は「中パワーでリングに届くまでの基準フレーム数」に対して何回転させるかを
   * 指定していたが、実際は弱回転ほど盤上をほぼ真っすぐ長く漂って滑走時間が非常に長くなり
   * (実測:同条件で弱回転25秒 vs 強回転10秒)、レート自体は正しく4倍でも滑走時間の差で
   * 打ち消し合い、見た目の総回転数の差が1.7倍程度まで薄まってしまっていた。
   * そこで滑走時間に依存しない「実1秒あたりの回転数(rps)」を直接指定する方式に変更。
   * どの投球についても、見ている間のスピン速度そのものが常に約4倍の差になる
   * --- */
  SPIN_VISUAL_MIN_RPS: 0.3,  // CURVE_MIN(最も曲がる)時の自転速度(実1秒あたりの回転数)
  SPIN_VISUAL_MAX_RPS: 1.2,  // curve=1.0(ほぼ直進)時の自転速度(同、ちょうど4倍)

  /* --- 衝突時の回転伝達(逆回転が移る) --- */
  SPIN_TRANSFER: 0.6,    // 衝突相手から受け取る逆回転の割合。自分の回転×この値が「逆向き」で相手に付く
  SPIN_HIT_DECAY: 0.3,   // 衝突時に自分の回転が失われる割合
  SPIN_TRANSFER_MIN_IMPACT: 2, // 回転伝達が起きる最小衝突速度(px/frame)。静止接触での回転汚染を防ぐ

  /* --- 投球操作(引く→押し出す→離す) --- */
  MIN_DRAW_DIST: 20,     // 引きがこの距離(px)未満なら投げない
  AIM_DEADZONE: 16,      // アンカーからこの距離までは引き扱いにしない(誤操作防止)
  AIM_SMOOTH_RANGE: 40,  // 新設:アンカー近く(AIM_DEADZONE直後)ほど狙い方向の更新を弱め、
                          // 距離がこの分だけ離れると通常どおり即座に追従するようにする「信頼度」の幅。
                          // 引き→押し出しの折り返しで指がアンカー付近をかすめると、狙い方向が
                          // 一瞬だけ大きく暴れる問題への対処(距離が短いほど角度が不安定なため)
  MAX_AIM_ANGLE: 1.22,   // 狙いの向きを「真上」からこの角度(rad、約70°)以内に制限する。新設:
                          // 引く方向次第で盤と逆向き(後ろ向き)にも投げられてしまっていたのを防ぐ。
                          // 真上から左右70°=ほぼ水平近くまでは許容しつつ、後方(盤と逆側)は禁止する
  PUSH_START_THRESH: 12, // アンカー(ボールの元の位置)からこのpx分「前」へ出たら「押し出し」開始とみなす
                          // (狙い・基礎パワー固定)。PROTO23で基準を「最深点からの戻り量」から
                          // 「アンカーからの前方距離」に変更し、一度ボールの元の位置まで戻さないと
                          // パワー調整(押し出し)が始まらないようにした
  REDRAW_THRESH: 45,     // 押し出し中にアンカーよりこのpx分後ろへ戻ったら「引き」に戻る(狙い直し可能)。
                          // 10→45:強いフリック動作は指が斜めに大きく動く際、狙い軸方向にも
                          // 数十px戻ることがあり、10だと「引き直し」と誤認され押し出しが
                          // キャンセルされてしまっていた
  MIN_PUSH_DIST: 15,     // 押し出しがこの距離未満のままのリリースは投げない(=引いて放しただけでは飛ばない)
  PUSH_MIN_POWER_RANGE: 58, // 約1〜2石分は前へ押しても最弱のまま。キャンセル操作との誤認を防ぐ
  PUSH_MAX_POWER_RANGE: 145, // 最弱維持ゾーンを越えてから、この距離で最大になる
                          // 「猶予」区間。最大パワーを出せる範囲が実質1点(pushDist=0)しかなく
                          // 操作しづらいとの指摘があったため、序盤に平坦なゾーンを設けて緩和した。
                          // 40→20→15(PROTO23):PUSH_SOFT_RANGE短縮とあわせ、可動域をさらにコンパクトに
  PUSH_SOFT_RANGE: 100,  // 押し出し距離がこの長さでパワー係数が最小になる(px)。320→140→100(PROTO23):
                          // 「コンパクトな動きで調整したい」との指摘に継続対応。最低速度の動的化と
                          // あわせ、最弱パワー(下限クランプ到達)は押し出し約75pxで届くようになった
                          // (全力→最弱の実用可動域は約60px)
  PUSH_MIN_COEF: 0.08,   // 最長押し出し時のパワー係数。0.4→0.08:0.4だと、狙いを大きく引いてから
                          // 最大まで押し出した「最弱のつもり」の投球でも speed が20前後まで残り、
                          // MIN_THROW_SPEEDの下限保護が働かないまま盤の奥まで届いてしまっていた。
                          // 0.08まで下げると引きの深さによらず最大押し出し時はMIN_THROW_SPEED付近まで
                          // 落ち、「最弱に投げたらサークルに届かない」を引きの強さに関係なく保証できる
  POWER_CURVE_EXPONENT: 1.35, // PROTO24:最弱から最大へ近づくほど速度の伸びが大きくなる急加速カーブ。
                          // 1.0なら線形、1より大きいほど弱〜中を保ちながらテイク側を強くする
  DRAW_TO_SPEED_SCALE: 0.75, // PROTO24:最大初速60に合わせ、実機の60〜80px程度の引きで上限へ届くよう調整
                          // 下に引けるスペースが実機では60〜80px程度しかなく、0.25では基礎パワーが
                          // 上限の半分にも届かなかった。60〜80pxの引きで上限に達するよう再調整
  // 最低速度は固定値ではなく、ランチャーから盤中心までの距離(D)に応じて動的に計算する
  // (minThrowSpeed()参照)。PROTO23で固定13.0→動的化。理由:摩擦は速度に対して指数減衰なので、
  // 石が完全停止するまでの走行距離は初速にほぼ比例する(実測:停止距離 = 初速 × STOP_DIST_PER_SPEED)。
  // ランチャーは画面下部にあり、Dは端末の画面比率で変わる。固定13.0は基準端末(375×812、D≈980)では
  // ハウス外周に止まるが、Dが小さい端末(横長・縦短め)では同じ13.0が中心まで到達してしまう
  //(ユーザー報告「最弱でも円の真ん中まで行く」の原因)。Dから逆算すれば端末によらず狙った半径で止まる
  STOP_DIST_PER_SPEED: 65.35, // 実測係数:直進の石が停止するまでの走行距離(world px) ÷ 初速(px/frame)。
                          // 摩擦FRICTIONの指数減衰から決まる定数(FRICTION変更時は要再計測)
  MIN_THROW_TARGET_R: 210, // 最弱パワー・直進投球を止めたい盤中心からの半径(px)。160→210(PROTO23):
                          // 「最弱なら中央の円・マスに入らないくらいでいい(今は手前4〜5マス目まで届く)」
                          // との指摘で手前寄りへ。グリッドは40px間隔・盤縁r=320なので、r≈215は近縁から
                          // 約2.6マスしか入らず、ハウス(130)や中央マスには届かない弱いガードになる。
                          // なお本当はもっと手前(r=265等)まで弱めたかったが、それだと初速が下がりすぎ、
                          // 最弱+最大回転の石が助走中に曲がって盤に入れなくなる(横へ逸れて消える)ため、
                          // 回転付きでも確実に盤へ入る安全域の下限としてr=210(初速≈11.8)に設定した。
                          // この値を基準に端末ごとのDから最低速度を逆算する(minThrowSpeed())
  MIN_THROW_SPEED_FLOOR: 6, // 動的計算した最低速度のさらに下限(px/frame)。極端に小さいDの端末で
                          // 盤にすら届かなくなる事故を防ぐ安全弁
  MAX_THROW_SPEED: 60,   // PROTO24:最大パワーを46→60へ引き上げ、テイクショットの衝突速度を確保。
                          // 最弱はminThrowSpeed()を別端点にするため、この変更では飛距離が変わらない
  CURVE_DIST_SCALE: 60,  // PROTO24:同じ横操作で回転が乗りやすいよう75→60。curve=横ズレ/この値をクランプ。
                          // PROTO23で時間窓(旧FLICK_WINDOW_MS)を廃止し、時間に関係なく「いま指が
                          // 中心線からどれだけ離れているか」の位置だけを見る方式に変更した。
                          // 理由:リリース直前120msだけを見る方式だと、早めに横へ大きくズレても
                          // リリースの瞬間に中心へ戻す/止まる動きをすると直近の移動量が小さくなり
                          // 回転が弱く判定されてしまい、「中心から離れるほど回転が強い」という
                          // 意図から外れていた。フリックでもゆっくりしたスワイプでも、離れた分だけ
                          // 回転がかかるようにする
  FLICK_CURVE_SIGN: 1,   // 横ズレの向きと回転方向の対応(+1/-1)。逆に感じたら-1へ

  /* --- 投球UI:パワー(色)とカーブ範囲(扇)の可視化 --- */
  POWER_COLOR_STRONG: [230, 40, 30],   // 短い押し出し=強いショットの色(赤)
  POWER_COLOR_WEAK: [70, 145, 235],    // 遅いショット=青。背景に埋もれず、速さは色だけで伝える
  FAN_MAX_ANGLE: 0.46,   // 回転が最大(1.0)のときの扇の半開き角(rad、約26°)。大きく曲がる可能性を広く見せる
  FAN_MIN_ANGLE: 0.05,   // 回転が最小(CURVE_MIN)のときの扇の半開き角(rad、約3°)。ほぼ直線に近い狭さ

  /* --- 表示・演出 --- */
  SHOW_TRAIL: false,     // 投球後のデバッグ軌跡は表示しない
  TIME_SCALE: 0.2625,    // シミュレーション再生速度。1.0=等速。0.525→0.2625:「下げる前の50%のスピード」
                          // という指示どおり、直前の値からさらに半分に。画面上の滑走だけを遅くする
                          // (物理の軌道・衝突・パワーは完全に不変)。カーリングらしく行方を見守る間を作る
  // 早送り(PROTO23で「投球からの経過時間」トリガーを廃止し、「動いている石が全てほぼ止まった」
  // トリガーへ変更)。旧方式は投球後2.5秒で一律に早送りが始まり、ゆっくり見守りたいドローショットの
  // 滑走中まで早送りされてしまい体験として不自然だった。新方式は「盤上の最速の石」の速度を見て、
  // それがFF_SLOW_SPEED未満(=どの石もほぼ止まりかけ)になったときだけ早送りする。複数の石が
  // 順番に止まっていく場合でも、どれか1つでも速ければ最速値が上がるので早送りは自動的に解除される
  FF_SLOW_SPEED: 0.5,    // 「動いている石が全てほぼ止まった」と判定する速度しきい値(px/frame)。
                          // これ未満まで最速の石が落ちたら、その場で回り続けているだけの無駄時間とみなす。
                          // 0.5だと表示上ほぼ静止(0.13px/表示フレーム)なので、見せたい滑走やカーブの
                          // 大半は等速のまま残り、最後の「止まりきる直前のダラダラ」だけが早送りされる
  FF_MAX_MULT: 9,        // 早送りの最大倍率(通常再生に対して)。物理(軌道・衝突・パワー)には
                          // 触れず、1回のphysicsStepでこなすサブステップ数を増やして見た目だけ速める
  FF_EASE: 0.06,         // 早送り倍率を目標値へ寄せる1フレームあたりの補間率(0〜1)。急な速度変化を
                          // 避け、加速・減速をなめらかにする(衝突で石が再び動き出したら自然に戻る)
  SHAKE_SCALE: 0.35,     // 衝突速度→画面揺れ量の変換(px per px/frame)
  SHAKE_MAX: 12,         // 画面揺れの最大(px)
  SHAKE_DECAY: 0.86,     // 揺れの減衰(描画フレームごと)
  ZOOM_SCALE: 0.0022,    // 衝突速度→瞬間ズーム量の変換
  ZOOM_MAX: 0.06,        // 瞬間ズームの最大(+6%)
  ZOOM_DECAY: 0.90,      // ズームの減衰(描画フレームごと)
  FX_MIN_IMPACT: 4,      // 演出が発動する最小衝突速度(px/frame)。小さな接触では揺らさない

  /* --- その他 --- */
  RIM_EXIT_SPEED: 0.5,   // 盤外への外向き速度がこれ以上なら場外消滅、未満なら縁で停止
};

function randomCharacter() {
  return CHARACTERS[Math.floor(Math.random() * CHARACTERS.length)];
}

function createInitialHand() {
  game.hand = Array.from({ length: 4 }, randomCharacter);
  game.selectedHandIndex = 0;
  game.pendingHandIndex = null;
  renderHand();
}

function renderHand() {
  const bar = document.getElementById("handBar");
  if (!bar) return;
  bar.classList.toggle("hidden", game.phase !== "aim" || game.gameOver);
  bar.replaceChildren();
  game.hand.forEach((character, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "handCard" + (index === game.selectedHandIndex ? " selected" : "");
    button.dataset.index = String(index);
    button.dataset.characterId = character.id;
    button.dataset.speedMult = String(character.mods.speedMult ?? 1);
    button.dataset.pathCurveMult = String(character.mods.pathCurveMult ?? 1);
    button.dataset.radiusScale = String(character.mods.radiusScale ?? 1);
    button.dataset.trajectoryGuide = String(character.mods.trajectoryGuide ?? false);
    button.dataset.partType = character.mods.partType ?? "none";
    button.setAttribute("aria-pressed", index === game.selectedHandIndex ? "true" : "false");
    button.innerHTML = `<span class="icon">${character.icon}</span>${character.name}<span class="trait">${character.trait}</span>`;
    button.style.borderBottomColor = character.color;
    button.addEventListener("pointerdown", (e) => {
      e.stopPropagation();
      e.preventDefault();
      if (!game.launcherReady || game.shotInProgress || game.phase !== "aim") return;
      game.selectedHandIndex = index;
      renderHand();
    });
    bar.appendChild(button);
  });
}

// ランチャー(投げる石の待機位置):画面最下部。盤の外から滑り込む
function launcherPos() {
  return { x: 0, y: (window.innerHeight * 0.92 - view.cy) / view.scale };
}

// 最弱パワーの初速を、ランチャー距離Dから逆算する(端末の画面比率によらず、直進の最弱投球が
// 盤中心からMIN_THROW_TARGET_Rの位置=「円の手前」で止まるようにする)。CONFIG該当コメント参照
function minThrowSpeed() {
  const D = Math.abs(launcherPos().y); // ランチャー→盤中心の距離(world px)
  const v = (D - CONFIG.MIN_THROW_TARGET_R) / CONFIG.STOP_DIST_PER_SPEED;
  return clamp(v, CONFIG.MIN_THROW_SPEED_FLOOR, CONFIG.MAX_THROW_SPEED);
}

let pieceUidSerial = 1;

function createPiece(x, y, role, character = null) {
  return {
    uid: pieceUidSerial++,
    x, y, vx: 0, vy: 0, rot: 0,
    role,
    state: "onboard",
    fallT: 0,
    curve: 0,
    curveTurned: 0,
    entered: Math.hypot(x, y) < CONFIG.BOARD_RADIUS,
    trail: [],
    characterId: character?.id ?? null,
    characterName: character?.name ?? null,
    icon: character?.icon ?? null,
    color: character?.color ?? null,
    mods: {
      speedMult: 1,
      pathCurveMult: 1,
      knockResist: 1,
      selfStopMult: 1,
      restitution: 0,
      radiusScale: 1,
      trajectoryGuide: false,
      partType: null,
      enemyAttractor: false,
      allyKnockMult: 1,
      enemyKnockMult: 1,
      frictionMult: 1,
      ...(character?.mods ?? {}),
    },
  };
}

function pieceRadius(piece) {
  return CONFIG.PIECE_RADIUS * (piece?.mods?.radiusScale ?? 1);
}

function partContactProfile(piece, dirX, dirY) {
  const type = piece?.mods?.partType;
  const baseRadius = pieceRadius(piece);
  if (!type) return { radius: baseRadius, partHit: false, type: null };
  const axisAngle = piece.rot - Math.PI / 2;
  const alignment = Math.cos(axisAngle) * dirX + Math.sin(axisAngle) * dirY;
  const limit = type === "softEars"
    ? Math.cos(0.9)
    : (type === "hardHorn" ? Math.cos(0.75) : Math.cos(0.58));
  const partHit = alignment >= limit;
  // バーニの耳とリウの角は、石の縁から約1直径ぶん前へ伸びる。
  const extension = type === "softEars" || type === "hardHorn"
    ? 3
    : 1.35;
  return { radius: baseRadius * (partHit ? extension : 1), partHit, type };
}

/* ---------- サバイバル初期化 ---------- */
function spawnEnemy(enemyIndex = game.enemySerial, angle = null) {
  const enemy = ENEMIES[enemyIndex % ENEMIES.length];
  const spawnAngle = angle ?? (-Math.PI / 2 + game.enemySerial * 2.3999632297);
  const p = createPiece(
    Math.cos(spawnAngle) * CONFIG.ENEMY_SPAWN_RADIUS,
    Math.sin(spawnAngle) * CONFIG.ENEMY_SPAWN_RADIUS,
    "enemy"
  );
  p.enemyId = enemy.id;
  p.enemyName = `${enemy.name}（${enemy.sin}）`;
  p.enemyIcon = enemy.icon;
  p.icon = enemy.icon;
  p.houseRingsReached = new Set();
  p.color = enemy.color;
  game.pieces.push(p);
  game.enemySerial++;
  return p;
}

function spawnEnemyWave() {
  for (let i = 0; i < ENEMIES.length; i++) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * i) / ENEMIES.length;
    spawnEnemy(i, angle);
  }
}

function buildSurvivalGame() {
  game.pieces = [];
  game.wave = 1;
  game.enemySerial = 0;
  spawnEnemyWave();
  game.launcherReady = true;
  game.aim = null;
  game.lockedAim = null;
  game.turn = 1;
  game.shotInProgress = false;
  game.pendingHandIndex = null;
  game.chainCountThisThrow = 0;
  game.fastForward = 1;
  game.manualFastForward = false;
  game.phase = "aim";
  game.gameOver = false;
  game.buttonDanger = false;
  game.turnAlertLevel = "none";
  game.score.enemyTakeouts = 0;
  game.score.waveBonus = 0;
  game.score.noteBonus = 0;
  game.noteHits = 0;
  game.noteBonusAwardedThisThrow = false;
  document.getElementById("gameOver").classList.remove("show");
  createInitialHand();
  updateHUD();
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// 区分線形補間(xsは昇順の校正点)。ユーザー提供の入射角チャート/表の数値を
// そのまま校正点として再現するために使う(PROTO23、衝突時の回転伝達)
function lerpTable(xs, ys, x) {
  if (x <= xs[0]) return ys[0];
  const n = xs.length;
  if (x >= xs[n - 1]) return ys[n - 1];
  for (let i = 0; i < n - 1; i++) {
    if (x <= xs[i + 1]) {
      const t = (x - xs[i]) / (xs[i + 1] - xs[i]);
      return ys[i] + (ys[i + 1] - ys[i]) * t;
    }
  }
  return ys[n - 1];
}

// 入射角(度)→自身の回転の残り割合・相手への回転伝達割合。
// ユーザー提供の「入射角 vs 回転エネルギー」チャートの数値をそのまま校正点にした
// (0度=正面:伝達0%・残り90%、30度:伝達20%・残り60%、45度:伝達50%(最大)・残り30%、
//  75度:伝達40%・残り5%、90度=かすり:双方ほぼ無反応と仮定して0%に収束させる)。
// 摩擦・ペブル等の減衰要因の物理的な内訳は再現せず、数値の傾向だけを再現する
const SPIN_ANGLE_DEG = [0, 30, 45, 75, 90];
const SPIN_SELF_RETAIN = [0.90, 0.60, 0.30, 0.05, 0.0];
const SPIN_TRANSFER_TO_OTHER = [0.00, 0.20, 0.50, 0.40, 0.0];
function spinSelfRetain(thetaRad) { return lerpTable(SPIN_ANGLE_DEG, SPIN_SELF_RETAIN, thetaRad * 180 / Math.PI); }
function spinTransferToOther(thetaRad) { return lerpTable(SPIN_ANGLE_DEG, SPIN_TRANSFER_TO_OTHER, thetaRad * 180 / Math.PI); }

/* ---------- 投球操作(引く→押し出す→離す) ----------
 *  draw : アンカー(ボールの元の位置)から引く。引きの逆方向が狙い(スリングショット式)
 *         なので、引いたまま指を左右へ動かせば狙いを調整できる。引き距離=基礎パワー。
 *  push : 指をアンカーまで戻し、さらにPUSH_START_THRESH以上「前(ボールの元の位置より前)」
 *         へ出すと押し出し開始。狙いと基礎パワー(引きの深さ)は固定。押し出し距離
 *         (アンカーからの前方距離)で係数が決まり、短い押し出し=ほぼ全力、
 *         長い押し出し=ゆっくり(PUSH_MIN_COEFまで低下、ただしPUSH_MAX_POWER_RANGE分は
 *         全力を維持する猶予がある)。REDRAW_THRESH分アンカーより後ろへ戻せば
 *         drawへ戻って狙い直せる。
 *  離す : pushでMIN_PUSH_DIST以上押し出していれば発射。
 *         drawのまま放しても発射されない(引いて放すだけでは飛ばない)。
 *         回転は「いま指が狙いの中心線からどれだけ横にズレているか」の位置だけで決まる
 *         (時間窓なし。詳細はCURVE_DIST_SCALEのコメント参照)。CURVE_MINで無回転を排除。
 * --------------------------------------------------- */
function startAim(pointerId, px0, py0) {
  const locked = game.lockedAim;
  game.aim = {
    pointerId,
    p0x: px0, p0y: py0,
    fx: px0, fy: py0,
    mode: locked ? "launch" : "setAim",
    state: locked ? "push" : "draw",
    aimDirX: locked?.aimDirX ?? 0, aimDirY: locked?.aimDirY ?? -1,
    drawDist: 0,       // 現在の引き距離
    peakDraw: locked?.peakDraw ?? 0,       // 最深の引き距離(基礎パワーの元)
    pushDist: 0,       // 押し出し距離(瞬間値。フリックの後方ぶれで一時的に縮むことがある)
    peakPush: 0,       // 押し出しの最大到達値(パワー計算・投擲判定はこちらを使う)
  };
  updateSideInfoVisibility();
}

function updateSideInfoVisibility() {
  document.getElementById("sideInfo")?.classList.toggle("hidden", game.aim !== null);
  document.getElementById("fastForwardBtn")?.classList.toggle("hidden", game.aim !== null || game.phase === "aim");
}

function updateThrowTutorial() {
  const panel = document.getElementById("throwTutorial");
  if (!panel) return;
  panel.classList.toggle("hidden", game.phase !== "aim" || game.gameOver);
  document.getElementById("fastForwardBtn")?.classList.toggle("hidden", game.phase === "aim" || game.gameOver || game.aim !== null);
  const a = game.aim;
  const locked = Boolean(game.lockedAim);
  const aiming = a?.mode === "setAim" || (!a && !game.lockedAim);
  const launching = a?.mode === "launch" || Boolean(!a && game.lockedAim);
  const adjusting = a?.mode === "setAim" && a.drawDist > CONFIG.AIM_DEADZONE;
  const pushing = a?.mode === "launch" && a.pushDist > CONFIG.AIM_DEADZONE;
  const aimStep = document.getElementById("tutorialAim");
  aimStep?.classList.toggle("active", aiming);
  aimStep?.classList.toggle("pull", aiming && !adjusting);
  aimStep?.classList.toggle("adjust", aiming && adjusting);
  const aimArrow = document.getElementById("aimGestureArrow");
  const aimInstruction = document.getElementById("aimInstruction");
  const aimSub = document.getElementById("aimSub");
  if (aimArrow) aimArrow.textContent = pushing ? "↓" : adjusting ? "←　→" : "↓";
  if (aimInstruction) aimInstruction.textContent = pushing ? "後ろに下げてやめる" : locked ? "下に引いて決めなおす" : adjusting ? "離して決定" : "下へ引く";
  if (aimSub) aimSub.textContent = pushing ? "投球をキャンセル" : locked ? "照準をやりなおせる" : adjusting ? "ここで指を離す" : "ねらいモードにする";
  const powerTitle = document.getElementById("powerTitle");
  const powerInstruction = document.getElementById("powerInstruction");
  if (powerTitle) powerTitle.textContent = pushing ? "すぴーど" : "② なげる";
  if (powerInstruction) powerInstruction.textContent = pushing ? "離すとなげる" : "上へ押して離す";
  document.getElementById("tutorialPower")?.classList.toggle("active", launching);
  document.getElementById("tutorialSpin")?.classList.toggle("active", a?.mode === "launch");
  const coef = a?.mode === "launch" ? pushCoef(a.pushDist) : CONFIG.PUSH_MIN_COEF;
  const power = clamp((coef - CONFIG.PUSH_MIN_COEF) / (1 - CONFIG.PUSH_MIN_COEF), 0, 1);
  const curve = a?.mode === "launch" ? lateralCurveAt(a, a.fx, a.fy) : 0;
  const powerFill = document.getElementById("powerFill");
  const spinFill = document.getElementById("spinFill");
  if (powerFill) powerFill.style.width = `${Math.round(power * 100)}%`;
  if (spinFill) {
    const extent = Math.round(Math.abs(curve) * 50);
    spinFill.style.width = `${extent}%`;
    spinFill.style.left = curve < 0 ? `${50 - extent}%` : "50%";
  }
  const powerText = document.getElementById("powerReadout");
  if (powerText) powerText.textContent = !launching ? "ねらいをきめてね" : power > 0.72 ? "はやい！" : power > 0.35 ? "ふつう" : "おそい";
  const spinText = document.getElementById("spinReadout");
  if (spinText) spinText.textContent = Math.abs(curve) < 0.12 ? "" : curve < 0 ? "← 左回転" : "右回転 →";
}

// 狙いの向きを「真上」からMAX_AIM_ANGLE以内に制限する(盤と逆向き=後ろ向きの投球を禁止)
function clampAimDirection(dirX, dirY) {
  const upAngle = -Math.PI / 2;
  let diff = Math.atan2(dirY, dirX) - upAngle;
  while (diff > Math.PI) diff -= Math.PI * 2;
  while (diff < -Math.PI) diff += Math.PI * 2;
  const finalAngle = upAngle + clamp(diff, -CONFIG.MAX_AIM_ANGLE, CONFIG.MAX_AIM_ANGLE);
  return [Math.cos(finalAngle), Math.sin(finalAngle)];
}

function updateAim(px, py) {
  const a = game.aim;
  if (!a) return;
  a.fx = px; a.fy = py;

  const dx = px - a.p0x, dy = py - a.p0y;
  const dist = Math.hypot(dx, dy);

  if (a.state === "draw") {
    if (a.peakDraw <= CONFIG.AIM_DEADZONE) {
      // まだ狙いが確立していない:デッドゾーンを出たら引き開始
      if (dist > CONFIG.AIM_DEADZONE) {
        [a.aimDirX, a.aimDirY] = clampAimDirection(-dx / dist, -dy / dist);
        a.drawDist = dist;
        a.peakDraw = dist;
      }
    } else {
      // 狙い確立後は「アンカー(ボールの元の位置)からの後方成分」で引き/押しを判定する。
      // 押し出し(パワー調整)は、指がアンカーより前へ出てから始まる。
      // 以前は「最深点からの戻り量」を基準にしていたため、深く引いたのに戻りが浅いと
      // すぐ押し出し扱いになり誤操作しやすかった。ボールの元の位置基準にすることで、
      // 「一度アンカーまで戻してから押し出す」という直感的な動きに合わせた
      const backProj = -(dx * a.aimDirX + dy * a.aimDirY); // 後ろ側が正、アンカーで0
      if (-backProj > CONFIG.PUSH_START_THRESH) {
        a.state = "push";
        a.pushDist = Math.max(0, -backProj);
        a.peakPush = a.pushDist;
      } else if (dist > CONFIG.AIM_DEADZONE && backProj > 0 && dist > a.peakDraw) {
        // 後ろ側でさらに深く引いている(=最深記録を更新中)間だけ狙い(左右調整)を更新する。
        // PROTO23:「引きながらしか左右に動けない」よう変更。指がわずかでも前へ戻り始めた
        // (dist <= peakDraw になった)瞬間、狙い方向を完全にロックする。以前は後ろ側にいる
        // 限り常に狙いを更新していたため、押し出しへ折り返す直前の微妙な前後動きでも
        // 狙いがぶれる余地が残っていた。
        // なお更新時もアンカー付近(距離が小さいほど角度が不安定)では即座に反映せず、
        // AIM_SMOOTH_RANGEの幅で徐々に追従させる(confidence)
        const [rawX, rawY] = clampAimDirection(-dx / dist, -dy / dist);
        const confidence = clamp((dist - CONFIG.AIM_DEADZONE) / CONFIG.AIM_SMOOTH_RANGE, 0, 1);
        let ndx = a.aimDirX + (rawX - a.aimDirX) * confidence;
        let ndy = a.aimDirY + (rawY - a.aimDirY) * confidence;
        const nlen = Math.hypot(ndx, ndy) || 1;
        a.aimDirX = ndx / nlen; a.aimDirY = ndy / nlen;
        a.drawDist = dist;
        a.peakDraw = dist;
      } else if (dist > CONFIG.AIM_DEADZONE && backProj > 0) {
        // 後ろ側にはいるが最深記録は更新していない(前へ戻り始めている):
        // 狙い方向はロックしたまま、引き距離の表示用の値だけ追従させる
        a.drawDist = dist;
      }
    }
  } else { // push
    // 押し出し距離 = アンカーからの前方距離(狙いは固定済み)
    const backProj = -(dx * a.aimDirX + dy * a.aimDirY); // アンカー後方成分、アンカーで0
    if (backProj > CONFIG.REDRAW_THRESH) {
      // アンカーより後ろへ戻った → 引きに戻る(狙い直し可能)
      a.state = "draw";
      a.peakDraw = dist;
      a.drawDist = dist;
    } else {
      a.pushDist = Math.max(0, -backProj);
      // 最大到達値を記録(パワー確定・投擲判定に使う)。フリックで指が一瞬後方へ
      // ぶれてpushDistが縮んでも、ここまで押していた実績は消えない
      if (a.pushDist > a.peakPush) a.peakPush = a.pushDist;
    }
  }
}

// 押し出し距離→パワー係数(前へ押すほど強くなる直感操作)
function pushCoef(pushDist) {
  if (pushDist <= CONFIG.PUSH_MIN_POWER_RANGE) return CONFIG.PUSH_MIN_COEF;
  const t = clamp((pushDist - CONFIG.PUSH_MIN_POWER_RANGE) / (CONFIG.PUSH_MAX_POWER_RANGE - CONFIG.PUSH_MIN_POWER_RANGE), 0, 1);
  const eased = Math.pow(t, 0.82);
  return CONFIG.PUSH_MIN_COEF + (1 - CONFIG.PUSH_MIN_COEF) * eased;
}

// 回転量と曲がりの関係。弱回転ほど氷を捉えて大きく曲がり、強回転ほど直進する。
// ガイドと実際の物理の両方がこの関数を使い、表示と挙動の逆転を防ぐ。
function bendFromSpin(curve) {
  const sign = Math.sign(curve) || 1;
  const spinT = clamp((Math.abs(curve) - CONFIG.CURVE_MIN) / (1 - CONFIG.CURVE_MIN), 0, 1);
  const bendMag = 1 - spinT * (1 - CONFIG.CURVE_MIN);
  return sign * bendMag;
}

// 最弱速度と最大速度を両端として、操作パワーを実際の初速へ変換する。
// 従来の base * coef は中〜強パワーまで速度を大きく削っていたため、PROTO24では
// 正規化したパワーに急加速カーブを適用する。power=0は従来の最弱位置を維持し、
// power=1では引き量に応じて新しい最大速度まで伸びる。
function throwSpeedFromPower(baseSpeed, coef) {
  const minSpeed = minThrowSpeed();
  const maxSpeed = clamp(baseSpeed, minSpeed, CONFIG.MAX_THROW_SPEED);
  const power = clamp((coef - CONFIG.PUSH_MIN_COEF) / (1 - CONFIG.PUSH_MIN_COEF), 0, 1);
  const curvedPower = Math.pow(power, CONFIG.POWER_CURVE_EXPONENT);
  return minSpeed + (maxSpeed - minSpeed) * curvedPower;
}

// パワーの強さ(pushCoef: 1=短い押し出し=強い 〜 PUSH_MIN_COEF=長い押し出し=弱い)を
// 赤(強)→淡色(弱)へ線形補間する。押し出し操作中のショット強さの可視化に使う
function powerColor(coef) {
  const t = clamp((coef - CONFIG.PUSH_MIN_COEF) / (1 - CONFIG.PUSH_MIN_COEF), 0, 1);
  const lerp = (a, b) => Math.round(a + (b - a) * t);
  return {
    r: lerp(CONFIG.POWER_COLOR_WEAK[0], CONFIG.POWER_COLOR_STRONG[0]),
    g: lerp(CONFIG.POWER_COLOR_WEAK[1], CONFIG.POWER_COLOR_STRONG[1]),
    b: lerp(CONFIG.POWER_COLOR_WEAK[2], CONFIG.POWER_COLOR_STRONG[2]),
  };
}

// 狙いの中心線(アンカーp0を通りaimDir方向へ伸びる直線)から、指の現在位置までの
// 符号付き垂直距離をcurve値(-1〜1)へ変換する。時間窓を使わない位置ベースの計算なので、
// フリックのような素早い動きでもゆっくりしたスワイプでも、中心線からの距離が同じなら同じ値になる
function lateralCurveAt(aim, px, py) {
  const dx = px - aim.p0x, dy = py - aim.p0y;
  const perpX = -aim.aimDirY, perpY = aim.aimDirX;
  const lateral = dx * perpX + dy * perpY;
  return clamp(CONFIG.FLICK_CURVE_SIGN * lateral / CONFIG.CURVE_DIST_SCALE, -1, 1);
}

// 押し出し中の「いま放したら乗るであろう回転量」の概算(0〜1、符号なし)。
// リリースを伴わない予測表示のためCURVE_MIN未満でも下限にクランプするだけに留める
function estimateLiveCurveMag(aim) {
  const raw = Math.abs(lateralCurveAt(aim, aim.fx, aim.fy));
  return Math.max(CONFIG.CURVE_MIN, raw);
}

// 回転量→扇の半開き角(rad)。PROTO23で回転とカーブが比例する方式になったため、
// 回転が弱いほど狭く(=ほぼ直進、曲がる幅が小さい)、強いほど広く(=大きく曲がる可能性)に反転した
function fanHalfAngle(curveMag) {
  const t = clamp((curveMag - CONFIG.CURVE_MIN) / (1 - CONFIG.CURVE_MIN), 0, 1);
  return CONFIG.FAN_MIN_ANGLE + (CONFIG.FAN_MAX_ANGLE - CONFIG.FAN_MIN_ANGLE) * t;
}

function finalizeAim(aim, px, py) {
  // 押し出しが浅い/そもそも押し出していない/引きが浅い → 投げない。
  // 投擲が成立するかどうかの判定だけはpeakPush(最大到達値)を使う。瞬間値pushDistだと
  // フリックの後方ぶれで一時的に0近くまで縮み、強いフリックを伴う投球ほど誤って
  // 不発になるバグがあったため。ただしパワーの「値」自体はpushDist(現在値)を使う
  // (下のコメント参照。PROTO23で変更)
  if (aim.state !== "push") return null;
  if (aim.peakPush < CONFIG.MIN_PUSH_DIST) return null;
  if (aim.peakDraw < CONFIG.MIN_DRAW_DIST) return null;

  // 回転:リリース時点で狙いの中心線からどれだけ横にズレているかで決まる(時間窓なし)。
  // 無回転は排除(最低CURVE_MINを保証)
  let curve = lateralCurveAt(aim, px, py);
  if (Math.abs(curve) < CONFIG.CURVE_MIN) {
    // 完全中央は右方向へ統一し、投球前の予測線と実際の軌道を一致させる。
    const sign = curve !== 0 ? Math.sign(curve) : 1;
    curve = sign * CONFIG.CURVE_MIN;
  }

  // パワー:基礎(引き)×押し出し係数(pushDist=現在値基準)。下限MIN_THROW_SPEEDを保証。
  // PROTO23で peakPush(最大到達値)基準から pushDist(現在値)基準へ変更。
  // 「一度パワーを下げると指を戻してもパワーが上がらない」との指摘のとおり、
  // peakPush基準だと押し出し量は記録された最大値までしか戻せず、パワー調整が
  // 一方通行(弱める一方)になっていた。前後にスワイプするだけでパワーを
  // 自由に上げ下げしてから離せるよう、リリース時点の実際の押し出し位置を使う
  // 最初の引き量は照準専用。速度は投球時の押し量だけで決める。
  const base = CONFIG.MAX_THROW_SPEED;
  const speed = throwSpeedFromPower(base, pushCoef(aim.pushDist));

  return { dirX: aim.aimDirX, dirY: aim.aimDirY, curve, speed };
}

function throwPiece(params) {
  if (!game.launcherReady || game.phase !== "aim" || game.gameOver) return;
  const handIndex = game.selectedHandIndex;
  const character = game.hand[handIndex];
  if (!character) return;
  const launch = launcherPos();
  const p = createPiece(launch.x, launch.y, "player", character);
  const speed = params.speed * p.mods.speedMult;
  p.vx = params.dirX * speed;
  p.vy = params.dirY * speed;
  p.curve = params.curve;
  game.pieces.push(p);
  game.lockedAim = null;
  game.launcherReady = false;
  game.phase = "playerMoving";
  game.shotInProgress = true;
  game.pendingHandIndex = handIndex;
  game.chainCountThisThrow = 0;
  game.noteHits = 0;
  game.noteBonusAwardedThisThrow = false;
  game.fastForward = 1; // 新しい投球の滑走は通常速度から始める(早送りは止まりかけで自動的にかかる)
  renderHand();
}

function completeTurn() {
  if (!game.shotInProgress) return;
  const usedIndex = game.pendingHandIndex;
  if (usedIndex !== null) game.hand[usedIndex] = randomCharacter();
  game.turn += 1;
  game.shotInProgress = false;
  game.pendingHandIndex = null;
  game.selectedHandIndex = usedIndex ?? 0;
  game.launcherReady = true;
  game.phase = "aim";
  game.buttonDanger = Boolean(enemyAtCenter());
  game.turnAlertLevel = game.buttonDanger ? "pinch" : (enemyOnHouse() ? "house" : "none");
  renderHand();
}

// 停止位置は明かさず、一定長の線でショット方向と曲がり方だけを示す。
// 速さは線の長さではなく色（青→赤）で表現する。
function drawPredictedShotPath(aim, color) {
  const character = game.hand[game.selectedHandIndex];
  const mods = character?.mods ?? {};
  const rawCurve = Number.isFinite(aim.fx) && Number.isFinite(aim.fy)
    ? lateralCurveAt(aim, aim.fx, aim.fy)
    : 0;
  const curveMag = Math.max(CONFIG.CURVE_MIN, Math.abs(rawCurve));
  const coef = pushCoef(aim.pushDist ?? 0);
  const guideLen = Math.max(window.innerWidth, window.innerHeight) * 0.92;
  const guideDistance = guideLen / view.scale;
  const launch = launcherPos();

  // 投球本体と同じ順序・式で、目立った減速が始まるまで仮想ストーンを進める。
  // その後は停止方向ではなく、滑走区間で得た曲率を保って同じカーブを延長する。
  const makeBoundary = (side) => {
    const curve = curveMag * side;
    const initialSpeed = throwSpeedFromPower(CONFIG.MAX_THROW_SPEED, coef) * (mods.speedMult ?? 1);
    let x = launch.x, y = launch.y;
    let vx = aim.aimDirX * initialSpeed, vy = aim.aimDirY * initialSpeed;
    let turned = 0, traveled = 0;
    let lastDirX = aim.aimDirX, lastDirY = aim.aimDirY;
    let turnPerDistance = 0;
    const frictionMult = mods.frictionMult ?? 1;
    const dt = CONFIG.TIME_SCALE * 0.5;
    const points = [toScreen(x, y)];
    for (let step = 0; step < 3600 && traveled < guideDistance; step++) {
      const speed = Math.hypot(vx, vy);
      if (speed < CONFIG.SETTLE_SPEED) break;
      lastDirX = vx / speed; lastDirY = vy / speed;
      const slow = Math.pow(CONFIG.CURVE_VREF / (CONFIG.CURVE_VREF + speed), CONFIG.CURVE_SLOW_POWER);
      let dTheta = 0;
      if (Math.abs(turned) < CONFIG.CURVE_MAX_ANGLE) {
        dTheta = CONFIG.CURVE_STRENGTH * bendFromSpin(curve) * slow * dt * (mods.pathCurveMult ?? 1);
        const c = Math.cos(dTheta), sn = Math.sin(dTheta);
        const nextVx = vx * c - vy * sn;
        const nextVy = vx * sn + vy * c;
        vx = nextVx; vy = nextVy; turned += dTheta;
      }
      const fricEff = Math.pow(CONFIG.FRICTION, dt * frictionMult);
      vx *= fricEff; vy *= fricEff;
      const speedAfterFriction = Math.hypot(vx, vy);
      if (speedAfterFriction > 0) {
        const speedAfterResistance = Math.max(0, speedAfterFriction - CONFIG.ROLLING_RESISTANCE * dt * frictionMult);
        const resistanceScale = speedAfterResistance / speedAfterFriction;
        vx *= resistanceScale; vy *= resistanceScale;
      }
      const postSpeed = Math.hypot(vx, vy);
      if (postSpeed > 0) { lastDirX = vx / postSpeed; lastDirY = vy / postSpeed; }
      const dx = vx * dt, dy = vy * dt;
      const stepDistance = Math.hypot(dx, dy);
      x += dx; y += dy; traveled += stepDistance;
      if (stepDistance > 0.0001 && dTheta !== 0) turnPerDistance = dTheta / stepDistance;
      if (step % 5 === 0) points.push(toScreen(x, y));
      if (step > 12 && postSpeed <= initialSpeed * 0.65) break;
    }
    if (traveled < guideDistance) {
      // 滑走区間の最終点から、同じ曲率を保った円弧として画面奥まで延長する。
      points.push(toScreen(x, y));
      let remaining = guideDistance - traveled;
      let heading = Math.atan2(lastDirY, lastDirX);
      const segmentLength = Math.max(2, guideDistance / 180);
      while (remaining > 0.001) {
        const distance = Math.min(segmentLength, remaining);
        if (turnPerDistance !== 0 && Math.abs(turned) < CONFIG.CURVE_MAX_ANGLE) {
          const remainingTurn = Math.max(0, CONFIG.CURVE_MAX_ANGLE - Math.abs(turned));
          const extensionTurn = Math.sign(turnPerDistance) * Math.min(Math.abs(turnPerDistance * distance), remainingTurn);
          heading += extensionTurn;
          turned += extensionTurn;
        }
        x += Math.cos(heading) * distance;
        y += Math.sin(heading) * distance;
        remaining -= distance;
        points.push(toScreen(x, y));
      }
    }
    points.push(toScreen(x, y));
    return points;
  };
  const left = makeBoundary(-1);
  const right = makeBoundary(1);

  // 左右の間を速度色で薄く塗る。停止位置ではなく「曲がり得る向き」の範囲。
  ctx.beginPath();
  ctx.moveTo(left[0].x, left[0].y);
  for (const point of left) ctx.lineTo(point.x, point.y);
  for (let i = right.length - 1; i >= 0; i--) ctx.lineTo(right[i].x, right[i].y);
  ctx.closePath();
  ctx.fillStyle = `rgba(${color.r},${color.g},${color.b},0.065)`;
  ctx.fill();

  const neutral = Math.abs(rawCurve) < 0.12;
  const leftAlpha = neutral ? 0.48 : rawCurve < 0 ? 0.76 : 0.16;
  const rightAlpha = neutral ? 0.48 : rawCurve > 0 ? 0.76 : 0.16;
  const strokeBoundary = (points, alpha) => {
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
    ctx.lineCap = "round";
    ctx.strokeStyle = `rgba(255,255,255,${0.3 + alpha * 0.45})`;
    ctx.lineWidth = 5;
    ctx.stroke();
    ctx.strokeStyle = `rgba(${color.r},${color.g},${color.b},${alpha})`;
    ctx.lineWidth = alpha > 0.6 ? 3.2 : 1.8;
    ctx.stroke();
  };
  strokeBoundary(left, leftAlpha);
  strokeBoundary(right, rightAlpha);
}

// カーブ・速度・停止位置を予測しない、照準方向だけの直線ガイド。
function drawAimDirectionLine(aim) {
  const start = toScreen(launcherPos().x, launcherPos().y);
  const length = Math.max(window.innerWidth, window.innerHeight) * 1.05;
  ctx.beginPath();
  ctx.moveTo(start.x, start.y);
  ctx.lineTo(start.x + aim.aimDirX * length, start.y + aim.aimDirY * length);
  ctx.strokeStyle = "rgba(255,255,255,0.82)";
  ctx.lineWidth = 5;
  ctx.stroke();
  ctx.strokeStyle = "rgba(233,30,99,0.62)";
  ctx.lineWidth = 2.5;
  ctx.stroke();
}

// 二段階操作: 1ジェスチャー目で照準を固定し、2ジェスチャー目の前スワイプで投げる。
function updateAimTwoStage(px, py) {
  const a = game.aim;
  if (!a) return;
  a.fx = px;
  a.fy = py;
  const dx = px - a.p0x, dy = py - a.p0y;
  const dist = Math.hypot(dx, dy);

  if (a.mode === "setAim") {
    if (dist > CONFIG.AIM_DEADZONE) {
      [a.aimDirX, a.aimDirY] = clampAimDirection(-dx / dist, -dy / dist);
      a.drawDist = dist;
      a.peakDraw = Math.max(a.peakDraw, dist);
    }
    return;
  }

  const forward = dx * a.aimDirX + dy * a.aimDirY;
  if (-forward > CONFIG.REDRAW_THRESH) {
    // 固定後にもう一度引いたら、その場で照準の決め直しへ戻る。
    game.lockedAim = null;
    a.mode = "setAim";
    a.state = "draw";
    [a.aimDirX, a.aimDirY] = clampAimDirection(-dx / (dist || 1), -dy / (dist || 1));
    a.drawDist = dist;
    a.peakDraw = dist;
    a.pushDist = 0;
    a.peakPush = 0;
    return;
  }

  a.pushDist = Math.max(0, forward);
  a.peakPush = Math.max(a.peakPush, a.pushDist);
}

function enemyAtCenter() {
  return game.pieces.find(p =>
    p.role === "enemy" && p.state === "onboard" &&
    Math.hypot(p.x, p.y) <= CONFIG.HOUSE_RADIUS / 12 + pieceRadius(p)
  );
}

function enemyOnHouse() {
  return game.pieces.find(p =>
    p.role === "enemy" && p.state === "onboard" &&
    Math.hypot(p.x, p.y) <= CONFIG.HOUSE_RADIUS + pieceRadius(p)
  );
}

function showGameOver(enemy) {
  game.gameOver = true;
  game.phase = "gameOver";
  game.launcherReady = false;
  game.aim = null;
  const name = enemy?.enemyName ?? "七つの大罪";
  const score = calculateScore();
  document.getElementById("gameOverText").textContent = `${name}が中心に居座った　到達ターン ${game.turn}　SCORE ${score.total}`;
  document.getElementById("gameOver").classList.add("show");
  renderHand();
}

function startEnemyAdvance() {
  game.turnAlertLevel = "none";
  let enemies = game.pieces.filter(p => p.role === "enemy" && p.state === "onboard");
  if (enemies.length === 0) {
    game.score.waveBonus += CONFIG.SCORE_WAVE_CLEAR;
    game.wave++;
    spawnEnemyWave();
    showToast("ぶらんくっ！");
    enemies = game.pieces.filter(p => p.role === "enemy" && p.state === "onboard");
  }
  const scarcityBoost = 1 + clamp((ENEMIES.length - enemies.length) / (ENEMIES.length - 1), 0, 1) * 0.8;
  const baseSpeed = CONFIG.ENEMY_ADVANCE_DISTANCE * scarcityBoost / CONFIG.STOP_DIST_PER_SPEED;
  const pressureEnemy = enemies.reduce((closest, enemy) =>
    Math.hypot(enemy.x, enemy.y) < Math.hypot(closest.x, closest.y) ? enemy : closest
  );
  const attractors = game.pieces.filter(p =>
    p.role === "player" && p.state === "onboard" && p.mods.enemyAttractor
  );
  for (const enemy of enemies) {
    const distance = Math.hypot(enemy.x, enemy.y);
    if (distance < 0.001) continue;
    const speed = baseSpeed * (enemy === pressureEnemy ? CONFIG.ENEMY_PRESSURE_MULT : 1);
    let dirX = -enemy.x / distance;
    let dirY = -enemy.y / distance;
    if (attractors.length > 0) {
      const target = attractors.reduce((nearest, piece) =>
        Math.hypot(piece.x - enemy.x, piece.y - enemy.y) < Math.hypot(nearest.x - enemy.x, nearest.y - enemy.y)
          ? piece
          : nearest
      );
      const targetDx = target.x - enemy.x;
      const targetDy = target.y - enemy.y;
      const targetDistance = Math.hypot(targetDx, targetDy);
      if (targetDistance > 0.001) {
        const pull = CONFIG.HIROIBEO_ATTRACTION;
        dirX = dirX * (1 - pull) + targetDx / targetDistance * pull;
        dirY = dirY * (1 - pull) + targetDy / targetDistance * pull;
        const blendedLength = Math.hypot(dirX, dirY) || 1;
        dirX /= blendedLength;
        dirY /= blendedLength;
      }
    }
    enemy.vx = dirX * speed;
    enemy.vy = dirY * speed;
    enemy.curve = 0;
    enemy.curveTurned = 0;
  }
  game.phase = "enemyMoving";
  game.fastForward = 1;
  renderHand();
}

function handleAllPiecesSettled() {
  if (game.phase === "playerMoving") {
    if (game.chainCountThisThrow >= 2) showChainToast(game.chainCountThisThrow);
    const occupyingEnemy = enemyAtCenter();
    if (game.buttonDanger && occupyingEnemy) {
      showGameOver(occupyingEnemy);
    } else {
      game.buttonDanger = false;
      startEnemyAdvance();
    }
    return;
  }
  if (game.phase === "enemyMoving") {
    const ringThresholds = [
        CONFIG.HOUSE_RADIUS,
        CONFIG.HOUSE_RADIUS * (2 / 3),
        CONFIG.HOUSE_RADIUS * (1 / 3),
      ];
      const currentEnemies = game.pieces.filter(p => p.role === "enemy" && p.state === "onboard");
      let reinforcementCount = 0;
      for (const enemy of currentEnemies) {
        if (!enemy.houseRingsReached) enemy.houseRingsReached = new Set();
        const distance = Math.hypot(enemy.x, enemy.y);
        for (let i = 0; i < ringThresholds.length; i++) {
          if (distance <= ringThresholds[i] && !enemy.houseRingsReached.has(i)) {
            enemy.houseRingsReached.add(i);
            reinforcementCount++;
          }
        }
      }
      for (let i = 0; i < reinforcementCount; i++) spawnEnemy();
    completeTurn();
  }
}

/* ---------- 物理更新(サブステップ分割、すり抜け防止) ---------- */
function physicsStep() {
  let maxSpd = 0;
  let anyMoving = false;
  for (const p of game.pieces) {
    if (p.state !== "onboard") continue;
    const s = Math.hypot(p.vx, p.vy);
    if (s > maxSpd) maxSpd = s;
    if (s > CONFIG.SETTLE_SPEED) anyMoving = true;
  }

  // 早送り(PROTO23):トリガーは「投球からの経過時間」ではなく「盤上で動いている石が全て
  // ほぼ止まった(最速の石の速度がFF_SLOW_SPEED未満)」こと。まだ速く滑っている石が1つでも
  // あれば通常速度(倍率1)を保ち、その石が見えるドロー滑走を早送りしてしまわない。
  // 全てが止まりかけたら、その場でくるくる回っているだけの無駄時間なのでFF_MAX_MULTへ寄せる。
  // 倍率はFF_EASEで目標値へなめらかに補間(衝突で石が再加速したら自然に通常速度へ戻る)
  const autoFastForward = anyMoving && maxSpd < CONFIG.FF_SLOW_SPEED;
  const ffTarget = (game.manualFastForward || autoFastForward) ? CONFIG.FF_MAX_MULT : 1;
  game.fastForward += (ffTarget - game.fastForward) * CONFIG.FF_EASE;
  if (Math.abs(game.fastForward - ffTarget) < 0.02) game.fastForward = ffTarget;
  const fastForwardMult = game.fastForward;

  // sub:1回のphysicsStep呼び出しを何分割するか(すり抜け・カーブ積分誤差の防止)。
  // 通常分(fastForwardMult=1のときと同じ刻み幅)に、早送り倍率をそのまま掛けて
  // サブステップ数を増やす。1サブステップあたりの時間幅(k)は早送り倍率に依存せず
  // 常に同じになるため、早送り中も曲がり方の積分精度が変わらない(=物理は変えず、
  // 1回のphysicsStep呼び出しでこなす「量」だけを増やして早送りする)。
  // 早送りなし(倍率×1)でも常にTIME_SCALEを掛けてしまうと、TIME_SCALE<1の分だけ
  // 通常時の刻み幅も従来より粗くなってしまうため、TIME_SCALEはkの方にだけ掛ける
  const subBase = Math.ceil(maxSpd / (CONFIG.PIECE_RADIUS * 0.6));
  const sub = clamp(Math.ceil(subBase * fastForwardMult), 1, 80);

  // k = このpysicsStep呼び出しで進める「シミュレーション上の時間の割合」。
  // TIME_SCALEをここに掛けることで、physicsStep自体は毎実フレーム(60Hz)呼び続けながら
  // 1回あたりの進み幅だけを縮める。これにより描画される位置が実フレームごとに滑らかに
  // 更新され続ける(旧実装はaccumulator側をTIME_SCALEで縮めてphysicsStepの呼び出し頻度
  // 自体を落としていたため、更新の合間で位置が止まって見える「カクカク」が発生していた)
  const k = (1 / sub) * CONFIG.TIME_SCALE * fastForwardMult; // 摩擦は回転量でピースごとに変わるため、ループ内で個別に計算する

  for (let s = 0; s < sub; s++) {
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const speed = Math.hypot(p.vx, p.vy);
      if (speed < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; continue; }

      // 回頭:速いほど弱く(終盤に曲がる)、回転量にそのまま比例して曲がる(弱回転=微カーブ、強回転=大カーブ)
      const slow = Math.pow(CONFIG.CURVE_VREF / (CONFIG.CURVE_VREF + speed), CONFIG.CURVE_SLOW_POWER);
      if (p.curve && Math.abs(p.curveTurned) < CONFIG.CURVE_MAX_ANGLE) {
        const dTheta = CONFIG.CURVE_STRENGTH * bendFromSpin(p.curve) * slow * k * p.mods.pathCurveMult;
        const c = Math.cos(dTheta), sn = Math.sin(dTheta);
        const nvx = p.vx * c - p.vy * sn;
        const nvy = p.vx * sn + p.vy * c;
        p.vx = nvx; p.vy = nvy;
        p.curveTurned += dTheta;
      }

      // 摩擦:PROTO23で回転量による低減を廃止し、常にFRICTIONのみ(CONFIG冒頭コメント参照)
      const frictionMult = p.mods.frictionMult ?? 1;
      const fricEff = Math.pow(CONFIG.FRICTION, k * frictionMult);
      p.vx *= fricEff;
      p.vy *= fricEff;

      // カーリングの終盤らしく、一定の転がり抵抗を加える。
      // 同じ減速量でも低速ほど速度に占める割合が大きくなり、止まり際が締まる。
      const speedAfterFriction = Math.hypot(p.vx, p.vy);
      if (speedAfterFriction > 0) {
        const rollingMult = p.role === "enemy" && game.phase === "enemyMoving" ? 0 : frictionMult;
        const speedAfterResistance = Math.max(0, speedAfterFriction - CONFIG.ROLLING_RESISTANCE * k * rollingMult);
        const resistanceScale = speedAfterResistance / speedAfterFriction;
        p.vx *= resistanceScale;
        p.vy *= resistanceScale;
      }

      const ns = Math.hypot(p.vx, p.vy);
      if (ns < CONFIG.SETTLE_SPEED) { p.vx = 0; p.vy = 0; }

      p.x += p.vx * k;
      p.y += p.vy * k;

      // 見た目の回転:回転付きの石は spinRatePerFrame(実1秒あたりの回転数)で自転する。
      // これはTIME_SCALEを含む「シミュレーション時間」ではなく実時間基準の一定レートなので、
      // kではなくsub(1回のphysicsStep呼び出し=実1/60秒をいくつのサブステップに分けたか)で割り、
      // 呼び出し全体としてちょうど1/60秒ぶんの回転になるようにする。
      // 衝突で p.curve が変化(逆回転伝達)すればレートも毎フレーム追従する。それ以外は転がり
      if (p.curve) {
        // 早送り中は見た目の自転も同じ倍率で速める(でないと移動だけ速くて自転が
        // 遅く見える、演出としての不整合が生じる)
        p.rot += spinRatePerFrame(Math.abs(p.curve)) * Math.sign(p.curve) * fastForwardMult / sub;
      } else if (ns > 0.01) {
        const sign = Math.abs(p.vx) >= Math.abs(p.vy) ? Math.sign(p.vx) : Math.sign(p.vy);
        p.rot += (ns * k / pieceRadius(p)) * (sign || 1);
      }
    }

    // ピース間の弾性衝突
    const arr = game.pieces;
    for (let i = 0; i < arr.length; i++) {
      const a = arr[i];
      if (a.state !== "onboard") continue;
      for (let j = i + 1; j < arr.length; j++) {
        const b = arr[j];
        if (b.state !== "onboard") continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.hypot(dx, dy);
        if (dist === 0) continue;
        const nx = dx / dist, ny = dy / dist;
        const profileA = partContactProfile(a, nx, ny);
        const profileB = partContactProfile(b, -nx, -ny);
        const enemyAdvancePair = game.phase === "enemyMoving" && a.role === "enemy" && b.role === "enemy";
        const minDist = (profileA.radius + profileB.radius) * (enemyAdvancePair ? (2 / 3) : 1);
        if (dist >= minDist) continue;

        const overlap = minDist - dist;
        a.x -= nx * overlap * 0.5; a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5; b.y += ny * overlap * 0.5;

        const rvx0 = b.vx - a.vx, rvy0 = b.vy - a.vy;
        const relSpeed = Math.hypot(rvx0, rvy0);
        const rvn = rvx0 * nx + rvy0 * ny;
        if (rvn < 0) {
          // 入射角ベースの並進衝突モデル:速い側を「投げた石S」、遅い側を「あてられた石T」とし、
          // SのTに対する相対速度と接触法線(S→T)のなす角(入射角θ、0〜90度)で速度配分を決める。
          // Tは「Sの入射方向へまっすぐ」、Sは残りを「接触法線と直角の方向」へ(ビリヤードの
          // 90度ルール)。どちらが物理的なS/Tかは速度の大小で決め、配列順(a/b)には依存しない。
          // PROTO23:「実際のカーリングでは、複数の石を経由するような強烈な一撃でない限り、
          // 投げた石が手前側へ戻ってくることはまずない」との指摘。sin/cosそのままだと中間〜
          // 大きめの入射角(60〜80度)でもSに90%前後の速度が残ってしまい、連続ヒットが重なると
          // 数回の衝突だけで手前へ戻る挙動が起きやすすぎた。INCIDENCE_TRANSFER_POWERで
          // 正規化した入射角を底上げ(実際の角度より「より正面寄り」として扱う)し、0度/90度の
          // 境界条件は保ったまま、中間角度でのTへの移行量を全体的に増やしてSの残存を減らした
          const speedA = Math.hypot(a.vx, a.vy), speedB = Math.hypot(b.vx, b.vy);
          const strikerIsA = speedA >= speedB;
          const S = strikerIsA ? a : b, T = strikerIsA ? b : a;
          const SProfile = strikerIsA ? profileA : profileB;
          const TProfile = strikerIsA ? profileB : profileA;
          const nSTx = strikerIsA ? nx : -nx, nSTy = strikerIsA ? ny : -ny; // S→Tの法線
          const impact = -rvn; // 衝突の強さ(相対接近速度)

          if (relSpeed > 0.001) {
            const relVx = S.vx - T.vx, relVy = S.vy - T.vy;
            const along = relVx * nSTx + relVy * nSTy; // 法線方向成分(Sの接近速度)
            const cosThetaRaw = clamp(along / relSpeed, 0, 1);
            const theta = Math.acos(cosThetaRaw); // 実際の入射角(0〜π/2)
            const tNorm = Math.pow(theta / (Math.PI / 2), CONFIG.INCIDENCE_TRANSFER_POWER);
            const thetaEff = tNorm * (Math.PI / 2); // 底上げした実効入射角
            const cosTheta = Math.cos(thetaEff), sinTheta = Math.sin(thetaEff);

            const dirIx = relVx / relSpeed, dirIy = relVy / relSpeed; // Sの入射方向
            let tx = relVx - along * nSTx, ty = relVy - along * nSTy; // 接線成分(未正規化)
            const tLen = Math.hypot(tx, ty);
            if (tLen > 1e-6) { tx /= tLen; ty /= tLen; } else { tx = 0; ty = 0; }

            let sSpeed = relSpeed * sinTheta; // Sの新しい相対速度(接線方向)
            let tSpeed = relSpeed * cosTheta; // Tの新しい相対速度(入射方向)
            // 止まりかけの石同士は、微小な接触で双方が再び大きく滑り出さないよう減衰する。
            const lowSpeedT = clamp(impact / CONFIG.LOW_SPEED_COLLISION_REF, 0, 1);
            const lowSpeedDamping = CONFIG.LOW_SPEED_COLLISION_MIN + (1 - CONFIG.LOW_SPEED_COLLISION_MIN) * lowSpeedT;
            sSpeed *= lowSpeedDamping;
            tSpeed *= lowSpeedDamping;
            const targetRelationMult = T.role === "enemy" ? S.mods.enemyKnockMult : S.mods.allyKnockMult;
            tSpeed *= targetRelationMult;
            const enemyAdvancePush = game.phase === "enemyMoving" && S.role === "enemy" && T.role === "player";
            if (enemyAdvancePush) tSpeed *= 2.0;
            sSpeed *= S.mods.selfStopMult;
            tSpeed *= T.mods.knockResist;

            // 方向付き部位: 回転入力とは無関係に、接触方向と見た目の向きp.rotで判定する。
            if (SProfile.partHit && SProfile.type === "softEars") {
              tSpeed = 0;
              sSpeed *= 0.3;
            } else if (SProfile.partHit && SProfile.type === "hardHorn") {
              tSpeed *= 1.5;
            } else if (SProfile.partHit && SProfile.type === "powerHorns") {
              tSpeed *= 2.0;
            }
            if (TProfile.partHit && TProfile.type === "softEars") {
              tSpeed *= 0.15;
              sSpeed *= 0.5;
            }
            const Told_x = T.vx, Told_y = T.vy;
            S.vx = Told_x + tx * sSpeed; S.vy = Told_y + ty * sSpeed;
            // テイクされた石は、接触点から石の中心へ向かう法線上に進む。
            // 回転による曲がりは、この初速を与えた後の通常のカーブ処理で加える。
            T.vx = Told_x + nSTx * tSpeed; T.vy = Told_y + nSTy * tSpeed;
            if (enemyAdvancePush) {
              // 正面衝突でも敵を停止させず、接触前の進行方向へ速度を約80%残す。
              // 味方は強く押し出されるが、接触による遅延そのものは残る。
              S.vx = Told_x + dirIx * relSpeed * 0.8;
              S.vy = Told_y + dirIy * relSpeed * 0.8;
            }

            // 瑞珠: 通常はゼロの反発成分を接触法線方向へ追加する。
            // S/Tのどちらが瑞珠でも「ぼよよん」が起きるが、既存の入射角配分はそのまま残す。
            const restitution = Math.max(S.mods.restitution, T.mods.restitution);
            if (restitution > 0) {
              const bounceSpeed = impact * restitution;
              S.vx -= nSTx * bounceSpeed; S.vy -= nSTy * bounceSpeed;
              T.vx += nSTx * bounceSpeed; T.vy += nSTy * bounceSpeed;
            }

            // 回転の逆伝達(PROTO23):ユーザー提供の「入射角 vs 回転エネルギー」チャートの数値を
            // そのまま校正点に採用。以前は入射角に関係なく常にSPIN_HIT_DECAY/SPIN_TRANSFER固定
            // だったが、「ヒット後に回転を引き継ぎ過ぎる」との指摘のとおり、特に浅い入射角
            // (かすめる当たり)でも常に同じ量の逆回転が伝わっており、チャートの「かすめるほど
            // 伝達は弱まる(90度付近で0)」という傾向と食い違っていた。ここでのS/T(速度の
            // 大小)は上の並進モデルと同じ役割分担で、「自身」=S、「相手」=Tに対応する
            if (impact > CONFIG.SPIN_TRANSFER_MIN_IMPACT) {
              const selfRetain = spinSelfRetain(theta), transfer = spinTransferToOther(theta);
              const sCurve = S.curve, tCurve = T.curve;
              S.curve = clamp(sCurve * selfRetain - tCurve * transfer, -1, 1);
              T.curve = clamp(tCurve * selfRetain - sCurve * transfer, -1, 1);
              // 伝達で回頭上限を食い潰さないよう、衝突を機に累積回頭をリセット
              S.curveTurned = 0;
              T.curveTurned = 0;
            }
          }

          // 衝突演出:強さに応じた画面揺れ+瞬間ズーム
          // 音階式の衝突音と8音ボーナスは演出刷新まで停止する。
          if (impact > CONFIG.FX_MIN_IMPACT) {
            game.shakeMag = Math.min(CONFIG.SHAKE_MAX, game.shakeMag + impact * CONFIG.SHAKE_SCALE);
            game.zoomPulse = Math.min(CONFIG.ZOOM_MAX, game.zoomPulse + impact * CONFIG.ZOOM_SCALE);
          }
        }
      }
    }

    // 盤外・進入判定
    for (const p of game.pieces) {
      if (p.state !== "onboard") continue;
      const r = Math.hypot(p.x, p.y);
      const limit = CONFIG.OUT_RADIUS - pieceRadius(p) * 0.3;

      if (!p.entered) {
        if (r < limit) {
          p.entered = true;
        } else {
          if (p.vx === 0 && p.vy === 0) { p.state = "exiting"; p.fallT = 0; }
          continue;
        }
      }

      if (r <= limit) continue;
      const nx = p.x / r, ny = p.y / r;
      const vr = p.vx * nx + p.vy * ny;
      if (vr >= CONFIG.RIM_EXIT_SPEED) {
        p.state = "exiting";
        p.fallT = 0;
        if (p.role === "enemy" && game.phase === "playerMoving") {
          game.chainCountThisThrow++;
          game.score.enemyTakeouts++;
        }
        continue;
      }
      if (vr > 0) {
        // PROTO23:従来は法線成分だけを打ち消し、接線成分(縁に沿った滑り)は残していた。
        // 縁ぎりぎりで止まりかけている弱い投球はここに長く留まりやすく、接線成分が残ったまま
        // カーブによる回頭も継続するため、縁を舐めるように不規則にグルグル回ってから
        // 予測しづらい位置に落ち着く挙動になっていた(「最低パワーは縁ぎりぎりで止まる」を
        // 狙って調整するとまさにこの領域を使うことになり、シミュレーションが安定しなかった)。
        // 縁への到達速度がRIM_EXIT_SPEED未満(=外へ抜けるほどの勢いがない)なら、
        // 接線成分ごと完全に止めて「縁で静止」を素直な挙動にする
        p.vx = 0; p.vy = 0;
      }
      p.x = nx * limit; p.y = ny * limit;
    }
  }

  // 軌跡トレイル
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.role === "player" && p.state === "onboard" && (p.vx !== 0 || p.vy !== 0)) {
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 45) p.trail.shift();
      }
    }
  }

  // 退場アニメーション
  for (const p of game.pieces) {
    if (p.state === "exiting") p.fallT += 1 / 60;
  }
  game.pieces = game.pieces.filter(p => !(p.state === "exiting" && p.fallT > 0.5));

  // プレイヤー投球→敵接近→次ターンの状態遷移
  if (!game.launcherReady && !game.gameOver) {
    const anyMoving = game.pieces.some(p => p.state === "onboard" && (p.vx !== 0 || p.vy !== 0));
    if (!anyMoving) handleAllPiecesSettled();
  }

  updateHUD();
}

function showChainToast(n) {
