/* ---------- SE ---------- */
let audioCtx = null;
let audioMaster = null;
let slideGain = null;
let slideFilter = null;
let soundEnabled = true;
const NOTE_SCALE = [523.25, 587.33, 659.25, 698.46, 783.99, 880, 987.77, 1046.5];
const collisionPairTimes = new Map();

function ensureAudio() {
  if (!soundEnabled) return null;
  if (!audioCtx) {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return null;
    audioCtx = new AudioContextClass();
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = 0.9;
    audioMaster.connect(audioCtx.destination);

    const noiseBuffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const slideSource = audioCtx.createBufferSource();
    slideSource.buffer = noiseBuffer;
    slideSource.loop = true;
    slideFilter = audioCtx.createBiquadFilter();
    slideFilter.type = "bandpass";
    slideFilter.frequency.value = 2200;
    slideFilter.Q.value = 0.45;
    slideGain = audioCtx.createGain();
    slideGain.gain.value = 0;
    slideSource.connect(slideFilter).connect(slideGain).connect(audioMaster);
    slideSource.start();

  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function unlockAudio() {
  const ac = ensureAudio();
  if (!ac) return;
  ac.resume();
  const silent = ac.createOscillator();
  const silentGain = ac.createGain();
  silentGain.gain.value = 0.00001;
  silent.connect(silentGain).connect(audioMaster);
  silent.start();
  silent.stop(ac.currentTime + 0.02);
}

function registerCollisionHit(a, b, impact) {
  const nowMs = performance.now();
  const pairKey = a.uid < b.uid ? `${a.uid}:${b.uid}` : `${b.uid}:${a.uid}`;
  if (nowMs - (collisionPairTimes.get(pairKey) ?? -Infinity) < 140) return;
  collisionPairTimes.set(pairKey, nowMs);
  const note = NOTE_SCALE[game.noteHits % NOTE_SCALE.length];
  game.noteHits++;
  playCollisionSound(impact, note);
  if (game.noteHits >= NOTE_SCALE.length && !game.noteBonusAwardedThisThrow) {
    game.noteBonusAwardedThisThrow = true;
    game.score.noteBonus += CONFIG.SCORE_NOTE_CYCLE;
  }
}

function playCollisionSound(impact, baseNote) {
  const ac = ensureAudio();
  if (!ac || !soundEnabled) return;
  const now = ac.currentTime;
  const strength = clamp(impact / 18, 0.18, 1);
  const hitGain = ac.createGain();
  hitGain.gain.setValueAtTime(0.0001, now);
  hitGain.gain.exponentialRampToValueAtTime(0.17 * strength, now + 0.006);
  hitGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.42);
  hitGain.connect(audioMaster);

  // 小さな一回だけのエコーで、金属音をデジタルポップなチャイムへ寄せる。
  const delay = ac.createDelay();
  const delayGain = ac.createGain();
  delay.delayTime.value = 0.075;
  delayGain.gain.value = 0.18;
  hitGain.connect(delay).connect(delayGain).connect(audioMaster);

  for (const [ratio, volume, type] of [[1, 1, "sine"], [1.5, 0.34, "sine"], [2, 0.14, "triangle"]]) {
    const osc = ac.createOscillator();
    const partialGain = ac.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(baseNote * ratio * 1.045, now);
    osc.frequency.exponentialRampToValueAtTime(baseNote * ratio, now + 0.055);
    partialGain.gain.value = volume;
    osc.connect(partialGain).connect(hitGain);
    osc.start(now);
    osc.stop(now + 0.46);
  }
}

function updateSlideSound() {
  if (!audioCtx || !slideGain || !soundEnabled) return;
  const movingSpeed = game.pieces.reduce((max, p) =>
    p.state === "onboard" ? Math.max(max, Math.hypot(p.vx, p.vy)) : max, 0
  );
  const motion = clamp((movingSpeed - 0.08) / 30, 0, 1);
  const targetGain = motion * 0.042;
  slideGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.08);
  const digitalSweep = Math.sin(performance.now() * 0.008) * 140 * motion;
  slideFilter.frequency.setTargetAtTime(1900 + Math.min(movingSpeed, 35) * 34 + digitalSweep, audioCtx.currentTime, 0.08);
}

function bindSoundButton() {
  const button = document.getElementById("soundBtn");
  button.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    e.preventDefault();
    soundEnabled = !soundEnabled;
    button.textContent = soundEnabled ? "🔊" : "🔇";
    button.setAttribute("aria-pressed", String(soundEnabled));
    if (soundEnabled) unlockAudio();
    if (slideGain && audioCtx) slideGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
  });
}

/* ---------- メインループ ---------- */
const STEP = 1 / 60;
let accumulator = 0;
let lastTime = performance.now();

function frame(now) {
  let delta = (now - lastTime) / 1000;
  lastTime = now;
  if (delta > 0.05) delta = 0.05;
  // physicsStepの呼び出し自体は実時間どおり60Hzのまま進める(なめらかさのため)。
  // TIME_SCALEはphysicsStep内部の1回あたりの進み幅(k)に掛けてあり、そちらで
  // 「シミュレーション時間だけをスローに流す」を実現している(物理の軌道・結果は完全に不変)
  accumulator += delta;
  while (accumulator >= STEP) {
    physicsStep();
    if (game.toastTimer > 0) {
      game.toastTimer -= STEP;
      if (game.toastTimer <= 0) document.getElementById("chainToast").classList.remove("show");
    }
    accumulator -= STEP;
  }
  // 衝突演出の減衰(実時間=描画フレーム基準。スローの影響を受けない)
  game.shakeMag *= CONFIG.SHAKE_DECAY;
  if (game.shakeMag < 0.1) game.shakeMag = 0;
  game.zoomPulse *= CONFIG.ZOOM_DECAY;
  if (game.zoomPulse < 0.001) game.zoomPulse = 0;
  updateSlideSound();
  render();
  updateThrowTutorial();
  requestAnimationFrame(frame);
}

/* ---------- 描画 ---------- */
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
let view = { cx: 0, cy: 0, scale: 1 };

function onResize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth, h = window.innerHeight;
  canvas.width = Math.round(w * dpr);
  canvas.height = Math.round(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const topBar = 40;
  const Rs = Math.min(w * 0.46, h * 0.30);
  view.scale = Rs / CONFIG.BOARD_RADIUS;
  view.cx = w / 2;
  view.cy = topBar + Rs + 6;
}
window.addEventListener("resize", onResize);

// 回転量(0〜1、符号なし)→見た目の自転角速度(rad、physicsStep呼び出し1回=実時間1/60秒あたり)。
// 滑走時間(投球ごとにバラつく)に依存させず、実1秒あたりの回転数(rps)を直接指定する。
// これにより、弱回転の投球がどれだけ長く滑ろうと、見ている間のスピン速度自体は常に
// 弱⇄強で正しく約4倍の差になる(旧実装は基準フレーム数に対する回転数指定だったため、
// 弱回転ほど滑走時間が長くなる効果と打ち消し合い、体感の差が薄まっていた)
function spinRatePerFrame(curveMag) {
  const t = clamp((curveMag - CONFIG.CURVE_MIN) / (1 - CONFIG.CURVE_MIN), 0, 1);
  const rps = CONFIG.SPIN_VISUAL_MIN_RPS + (CONFIG.SPIN_VISUAL_MAX_RPS - CONFIG.SPIN_VISUAL_MIN_RPS) * t;
  return (rps * Math.PI * 2) / 60;
}

function toScreen(x, y) {
  return { x: view.cx + x * view.scale, y: view.cy + y * view.scale };
}

// ユゥナリナ用: 現在の狙い線上で最初に接触する石を求める。
// 既存衝突モデルでは当てられた石は入射方向へ進むため、その最初の1本だけをガイドする。
function firstTrajectoryGuideHit(aim, shooterRadius) {
  const origin = launcherPos();
  let nearest = null;
  for (const target of game.pieces) {
    if (target.state !== "onboard") continue;
    const dx = target.x - origin.x, dy = target.y - origin.y;
    const along = dx * aim.aimDirX + dy * aim.aimDirY;
    if (along <= 0) continue;
    const perpendicularSq = dx * dx + dy * dy - along * along;
    const hitRadius = shooterRadius + pieceRadius(target);
    if (perpendicularSq > hitRadius * hitRadius) continue;
    const contactDistance = along - Math.sqrt(Math.max(0, hitRadius * hitRadius - perpendicularSq));
    if (contactDistance < 0 || (nearest && contactDistance >= nearest.contactDistance)) continue;
    nearest = {
      target,
      contactDistance,
      contactX: origin.x + aim.aimDirX * contactDistance,
      contactY: origin.y + aim.aimDirY * contactDistance,
    };
  }
  return nearest;
}

function drawTrajectoryGuide(aim, shooterRadius) {
  const hit = firstTrajectoryGuideHit(aim, shooterRadius);
  if (!hit) return;
  const launch = toScreen(launcherPos().x, launcherPos().y);
  const contact = toScreen(hit.contactX, hit.contactY);
  const target = toScreen(hit.target.x, hit.target.y);
  const normalX = hit.target.x - hit.contactX;
  const normalY = hit.target.y - hit.contactY;
  const normalLength = Math.hypot(normalX, normalY) || 1;
  const targetDirX = normalX / normalLength;
  const targetDirY = normalY / normalLength;
  const guideLength = 170 * view.scale;
  const endX = target.x + targetDirX * guideLength;
  const endY = target.y + targetDirY * guideLength;

  ctx.save();
  ctx.setLineDash([7, 5]);
  ctx.lineWidth = 2;
  ctx.strokeStyle = "rgba(74,33,51,0.82)";
  ctx.beginPath();
  ctx.moveTo(launch.x, launch.y);
  ctx.lineTo(contact.x, contact.y);
  ctx.stroke();

  ctx.strokeStyle = "rgba(0,105,110,0.9)";
  ctx.beginPath();
  ctx.moveTo(target.x, target.y);
  ctx.lineTo(endX, endY);
  ctx.stroke();
  ctx.setLineDash([]);

  const arrowAngle = Math.atan2(targetDirY, targetDirX);
  ctx.fillStyle = "rgba(0,105,110,0.95)";
  ctx.beginPath();
  ctx.moveTo(endX, endY);
  ctx.lineTo(endX - Math.cos(arrowAngle - 0.45) * 10, endY - Math.sin(arrowAngle - 0.45) * 10);
  ctx.lineTo(endX - Math.cos(arrowAngle + 0.45) * 10, endY - Math.sin(arrowAngle + 0.45) * 10);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

const ROLE_COLOR = { player: "#6fa8ff", enemy: "#d94f4f", wall: "#8a8078" };

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.clearRect(0, 0, w, h);

  // 衝突演出:瞬間ズーム(盤中心基準)+画面揺れ
  ctx.save();
  if (game.zoomPulse > 0) {
    const z = 1 + game.zoomPulse;
    ctx.translate(view.cx, view.cy);
    ctx.scale(z, z);
    ctx.translate(-view.cx, -view.cy);
  }
  if (game.shakeMag > 0) {
    ctx.translate((Math.random() * 2 - 1) * game.shakeMag, (Math.random() * 2 - 1) * game.shakeMag);
  }

  // 盤
  const R = CONFIG.BOARD_RADIUS * view.scale;
  ctx.save();
  ctx.translate(view.cx, view.cy);
  ctx.beginPath();
  ctx.arc(0, 0, R * 1.02, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0)";
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(0,0,0,0)";
  ctx.fill();

  // ハウス(カーリングの的、デバッグ表示用):外周(青)→白→赤→ボタン(白)
  const hR = CONFIG.HOUSE_RADIUS * view.scale;
  const houseRings = [
    { r: hR, color: "#8f78b5" },        // 12フィート相当(ラベンダー)
    { r: hR * (2 / 3), color: "#fff8fb" }, // 8フィート相当(白)
    { r: hR * (1 / 3), color: "#f48fb1" }, // 4フィート相当(ピンク)
    { r: hR * (1 / 12), color: "#ffffff" }, // ボタン(白)
  ];
  for (const ring of houseRings) {
    ctx.beginPath();
    ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
    ctx.fillStyle = ring.color;
    ctx.fill();
  }
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  const heartFloat = Math.sin(performance.now() / 430) * 3;
  ctx.fillStyle = "#e91e63";
  ctx.font = `${Math.max(16, hR / 8)}px 'Apple Color Emoji','Segoe UI Emoji',sans-serif`;
  ctx.fillText("💖", 0, 1 + heartFloat);
  ctx.font = `700 ${Math.max(11, hR / 13)}px 'DotGothic16', sans-serif`;
  ctx.fillText("敵を弾いて💖を守れ！", 0, hR + 18);

  // 格子ガイド(デバッグ表示用):狙い位置↔着地位置を数値で共有しやすくするための目安線。
  // 盤の円でクリップしてから、盤中心(0,0)基準の等間隔グリッドを引く
  ctx.save();
  ctx.beginPath();
  ctx.arc(0, 0, R * 0.97, 0, Math.PI * 2);
  ctx.clip();
  const gs = CONFIG.GRID_SPACING * view.scale;
  ctx.strokeStyle = "rgba(0,0,0,0)";
  ctx.lineWidth = 1;
  for (let x = 0; x <= R * 1.05; x += gs) {
    ctx.beginPath(); ctx.moveTo(x, -R * 1.05); ctx.lineTo(x, R * 1.05); ctx.stroke();
    if (x > 0) { ctx.beginPath(); ctx.moveTo(-x, -R * 1.05); ctx.lineTo(-x, R * 1.05); ctx.stroke(); }
  }
  for (let y = 0; y <= R * 1.05; y += gs) {
    ctx.beginPath(); ctx.moveTo(-R * 1.05, y); ctx.lineTo(R * 1.05, y); ctx.stroke();
    if (y > 0) { ctx.beginPath(); ctx.moveTo(-R * 1.05, -y); ctx.lineTo(R * 1.05, -y); ctx.stroke(); }
  }
  // 中心を通る太めの十字線(原点の目印)
  ctx.strokeStyle = "rgba(0,0,0,0)";
  ctx.beginPath(); ctx.moveTo(0, -R * 1.05); ctx.lineTo(0, R * 1.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-R * 1.05, 0); ctx.lineTo(R * 1.05, 0); ctx.stroke();
  ctx.restore();

  ctx.restore();

  // ランチャー(引き・押し出しに応じて石が前後する)
  const launchBase = toScreen(launcherPos().x, launcherPos().y);
  const a = game.aim;
  let stoneX = launchBase.x, stoneY = launchBase.y;
  if (a && a.state === "draw" && a.drawDist > CONFIG.AIM_DEADZONE) {
    const off = Math.min(a.drawDist, 80) * 0.3;
    stoneX -= a.aimDirX * off;
    stoneY -= a.aimDirY * off;
  } else if (a && a.state === "push") {
    const back = Math.min(a.peakDraw, 80) * 0.3;
    const fwd = Math.min(a.pushDist, 120) * 0.3;
    stoneX -= a.aimDirX * (back - fwd);
    stoneY -= a.aimDirY * (back - fwd);
  }
  ctx.beginPath();
  const selectedCharacter = game.hand[game.selectedHandIndex];
  const launcherRadius = CONFIG.PIECE_RADIUS * (selectedCharacter?.mods?.radiusScale ?? 1) * view.scale;
  ctx.arc(launchBase.x, launchBase.y, launcherRadius * 1.15, 0, Math.PI * 2);
  ctx.strokeStyle = game.launcherReady ? "rgba(74,33,51,0.82)" : "rgba(74,33,51,0.2)";
  ctx.lineWidth = 2;
  ctx.stroke();
  if (game.launcherReady) {
    drawPiece(stoneX, stoneY, launcherRadius, selectedCharacter?.color ?? ROLE_COLOR.player, 0, 1, selectedCharacter?.mods?.partType, selectedCharacter?.icon);
  }

  if (!a && game.lockedAim) {
    drawAimDirectionLine(game.lockedAim);
    ctx.fillStyle = "#e91e63";
    ctx.font = "700 13px 'DotGothic16', sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("ねらいOK → まえへおす", launchBase.x, launchBase.y + launcherRadius + 24);
  }

  // 軌道予測は一時停止中。ユゥナリナも現在は共通の直線ガイドのみ。

  // 投球UI
  if (a) {
    const pushing = a.state === "push";
    drawAimDirectionLine(a);

    // アンカーとデッドゾーン
    ctx.beginPath();
    ctx.arc(a.p0x, a.p0y, CONFIG.AIM_DEADZONE, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(74,33,51,0.3)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // アンカー→指の線
    ctx.beginPath();
    ctx.moveTo(a.p0x, a.p0y);
    ctx.lineTo(a.fx, a.fy);
    ctx.strokeStyle = "rgba(74,33,51,0.52)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 指位置マーカー
    ctx.beginPath();
    ctx.arc(a.fx, a.fy, 10, 0, Math.PI * 2);
    ctx.fillStyle = pushing ? "rgba(233,30,99,0.68)" : "rgba(74,33,51,0.58)";
    ctx.fill();
  }

  // 軌跡トレイル
  if (CONFIG.SHOW_TRAIL) {
    for (const p of game.pieces) {
      if (p.trail && p.trail.length > 1) {
        ctx.beginPath();
        const t0 = toScreen(p.trail[0].x, p.trail[0].y);
        ctx.moveTo(t0.x, t0.y);
        for (const q of p.trail) {
          const s = toScreen(q.x, q.y);
          ctx.lineTo(s.x, s.y);
        }
      ctx.strokeStyle = "rgba(74,33,51,0.35)";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }
  }

  // ピース
  for (const p of game.pieces) {
    const s = toScreen(p.x, p.y);
    let r = pieceRadius(p) * view.scale;
    let alpha = 1;
    if (p.state === "exiting") {
      const t = Math.min(1, p.fallT / 0.5);
      r *= 1 - 0.7 * t;
      alpha = 1 - t;
    }
    drawPiece(s.x, s.y, r, p.color ?? ROLE_COLOR[p.role], p.rot, alpha, p.mods.partType, p.icon, p.role === "enemy");
  }

  ctx.restore(); // 衝突演出の変換を解除
}

function drawPiece(x, y, r, color, rot, alpha, partType = null, icon = null, enemyStyle = false) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = icon ? (enemyStyle ? "#17131c" : "rgba(255,255,255,0.78)") : color;
  ctx.fill();

  ctx.rotate(rot);

  if (partType === "softEars") {
    ctx.fillStyle = color;
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = Math.max(1, r * 0.06);
    for (const side of [-1, 1]) {
      ctx.save();
      ctx.translate(side * r * 0.38, -r * 1.85);
      ctx.rotate(side * 0.12);
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.24, r * 1.12, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  } else if (partType === "hardHorn") {
    ctx.fillStyle = "#b99572";
    ctx.strokeStyle = "#6f5545";
    ctx.lineWidth = Math.max(1, r * 0.06);
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(side * r * 0.08, -r * 0.66);
      ctx.bezierCurveTo(side * r * 0.55, -r * 1.05, side * r * 1.18, -r * 1.95, side * r * 0.83, -r * 3);
      ctx.bezierCurveTo(side * r * 0.52, -r * 2.62, side * r * 0.68, -r * 1.52, side * r * 0.3, -r * 0.72);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }
  } else if (partType === "powerHorns") {
    ctx.fillStyle = "#ffe09a";
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(side * r * 0.15, -r * 0.72);
      ctx.lineTo(side * r * 0.48, -r * 1.34);
      ctx.lineTo(side * r * 0.58, -r * 0.62);
      ctx.closePath(); ctx.fill();
    }
  }

  if (icon) {
    ctx.font = `${r * 1.65}px "Apple Color Emoji", "Segoe UI Emoji", sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = "#222";
    ctx.fillText(icon, 0, r * 0.04);
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, r, -Math.PI / 2, Math.PI / 2);
    ctx.closePath();
    ctx.fillStyle = "rgba(0,0,0,0.20)";
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -r);
    ctx.lineTo(0, r);
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = Math.max(1, r * 0.08);
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.strokeStyle = "rgba(0,0,0,0.35)";
  ctx.lineWidth = Math.max(1, r * 0.06);
  ctx.stroke();

  ctx.restore();
}

/* ---------- HUD ---------- */
let lastHUD = "";
function calculateBoardControl() {
  const value = game.pieces
    .filter(p => p.role === "player" && p.state === "onboard" && p.entered)
    .reduce((sum, p) => {
      const proximity = clamp(1 - Math.hypot(p.x, p.y) / CONFIG.HOUSE_RADIUS, 0, 1);
      return sum + proximity * CONFIG.SCORE_BOARD_MAX;
    }, 0);
  return Math.round(value);
}

function calculateScore() {
  const survivedTurns = Math.max(0, game.turn - 1);
  const survival = survivedTurns * CONFIG.SCORE_TURN;
  const takeout = game.score.enemyTakeouts * CONFIG.SCORE_TAKEOUT;
  const board = calculateBoardControl();
  const waveBonus = game.score.waveBonus;
  const noteBonus = game.score.noteBonus;
  return { survivedTurns, survival, takeout, board, waveBonus, noteBonus, total: survival + takeout + board + waveBonus + noteBonus };
}

function updateDangerAlert() {
  const el = document.getElementById("dangerAlert");
  if (!el) return;
  el.className = "";
  el.replaceChildren();
  if (game.phase !== "aim") return;
  if (game.turnAlertLevel === "pinch") {
    el.className = "show pinch";
    el.textContent = "PINCH!";
    const sub = document.createElement("span");
    sub.className = "dangerSub";
    sub.textContent = "このショットでボタンから退けろ！";
    el.appendChild(sub);
  } else if (game.turnAlertLevel === "house") {
    el.className = "show house";
    el.textContent = "ちかづいてきた！";
  }
}

function updateHUD() {
  const onboard = game.pieces.filter(p => p.state === "onboard" && p.entered).length;
  const enemies = game.pieces.filter(p => p.role === "enemy" && p.state === "onboard").length;
  const phaseNames = { aim: "投球", playerMoving: "ショット中", enemyMoving: "敵接近", gameOver: "敗北" };
  const score = calculateScore();
  updateDangerAlert();
  const s = onboard + "|" + enemies + "|" + game.turn + "|" + game.wave + "|" + game.phase + "|" + game.score.enemyTakeouts + "|" + score.board + "|" + score.waveBonus + "|" + score.noteBonus + "|" + game.noteHits;
  if (s === lastHUD) return;
  lastHUD = s;
  document.getElementById("totalScoreText").textContent = score.total;
}

/* ---------- 入力 ---------- */
window.addEventListener("pointerdown", (e) => {
  if (e.target.closest("#scenarioBar") || e.target.closest("#handBar") || e.target.closest("#sideInfo") || e.target.closest("#throwTutorial")) return;
  if (game.aim !== null || !game.launcherReady || game.phase !== "aim" || game.gameOver) return;
  e.preventDefault();
  startAim(e.pointerId, e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointermove", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  updateAimTwoStage(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener("pointerup", (e) => {
  if (!game.aim || game.aim.pointerId !== e.pointerId) return;
  const aim = game.aim;
  game.aim = null;
  updateSideInfoVisibility();
  if (aim.mode === "setAim") {
    if (aim.peakDraw >= CONFIG.MIN_DRAW_DIST) {
      game.lockedAim = {
        mode: "locked",
        state: "locked",
        aimDirX: aim.aimDirX,
        aimDirY: aim.aimDirY,
        peakDraw: aim.peakDraw,
        drawDist: aim.peakDraw,
        pushDist: 0,
        peakPush: 0,
      };
    }
    return;
  }
  const params = finalizeAim(aim, e.clientX, e.clientY);
  if (params) throwPiece(params);
});

window.addEventListener("pointercancel", () => {
  game.aim = null;
  updateSideInfoVisibility();
});

/* ---------- リセットボタン ---------- */
function bindResetButtons() {
  document.getElementById("resetBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildSurvivalGame();
  });
  document.getElementById("retryBtn").addEventListener("pointerdown", (e) => {
    e.stopPropagation(); e.preventDefault();
    buildSurvivalGame();
  });
}

function bindFastForwardButton() {
  const button = document.getElementById("fastForwardBtn");
  const stop = () => {
    game.manualFastForward = false;
    button.classList.remove("holding");
  };
  button.addEventListener("pointerdown", (e) => {
    e.stopPropagation();
    e.preventDefault();
    game.manualFastForward = true;
    button.classList.add("holding");
    button.setPointerCapture?.(e.pointerId);
  });
  button.addEventListener("pointerup", stop);
  button.addEventListener("pointercancel", stop);
  button.addEventListener("lostpointercapture", stop);
}

function bindTutorialToggle() {
  const panel = document.getElementById("throwTutorial");
  const button = document.getElementById("tutorialToggle");
  if (!panel || !button) return;
  try { panel.classList.toggle("minimized", localStorage.getItem("curlingTutorialMinimized") === "1"); } catch {}
  const refresh = () => {
    const minimized = panel.classList.contains("minimized");
    button.textContent = minimized ? "投げ方" : "かくす";
    button.setAttribute("aria-expanded", String(!minimized));
  };
  refresh();
  button.addEventListener("click", (e) => {
    e.stopPropagation();
    panel.classList.toggle("minimized");
    try { localStorage.setItem("curlingTutorialMinimized", panel.classList.contains("minimized") ? "1" : "0"); } catch {}
    refresh();
  });
}

/* ---------- 起動 ---------- */
onResize();
bindResetButtons();
bindFastForwardButton();
bindTutorialToggle();
bindSoundButton();
buildSurvivalGame();
window.addEventListener("touchstart", unlockAudio, { capture: true, passive: true });
window.addEventListener("pointerdown", unlockAudio, { capture: true, passive: true });
window.addEventListener("click", unlockAudio, { capture: true, passive: true });
requestAnimationFrame(frame);
</script>
